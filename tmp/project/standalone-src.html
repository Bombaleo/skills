  📒 CHANGELOG CONTRACT — read this first.
  ─────────────────────────────────────────────────────────────────────
  Every change shipped into Flex Work v2 MUST be appended to the
  single, shared changelog at:

      ./Flex Work v2 Changelog.html

  The changelog is one file. It self-updates by being edited as part
  of the change — there is no other mechanism. Across every chat,
  every user, every session: the rule is the same.

  When you add a feature, page, panel, or material UX change here:
    1. Open  "Flex Work v2 Changelog.html".
    2. If today's <section data-day="YYYY-MM-DD"> already exists at
       the top of <main>, prepend a new <li class="cl-entry"> to its
       <ul class="cl-list">.
    3. Otherwise, prepend a new <section data-day="YYYY-MM-DD"> with
       today's date ahead of the most recent one, and add the entry.
    4. Bump the "Current version" + "Last updated" in the header for
       feature-sized changes.

  Use the existing markup. Sentence case. No emoji. No exclamation
  marks. Tags: --add / --change / --fix / --remove / --system.

  This contract is also captured in CLAUDE.md at the project root.
  ─────────────────────────────────────────────────────────────────────
-->

  <!-- App loader overlay — vanilla JS, available before React mounts.
       Used for transitions that force a page reload (org switch, MSP
       program switch, temp-spend tier switch) and for the "viewing as"
       role swap, where pages re-derive against a new context. The
       overlay survives the reload-triggering React unmount because it's
       attached directly to <body>. -->
  <script>
    (function () {
      var OVERLAY_ID = "__app_loader_overlay";
      // Defensive: if a stale overlay survived a hot reload, remove it.
      var stale = document.getElementById(OVERLAY_ID);
      if (stale && stale.parentNode) stale.parentNode.removeChild(stale);

      function build(text, sub) {
        var node = document.createElement("div");
        node.id = OVERLAY_ID;
        node.className = "app-loader-overlay";
        node.setAttribute("role", "status");
        node.setAttribute("aria-live", "polite");
        node.setAttribute("aria-busy", "true");

        var spinner = document.createElement("div");
        spinner.className = "app-loader-spinner";
        spinner.setAttribute("aria-hidden", "true");
        node.appendChild(spinner);

        var label = document.createElement("p");
        label.className = "app-loader-text";
        label.textContent = text || "Loading\u2026";
        node.appendChild(label);

        if (sub) {
          var subEl = document.createElement("p");
          subEl.className = "app-loader-sub";
          subEl.textContent = sub;
          node.appendChild(subEl);
        }
        return node;
      }

      window.showAppLoader = function (text, sub) {
        var existing = document.getElementById(OVERLAY_ID);
        if (existing) {
          // Update text in place if already shown.
          var t = existing.querySelector(".app-loader-text");
          if (t) t.textContent = text || "Loading\u2026";
          var s = existing.querySelector(".app-loader-sub");
          if (sub) {
            if (s) { s.textContent = sub; }
            else {
              s = document.createElement("p");
              s.className = "app-loader-sub";
              s.textContent = sub;
              existing.appendChild(s);
            }
          } else if (s) {
            s.parentNode.removeChild(s);
          }
          return;
        }
        var node = build(text, sub);
        document.body.appendChild(node);
        // Force a reflow before adding the visibility class so the
        // opacity transition actually plays.
        // eslint-disable-next-line no-unused-expressions
        node.offsetHeight;
        node.classList.add("is-visible");
      };

      window.hideAppLoader = function () {
        var node = document.getElementById(OVERLAY_ID);
        if (!node) return;
        node.classList.remove("is-visible");
        // Match the 160ms CSS transition before removing.
        setTimeout(function () {
          if (node.parentNode) node.parentNode.removeChild(node);
        }, 180);
      };
    })();
  </script>
