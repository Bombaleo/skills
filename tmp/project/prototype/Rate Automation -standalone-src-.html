          actions += '<button class="proto-ver-link is-danger" data-vercancel="' + v.version + '">' + ico("Cancel") + 'Cancel schedule</button>';
        }
        return '<div class="proto-ver-item ' + m.cls + (open ? " is-expanded" : "") + '">' +
          '<div class="proto-ver-rail"><span class="proto-ver-dot"></span></div>' +
          '<div class="proto-ver-main">' +
            '<div class="proto-ver-top">' +
              '<span class="proto-ver-no">v' + v.version + '</span>' +
              '<span class="proto-ver-badge ' + m.cls + '">' + m.label + '</span>' +
              '<span class="proto-ver-when">' + verWhenPhrase(v) + '</span>' +
            '</div>' +
            '<div class="proto-ver-source">' + ico("Excel", "vs-ico") + '<span class="vs-name">' + escapeHtml(v.source) + '</span>' +
              '<span class="proto-ver-count">' + nRates + ' rate' + (nRates === 1 ? "" : "s") + '</span></div>' +
            '<div class="proto-ver-sub">Applied ' + escapeHtml(fmtDate(v.appliedAt)) + (v.note ? ' \u00b7 ' + escapeHtml(v.note) : "") + '</div>' +
            '<div class="proto-ver-actions">' + actions + '</div>' +
            (open ? '<div class="proto-ver-snapshot"><div class="proto-ver-snap-label">Rates captured in v' + v.version + ' \u00b7 effective ' + escapeHtml(fmtDay(v.startDate)) + '</div>' + versionSnapshot(v) + '</div>' : "") +
          '</div>' +
        '</div>';
      }).join("");

      var summary = activeV
        ? 'Active version <b>v' + activeV.version + '</b> in force since ' + escapeHtml(fmtDay(activeV.startDate))
        : 'No version is active yet';
      if (scheduledN) summary += ' \u00b7 ' + scheduledN + ' scheduled';

      return '<div class="proto-card" style="padding:var(--evr-spacing-lg);margin-top:var(--evr-spacing-md)">' +
        '<div class="proto-sr-head">' +
          '<div>' +
            '<div class="sr-title">Rate card versions \u2014 ' + state.versions.length + '</div>' +
            '<div class="sr-meta">' + summary + '. Each card stays in force from its applicable date until a newer version supersedes it.</div>' +

          '<div class="proto-sr-actions">' +
            '<button class="proto-btn proto-btn--ghost" data-act="clear-versions">Clear history</button>' +
          '</div>' +
        '</div>' +
        '<div class="proto-versions">' + items + '</div>' +

    // Shared apply action row \u2014 pick the applicable date, then apply.
    function applyBar(processed) {

          '<label class="proto-datefield"><span class="df-label">' + ico("TimeAdd") + 'Applicable from</span>' +

        '</div>' +

    // Sync the live modal inputs into state before any re-render (toggling
    // the "new job type" affordance, or saving) so typed values survive.
    function posSync() {
      var m = state.posModal; if (!m) return;
      if (m.mode === "jobtype") {
        var jn = app.querySelector("#pos-jt-name"); if (jn) m.name = jn.value;

    // ---------- Settings → Configuration → Positions (v0.90) ----------
    // The position catalogue: every position and the job type it belongs to.
    // Positions and job types are seeded from the rate cards and can be
    // extended here. Adding a position lets you pick an existing job type or
    // create a new one inline.
    function positionsView() {
      var positions = allPositions().slice().sort(function (a, b) {
        if (a.jt !== b.jt) return a.jt.localeCompare(b.jt);
        return a.name.localeCompare(b.name);
      });
      var jts = allJobTypes();

      var head = crumb([
        { label: "Settings", act: "settings-root" },
        { label: "Configuration", act: "noop" },
        { label: "Positions" },
      ]) +
      '<div class="proto-page-head"><h1>Positions</h1>' +
        '<p>Every position available to requisitions and rate cards, grouped by the job type it belongs to. Job types are drawn from your rate cards \u2014 add a new position or job type below.</p></div>';

      // Group positions by job type, ordered by the job-type list (rate-card
      // types first, then custom); job types with no positions still appear.
      var byJt = {};
      positions.forEach(function (p) { (byJt[p.jt] = byJt[p.jt] || []).push(p); });
      var order = jts.map(function (j) { return j.name; });
      Object.keys(byJt).forEach(function (k) { if (order.indexOf(k) < 0) order.push(k); });

      var groups = order.map(function (jt) {
        var list = byJt[jt] || [];
        var headRow = '<tr class="pos-grp"><td class="pos-grp-cell" colspan="2">' +
          '<span class="pos-grp-name">' + ico("Tag", "pos-jt-ico") + escapeHtml(jt) + '</span>' +
          '<span class="pos-grp-count">' + list.length + ' position' + (list.length === 1 ? "" : "s") + '</span>' +
        '</td></tr>';
        var body = list.length
          ? list.map(function (p) {
              var act = p.source === "custom"
                ? '<button class="pos-del" data-posdel="' + escapeHtml(p.name) + '" aria-label="Remove ' + escapeHtml(p.name) + '">' + ico("TrashCan") + '</button>'
                : '';
              return '<tr class="pos-row">' +
                '<td><span class="pos-name">' + escapeHtml(p.name) + '</span></td>' +
                '<td class="pos-actcell">' + act + '</td>' +
              '</tr>';
            }).join("")
          : '<tr class="pos-row pos-row--empty"><td colspan="2"><span class="pos-empty">No positions yet</span></td></tr>';
        return headRow + body;
      }).join("");

      var card = '<div class="proto-card pos-card">' +
        '<div class="pos-head">' +
          '<div class="pos-head-meta">' +
            '<span class="pos-count">' + positions.length + ' position' + (positions.length === 1 ? "" : "s") + '</span>' +
            '<span class="pos-count-sep">\u00b7</span>' +
            '<span class="pos-count">' + jts.length + ' job type' + (jts.length === 1 ? "" : "s") + '</span>' +
          '</div>' +
          '<div class="pos-head-actions">' +
            '<button class="proto-btn proto-btn--secondary" data-act="pos-add-jobtype">' + ico("Tag") + 'Add job type</button>' +
            '<button class="proto-btn proto-btn--primary" data-act="pos-add">' + ico("PersonPlus") + 'Add position</button>' +
          '</div>' +
        '</div>' +
        '<div class="proto-table-wrap pos-table-wrap">' +
          '<table class="proto-table pos-table"><thead><tr>' +
            '<th>Position</th><th aria-label="Actions"></th>' +
          '</tr></thead><tbody>' + groups + '</tbody></table>' +
        '</div>' +
      '</div>';

      // Flex Work V1 reskin: wrap the Positions surface (incl. the add
      // dialog) in .fw-v1 so styles-fw-v1.css remaps Everest tokens to V1.
      return '<div class="fw-v1">' + head + card + (state.posModal ? posModalHtml() : "") + '</div>';
    }

    // Add-position / add-job-type dialog. One modal, two modes; the position
    // mode carries an inline "create a new job type" affordance.
    function posModalHtml() {
      var m = state.posModal;
      var jts = allJobTypes();

          '</label>' +

        foot =

      } else {

        sub = "Name the position and choose the job type it belongs to.";

          jtField =
            '<label class="pos-fl"><span class="pos-fl-l">New job type</span>' +
              '<input type="text" class="pos-input" id="pos-new-jt" value="' + escapeHtml(m.newType || "") + '" placeholder="e.g. Forklift Operator" autocomplete="off" />' +
            '</label>' +
            '<button class="pos-link" data-act="pos-pick-existing">' + ico("Cancel", "pos-link-ico") + 'Pick an existing job type instead</button>';
        } else {
          jtField =
            '<label class="pos-fl"><span class="pos-fl-l">Job type</span>' +
              '<span class="proto-select pos-select"><select id="pos-jt-sel">' +
                jts.map(function (j) {
                  return '<option value="' + escapeHtml(j.name) + '"' + (j.name === m.jt ? " selected" : "") + '>' + escapeHtml(j.name) + '</option>';
                }).join("") +
              '</select></span>' +
            '</label>' +
            '<button class="pos-link" data-act="pos-new-type">' + ico("Add", "pos-link-ico") + 'Add a new job type</button>';
        }
        body =
          '<label class="pos-fl"><span class="pos-fl-l">Position name</span>' +
            '<input type="text" class="pos-input" id="pos-name" value="' + escapeHtml(m.name || "") + '" placeholder="e.g. Cat C+E Night Driver" autocomplete="off" />' +
          '</label>' +
          jtField +
          (m.err ? '<p class="pos-err">' + ico("Alert") + escapeHtml(m.err) + '</p>' : "");
        foot =
          '<button class="proto-btn proto-btn--ghost" data-act="pos-cancel">Cancel</button>' +
          '<button class="proto-btn proto-btn--primary" data-act="pos-save">' + ico("Check") + 'Add position</button>';
      }

      return '<div class="proto-modal-scrim" id="pos-scrim">' +
        '<div class="proto-modal pos-modal" role="dialog" aria-modal="true" aria-label="' + title + '">' +
          '<div class="proto-modal-head"><div>' +
            '<h2 class="proto-modal-title">' + title + '</h2>' +
            '<p class="proto-modal-sub">' + sub + '</p>' +
          '</div><button class="proto-modal-x" data-act="pos-cancel" aria-label="Close">' + ico("X") + '</button></div>' +
          '<div class="proto-modal-body"><div class="pos-form">' + body + '</div></div>' +
          '<div class="proto-modal-foot">' + foot + '</div>' +
        '</div>' +
      '</div>';
    }

    function settingsStub() {
      var label = "";
      SETTINGS_NAV.forEach(function (g) { g.items.forEach(function (it) { if (it.id === state.settingsItem) label = it.label; }); });
      return crumb([{ label: "Settings", act: "settings-root" }, { label: label }]) +
        '<div class="proto-card"><div class="proto-stub">' + ico("Information") +
          '<h3>' + escapeHtml(label) + '</h3>' +
          '<p>This screen isn\u2019t part of the Rate Automation prototype.<br/>Open <b>Rate Cards</b> to try the rate-card upload flow.</p>' +
          '<button class="proto-btn proto-btn--secondary" data-act="go-pricing" style="margin-top:16px">' + ico("CreditCard") + 'Go to Rate Cards</button>' +
        '</div></div>';
    }

    // ============================================================
    //  Helpers
    // ============================================================
    function escapeHtml(s) { return String(s).replace(/[&<>"']/g, function (c) { return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]; }); }
    function fmtSize(b) { if (b < 1024) return b + " B"; if (b < 1048576) return (b / 1024).toFixed(1) + " KB"; return (b / 1048576).toFixed(1) + " MB"; }

    // Build the multi-table reference template as an array-of-arrays,
    // matching the format parseRateCard() reads back in.
    function rateTemplateAoa() {
      var aoa = [["Rate card automation \u2014 reference tables"], []];
      function section(name, header, rows) {
        aoa.push([name]); aoa.push([]);
        aoa.push(["", header[0], header[1]]);
        rows.forEach(function (r) { aoa.push(["", r[0], r[1]]); });
        aoa.push([]);
      }
      function wideSection(name, header, rows) {
        aoa.push([name]); aoa.push([]);
        aoa.push([""].concat(header));
        rows.forEach(function (r) { aoa.push([""].concat(r)); });
        aoa.push([]);
      }
      // --- Control Panel tables (v0.82 model) --------------------------
      wideSection("Supplier List", ["Supplier", "Include (Y/N)", "Charge Rate Formulas Available (Y/N)", "Margin"],
        SUPPLIERS.map(function (s) {
          return [s.name, s.include ? "Y" : "N", s.formulas ? "Y" : "N", s.marginType === "pct" ? s.margin + "%" : "\u00a3" + s.margin.toFixed(2)];
        }));
      wideSection("Location Table", ["Site Name", "Site Area", "Include (Y/N)"],
        SITES.map(function (s) { return [s.name, s.area, s.include ? "Y" : "N"]; }));
      section("Job Types", ["Job Type", "Include (Y/N)"],
        JOB_TYPES.map(function (j) { return [j.name, j.include ? "Y" : "N"]; }));
      wideSection("Net Pay Reference", ["Net Pay Type Name", "Column", "Note"],
        NET_PAY_TYPES.map(function (t) { return [t.name, t.col, t.note]; }));
      wideSection("Net Pay Table", ["Site", "Job Title", "Job Type Match", "Parity Status", "Standard", "NMW July 2025", "Enhanced", "Rate to be Included?"],
        NET_PAY_ROWS.slice(0, 28).map(function (r) {
          return [r.site, r.jobTitle, r.jobType, r.parity + "-parity",
            r.rates.standard.toFixed(2), r.rates.nmw.toFixed(2), r.rates.enhanced.toFixed(2), r.include ? "Y" : "N"];
        }));
      // --- Legacy reference sections (kept so the parser still detects) -
      section("Areas Indicated", ["Area Name", "Rate Card Being Created (Y/N)"],
        [["Warrington", "Y"], ["Nuneaton", "N"], ["Rugby", "N"], ["Barnsley", "N"]]);
      section("Regions Indicated", ["Region Name", "Rate Card Being Created (Y/N)"],
        [["North", "N"], ["Central", "N"], ["South", "N"]]);
      section("Job Types Matching", ["Net Pay Rate Table Job", "Job Type"],
        [["Cat C Day Driver", "HGV Driver"], ["Cat C Night Driver", "HGV Driver"],
         ["Cat C&E Day Driver", "HGV Driver"], ["Day Loader", "Warehouse"],
         ["Warehouse Operative AM", "Warehouse"], ["Van Drivers Day", "Van Driver"]]);
      section("Rate To Be Included", ["Contract Type", "Include (Yes/No)"],
        [["2014", "Yes"], ["Van Network", "Yes"], ["Ex-Mirage", "Yes"], ["2005 Closed", "No"]]);
      section("Rate Card Job Role Matching", ["Net Pay Table Rate", "Rate Card Role Name"],
        [["Cat C Day Driver", "Cat C Day Driver"], ["Cat C Night Driver", "Cat C Night Driver"],
         ["Cat C&E Day Driver", "C+E Days"], ["Day Loader", "Day Loader"],
         ["Warehouse Operative AM", "Warehouse Operative AM"], ["Van Drivers Day", "Van Drivers Day"]]);
      return aoa;
    }

    // ---- Rate-cards grid template (download → fill → upload) ----------
    // The template mirrors the rate-cards grid one row per rate line:
    // Position · <every condition column> · Rate · season uplift type ·
    // season uplift value. A row with every condition [ALL] is that
    // position's base rate. Columns follow RG_CONDS so all conditions ship.
    var RG_TPL_COND_KEYS = Object.keys(RG_CONDS);
    var RG_TPL_HEADER = ["Position"]
      .concat(RG_TPL_COND_KEYS.map(function (k) { return RG_CONDS[k].label; }))
      .concat(["Rate (\u00a3/hr)", "Season uplift type (% or \u00a3)", "Season uplift value"]);

    function rgGridLineCount(g) {
      if (!g) return 0;
      var n = (g.overrides || []).length;
      RG_POSITIONS.forEach(function (p) { var b = g.bases && g.bases[p.code]; if (b != null && b !== "") n++; });
      return n;
    }
    // A grid → array-of-arrays for the downloadable template. Pre-fills with
    // the live grid if it has cards, else with the seed sample so the file is
    // never empty.
    function rgTemplateAoa(grid) {
      var g = grid || (rgGridLineCount(state.grid) ? state.grid : rgSeed());
      var aoa = [RG_TPL_HEADER.slice()];
      var upType = function (u) { return (u && u.val != null) ? (u.type === "abs" ? "\u00a3" : "%") : ""; };
      var upVal = function (u) { return (u && u.val != null) ? u.val : ""; };
      var allConds = RG_TPL_COND_KEYS.map(function () { return "[ALL]"; });
      RG_POSITIONS.forEach(function (p) {
        var base = g.bases ? g.bases[p.code] : null;
        if (base != null && base !== "") {
          var bu = g.baseUp && g.baseUp[p.code];
          aoa.push([p.name].concat(allConds).concat([base, upType(bu), upVal(bu)]));
        }
        (g.overrides || []).filter(function (o) { return o.pos === p.code; }).forEach(function (o) {
          var c = o.cond || {};
          var condCells = RG_TPL_COND_KEYS.map(function (k) { return c[k] || "[ALL]"; });
          aoa.push([p.name].concat(condCells).concat([o.rate == null ? "" : o.rate, upType(o.up), upVal(o.up)]));
        });
      });
      return aoa;
    }
    // Read a grid-template sheet back into a grid object, or null if the
    // sheet isn't a grid template.
    function parseGridTemplate(aoa) {
      if (!aoa || aoa.length < 2) return null;
      var hi = -1;
      for (var i = 0; i < Math.min(aoa.length, 6); i++) {
        var rowL = (aoa[i] || []).map(function (c) { return String(c == null ? "" : c).trim().toLowerCase(); });
        if (rowL.indexOf("position") >= 0 && rowL.some(function (c) { return c.indexOf("rate") === 0; })) { hi = i; break; }
      }
      if (hi < 0) return null;
      var H = (aoa[hi] || []).map(function (c) { return String(c == null ? "" : c).trim().toLowerCase(); });
      var idx = function (pred) { for (var j = 0; j < H.length; j++) { if (pred(H[j])) return j; } return -1; };
      var iPos = idx(function (c) { return c === "position"; });
      var iRate = idx(function (c) { return c.indexOf("rate") === 0; });
      var iUT = idx(function (c) { return c.indexOf("uplift") >= 0 && c.indexOf("type") >= 0; });
      var iUV = idx(function (c) { return c.indexOf("uplift") >= 0 && c.indexOf("value") >= 0; });
      if (iPos < 0 || iRate < 0) return null;
      // Match each condition column by its label, its key, or a key prefix
      // (so "Parity status" and "parity" both resolve to the parity column).
      var condIdx = {};
      RG_TPL_COND_KEYS.forEach(function (k) {
        var lbl = RG_CONDS[k].label.toLowerCase();
        condIdx[k] = idx(function (c) { return c === lbl || c === k || c.indexOf(k) === 0; });
      });
      var nameToCode = {}; RG_POSITIONS.forEach(function (p) { nameToCode[p.name.toLowerCase()] = p.code; });
      var grid = { active: RG_TPL_COND_KEYS.slice(), lookup: RG_TPL_COND_KEYS.slice(), seasonUplift: true, bases: {}, baseUp: {}, overrides: [] };
      RG_POSITIONS.forEach(function (p) { grid.bases[p.code] = null; grid.baseUp[p.code] = rgUp("pct", null); });
      var valOf = function (row, i) { if (i < 0) return ""; var v = row[i]; return v == null ? "" : String(v).trim(); };
      var num = function (s) { if (s === "" || s == null) return null; var n = Number(String(s).replace(/[^0-9.\-]/g, "")); return isFinite(n) ? n : null; };
      var isAll = function (v) { return v === "" || v.toUpperCase() === "[ALL]" || v.toLowerCase() === "all"; };
      var matchVal = function (raw, vals) {
        if (isAll(raw)) return null;
        var lc = raw.toLowerCase();
        for (var k = 0; k < vals.length; k++) { if (vals[k].toLowerCase() === lc) return vals[k]; }
        return raw;
      };
      var n = 0;
      for (var r = hi + 1; r < aoa.length; r++) {
        var row = aoa[r] || [];
        var posName = valOf(row, iPos); if (!posName) continue;
        var code = nameToCode[posName.toLowerCase()]; if (!code) continue;
        var rate = num(valOf(row, iRate));
        var utRaw = valOf(row, iUT).toLowerCase();
        var uType = (utRaw.indexOf("\u00a3") >= 0 || utRaw.indexOf("gbp") >= 0 || utRaw.indexOf("abs") >= 0 || utRaw.indexOf("fixed") >= 0) ? "abs" : "pct";
        var up = rgUp(uType, num(valOf(row, iUV)));
        var cond = {};
        RG_TPL_COND_KEYS.forEach(function (k) {
          var mv = matchVal(valOf(row, condIdx[k]), RG_CONDS[k].values);
          if (mv) cond[k] = mv;
        });
        if (Object.keys(cond).length === 0) { grid.bases[code] = rate; grid.baseUp[code] = up; n++; }
        else { grid.overrides.push({ id: rgUid(), pos: code, cond: cond, rate: rate, up: up }); n++; }
      }
      return n ? grid : null;
    }

    function downloadTemplate(verNo) {
      var grid = null, suffix = "";
      if (verNo != null) {
        var v = state.versions.filter(function (x) { return x.version === verNo; })[0];
        if (v && v.grid) { grid = v.grid; suffix = "-v" + verNo; }
      }
      var aoa = rgTemplateAoa(grid);
      var fname = "Flex-Work-rate-cards-template" + suffix;
      if (window.XLSX) {
        var ws = XLSX.utils.aoa_to_sheet(aoa);
        ws["!cols"] = [{ wch: 20 }]
          .concat(RG_TPL_COND_KEYS.map(function () { return { wch: 18 }; }))
          .concat([{ wch: 12 }, { wch: 24 }, { wch: 18 }]);
        var wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Rate cards");
        XLSX.writeFile(wb, fname + ".xlsx");
        toast("Template downloaded");
      } else {
        var csv = aoa.map(function (r) { return r.map(function (c) { return c == null ? "" : '"' + String(c).replace(/"/g, '""') + '"'; }).join(","); }).join("\n");
        var blob = new Blob([csv], { type: "text/csv" });
        var a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = fname + ".csv";
        a.click();
        URL.revokeObjectURL(a.href);
        toast("Template downloaded (CSV)");
      }
    }

    // Parse an uploaded workbook into a verdict the readability check reads.
    // Returns { ok, kind, upload, lines? } on success, or { ok:false } /
    // { ok:false, fatal:true } when nothing usable could be read.
    function parseUpload(e, file) {
      var cols = RATE_COLUMNS.slice(), rows = [], aoa = [];
      try {
        if (window.XLSX) {
          var data = new Uint8Array(e.target.result);
          var wb = XLSX.read(data, { type: "array" });
          var ws = wb.Sheets[wb.SheetNames[0]];
          aoa = XLSX.utils.sheet_to_json(ws, { header: 1, blankrows: false });
          if (aoa.length) { cols = aoa[0]; rows = aoa.slice(1).filter(function (r) { return r && r.length; }); }
        }
      } catch (err) { return { ok: false, fatal: true }; }

      var gridParsed = parseGridTemplate(aoa);
      if (gridParsed) return { ok: true, kind: "grid", upload: { name: file.name, size: file.size, kind: "grid", grid: gridParsed, processed: false } };

      var parsed = parseRateCard(aoa);
      if (parsed.detected && parsed.roleMatching.length) return { ok: true, kind: "workbook", upload: { name: file.name, size: file.size, parsed: parsed, processed: false } };

      if (rows.length) return { ok: true, kind: "flat", upload: { name: file.name, size: file.size, cols: cols, rows: rows, processed: false } };

      // Opened, but no rate rows. If the parser library never loaded we
      // can't be sure — fall back to the seed so the demo keeps flowing.
      if (!window.XLSX) return { ok: true, kind: "grid", upload: { name: file.name, size: file.size, kind: "grid", grid: rgSeed(), processed: false }, fallback: true };
      return { ok: false };
    }

    function handleFile(file) {
      if (!file) return;
      // Inside the upload wizard, drive the staged readability lifecycle
      // (spec §5): uploading → checking → ready | failed.
      if (state.rcWizard) { rcWizReceiveFile(file); return; }

      // Legacy modal path (kept harmless): parse straight to state.upload.
      var reader = new FileReader();
      reader.onload = function (e) {
        var r = parseUpload(e, file);
        if (r.ok) {
          state.upload = r.upload;
          if (r.kind === "workbook") state.exampleWorker = 0;
          render();
          var n = r.upload.kind === "grid" ? rgGridLineCount(r.upload.grid)
            : (r.upload.parsed ? r.upload.parsed.roleMatching.filter(function (m) { return m.role; }).length : (r.upload.rows ? r.upload.rows.length : 0));
          toast("File loaded \u2014 " + n + " rate " + (n === 1 ? "line" : "lines"));
        } else { toast("We couldn\u2019t read that file"); }
      };
      reader.readAsArrayBuffer(file);
    }

    // ---- Step ① upload lifecycle ---------------------------------------
    // Receive a dropped/selected file, animate the upload, then run the
    // readability check and route to ready (state.upload set) or failed.
    function rcWizReceiveFile(file) {
      var w = state.rcWizard;
      var name = file.name || "file";
      var ext = (name.split(".").pop() || "").toLowerCase();
      var okExt = ext === "xlsx" || ext === "xls" || ext === "csv";
      var up = { phase: "uploading", pct: 0, fileName: name, fileSize: file.size || 0, error: null, parsed: null };
      w.up = up;
      state.upload = null;
      w.previewGrid = null;

      // Read in parallel with the progress animation for realism.
      if (okExt && file.size) {
        var reader = new FileReader();
        reader.onload = function (e) { up.parsed = parseUpload(e, file); };
        reader.onerror = function () { up.parsed = { ok: false, fatal: true }; };
        try { reader.readAsArrayBuffer(file); } catch (err) { up.parsed = { ok: false, fatal: true }; }
      }

      rcWizAnimateUpload(up, function () {
        if (!okExt) return rcWizFail(up, "Unsupported file type", "We read .xlsx, .xls and .csv rate cards. This file is a ." + ext + " \u2014 export the workbook to one of those formats and upload it again.");
        if (!file.size) return rcWizFail(up, "This file is empty", "There\u2019s no data in this file. Check the export, then upload the rate card again.");
        rcWizCheck(up, name);
      });
    }

    // Wait for the background read, then settle the readability verdict.
    function rcWizCheck(up, name) {
      if (!state.rcWizard || state.rcWizard.up !== up) return;   // cancelled / superseded
      if (up.parsed === null) { setTimeout(function () { rcWizCheck(up, name); }, 150); return; }
      var r = up.parsed;
      if (r && r.ok) return rcWizPass(up, r);
      if (r && r.fatal) return rcWizFail(up, "We couldn\u2019t open the file", "Something went wrong reading this file. Try again, or choose a different one.");
      return rcWizFail(up, "We couldn\u2019t find any rates", "We opened the file but couldn\u2019t read any rate rows. Make sure you\u2019re using the rate card template, then upload it again.");
    }

    // Animate the upload bar, then flip to checking and invoke `done` once
    // the readability dwell elapses. setInterval (not rAF) so it still
    // completes when the iframe is backgrounded.
    function rcWizAnimateUpload(up, done) {
      render();   // paint the uploading UI
      var start = Date.now(), dur = 850;
      var iv = setInterval(function () {
        if (!state.rcWizard || state.rcWizard.up !== up) { clearInterval(iv); return; }
        var t = Math.min(1, (Date.now() - start) / dur);
        up.pct = Math.round(t * 100);
        var bar = app.querySelector("#rc-up-bar"); if (bar) bar.style.width = Math.max(2, up.pct) + "%";
        var lbl = app.querySelector("#rc-up-pct"); if (lbl) lbl.textContent = up.pct + "%";
        if (t >= 1) {
          clearInterval(iv);
          up.phase = "checking"; render();
          setTimeout(function () { if (state.rcWizard && state.rcWizard.up === up) done(); }, 850);
        }
      }, 60);
    }

    function rcWizPass(up, r) {
      if (!state.rcWizard || state.rcWizard.up !== up) return;
      up.phase = "ready"; up.error = null;
      state.upload = r.upload;
      if (r.kind === "workbook") state.exampleWorker = 0;
      render();
      var n = r.upload.kind === "grid" ? rgGridLineCount(r.upload.grid)
        : (r.upload.parsed ? r.upload.parsed.roleMatching.filter(function (m) { return m.role; }).length : (r.upload.rows ? r.upload.rows.length : 0));
      toast("File is readable \u2014 " + n + " rate " + (n === 1 ? "line" : "lines") + " found");
    }

    function rcWizFail(up, title, detail) {
      if (!state.rcWizard || state.rcWizard.up !== up) return;
      up.phase = "failed"; up.error = { title: title, detail: detail };
      state.upload = null;
      render();
    }

    // Load the bundled sample through the same lifecycle so it behaves like
    // a real upload (animate → check → ready).
    function rcWizLoadSample() {
      var w = state.rcWizard; if (!w) return;
      var seed = rgSeed();
      var up = { phase: "uploading", pct: 0, fileName: "Rate Card Automation.csv", fileSize: 5427, error: null,
        parsed: { ok: true, kind: "grid", upload: { name: "Rate Card Automation.csv", size: 5427, kind: "grid", grid: seed, processed: false } } };
      w.up = up; state.upload = null; w.previewGrid = null;
      rcWizAnimateUpload(up, function () { rcWizCheck(up, up.fileName); });
    }

    // ============================================================
    //  Event wiring (delegated per render)
    // ============================================================
    function wire() {
      // nav
      app.querySelectorAll("[data-nav]").forEach(function (b) {
        b.addEventListener("click", function () {
          var id = b.getAttribute("data-nav");
          if (id === "agencies") { state.view = "agencies"; state.agencyOpen = null; render(); }
          else if (id === "settings") { state.view = "settings"; render(); }
          else { toast(b.textContent.trim() + " isn\u2019t part of this prototype"); }
        });
      });
      // settings sub-nav
      app.querySelectorAll("[data-set]").forEach(function (b) {
        b.addEventListener("click", function () {
          state.settingsItem = b.getAttribute("data-set");
          state.rcDetailPos = null;   // always land on the rate card list
          state.posModal = null;      // close any open position dialog
          render();
        });
      });
      // Positions — remove a custom position
      app.querySelectorAll("[data-posdel]").forEach(function (b) {
        b.addEventListener("click", function () {
          var nm = b.getAttribute("data-posdel");
          state.customPositions = state.customPositions.filter(function (p) { return p.name !== nm; });
          saveCustomPositions(); render(); toast("Position removed");
        });
      });
      // Positions dialog — click the scrim (not the panel) to dismiss
      var posScrim = app.querySelector("#pos-scrim");
      if (posScrim) {
        posScrim.addEventListener("mousedown", function (e) {
          if (e.target === posScrim) { posSync(); state.posModal = null; render(); }
        });
        // Enter in a text input submits the dialog; Escape dismisses it
        posScrim.addEventListener("keydown", function (e) {
          if (e.key === "Escape") { e.preventDefault(); state.posModal = null; render(); return; }
          if (e.key === "Enter" && e.target.tagName === "INPUT") {
            e.preventDefault();
            var act = state.posModal && state.posModal.mode === "jobtype" ? "pos-save-jobtype" : "pos-save";
            var btn = posScrim.querySelector('[data-act="' + act + '"]');
            if (btn) btn.click();
          }
        });
        var posInput = posScrim.querySelector("input");
        if (posInput) { try { posInput.focus(); posInput.setSelectionRange(posInput.value.length, posInput.value.length); } catch (err) {} }
      }
      // agency-list row clicks → open detail (Staffline only) or toast
      app.querySelectorAll("[data-agency]").forEach(function (b) {
        b.addEventListener("click", function () {
          var id = b.getAttribute("data-agency");
          if (b.getAttribute("data-agency-inert")) {
            var a = AGENCIES.filter(function (x) { return x.id === id; })[0];
            toast((a ? a.name : "This agency") + " detail isn\u2019t part of this prototype");
            return;
          }
          state.view = "agencies"; state.agencyOpen = id; render();
        });
      });
      // audit overview row clicks → drill into one agency's reconciliation
      app.querySelectorAll("[data-audit-agency]").forEach(function (b) {
        b.addEventListener("click", function () {
          state.auditAgency = b.getAttribute("data-audit-agency"); render();
        });
      });
      // generic actions
      app.querySelectorAll("[data-act]").forEach(function (b) {
        b.addEventListener("click", function (e) {
          var a = b.getAttribute("data-act");
          if (a === "noop") { e.preventDefault(); return; }
          switch (a) {
            case "home": e.preventDefault(); state.view = "agencies"; state.agencyOpen = null; render(); break;
            case "backtoapp": state.view = "agencies"; state.agencyOpen = null; render(); break;
            case "agency-list": state.view = "agencies"; state.agencyOpen = null; render(); break;
            case "open-audit": {
              var auditId = b.getAttribute("data-agid");
              state.view = "audit"; state.agencyOpen = null; state.auditAgency = auditId || null; render(); break;
            }
            case "apply-config": {
              var cfgId = b.getAttribute("data-agid");
              if (cfgId) { engineFor(cfgId); saveEngines(); state.configured[cfgId] = true; saveConfigured(); render(); toast("Configuration applied from rate card"); }
              break;
            }
            case "apply-all-config":
              configurableAgencies().forEach(function (ag) { engineFor(ag.id); state.configured[ag.id] = true; });
              saveEngines(); saveConfigured(); render(); toast("All agencies configured from rate card");
              break;
            case "add-agency": toast("Adding a new agency isn\u2019t part of this prototype"); break;
            case "sort-sent": e.stopPropagation(); state.agencySort = "sent"; render(); break;
            case "sort-activated": e.stopPropagation(); state.agencySort = "activated"; render(); break;
            case "copy-email": e.stopPropagation(); toast("Email copied"); break;
            case "settings-root": state.view = "settings"; render(); break;
            case "collapse": state.collapsed = !state.collapsed; render(); break;
            case "go-pricing": state.view = "settings"; state.settingsItem = "pricing"; render(); break;
            // ---- Settings → Rate Engine chain + rules ----
            case "re-chain-remove": {
              var rcId = b.getAttribute("data-re-chain");
              state.reLookupChain = state.reLookupChain.filter(function (x) { return x !== rcId; });
              state.reLookupAddOpen = false; saveReChain(); render(); break;
            }
            case "re-chain-add-open":
              state.reLookupAddOpen = !state.reLookupAddOpen; render(); break;
            case "re-chain-toggle": state.reLookupCollapsed = !state.reLookupCollapsed; render(); break;
            case "re-eng-remove-prompt": {
              var rrpId = b.getAttribute("data-re-id");
              ensureReEngines();
              state.reEngRemoveConfirm = rrpId;
              render(); break;
            }
            case "re-eng-remove-confirm": {
              var rrcId = state.reEngRemoveConfirm;
              var rrcName = "";
              (state.reEngines || []).forEach(function (r) { if (r.id === rrcId) rrcName = r.name; });
              state.reEngines = (state.reEngines || []).filter(function (r) { return r.id !== rrcId; });
              state.reEngRemoveConfirm = null;
              saveReEngines2(); render(); toast('\u201c' + rrcName + '\u201d removed'); break;
            }
            case "re-eng-remove-cancel":
              state.reEngRemoveConfirm = null;
              render(); break;
            case "re-eng-add":
              ensureReEngines();
              state.reEngEditing = "new";
              state.reEngDraft = reEngNewDraft2();
              render(); break;
            case "re-eng-edit": {
              ensureReEngines();
              var reId = b.getAttribute("data-re-id");
              var reRule = state.reEngines.filter(function (r) { return r.id === reId; })[0];
              if (!reRule) break;
              state.reEngEditing = reId;
              state.reEngDraft = JSON.parse(JSON.stringify(reRule));
              render(); break;
            }
            case "re-eng-delete": {
              var reDelId = b.getAttribute("data-re-id");
              state.reEngines = (state.reEngines || []).filter(function (r) { return r.id !== reDelId; });
              if (state.reEngEditing === reDelId) { state.reEngEditing = null; state.reEngDraft = null; }
              saveReEngines2(); render(); toast("Engine deleted"); break;
            }
            case "re-eng-save": {
              if (!state.reEngDraft) break;
              var reDraft = state.reEngDraft;
              ensureReEngines();
              var reIdx = -1;
              for (var ri = 0; ri < state.reEngines.length; ri++) { if (state.reEngines[ri].id === reDraft.id) { reIdx = ri; break; } }
              if (reIdx >= 0) { state.reEngines[reIdx] = JSON.parse(JSON.stringify(reDraft)); toast("Engine updated"); }
              else { state.reEngines.push(JSON.parse(JSON.stringify(reDraft))); toast("Engine added"); }
              state.reEngEditing = null; state.reEngDraft = null;
              saveReEngines2(); render(); break;
            }
            case "re-eng-cancel": state.reEngEditing = null; state.reEngDraft = null; render(); break;
            case "re-eng-detail": {
              var rdId = b.getAttribute("data-re-id");
              state.reEngDetail = rdId; render(); break;
            }
            case "re-eng-back": state.reEngDetail = null;
              // Reset window.RE to table view so the landing is correct next time
              if (window.RE && window.RE.state) { window.RE.state.view = "table"; }
              render(); break;
            case "re-chain-add": {
              var raId = b.getAttribute("data-re-chain");
              if (state.reLookupChain.indexOf(raId) < 0) state.reLookupChain.push(raId);
              state.reLookupAddOpen = false; saveReChain(); render(); break;
            }
            // ---- Settings → Positions (v0.90) ----
            case "pos-add":
              state.posModal = { mode: "position", name: "", jt: (allJobTypes()[0] || {}).name || "", addingType: allJobTypes().length === 0, newType: "", err: null };
              render();
              break;
            case "pos-add-jobtype":
              state.posModal = { mode: "jobtype", name: "", err: null };
              render();
              break;
            case "pos-cancel":
              state.posModal = null; render();
              break;
            case "pos-new-type":
              posSync(); state.posModal.addingType = true; state.posModal.err = null; render();
              break;
            case "pos-pick-existing":
              posSync(); state.posModal.addingType = false; state.posModal.err = null; render();
              break;
            case "pos-save-jobtype": {
              posSync();
              var pjName = (state.posModal.name || "").trim();
              if (!pjName) { state.posModal.err = "Enter a job type name."; render(); break; }
              if (allJobTypes().some(function (j) { return j.name.toLowerCase() === pjName.toLowerCase(); })) {
                state.posModal.err = "\u201c" + pjName + "\u201d already exists."; render(); break;
              }
              state.customJobTypes.push(pjName); saveCustomJobTypes();
              state.posModal = null; render(); toast("Job type added");
              break;
            }
            case "pos-save": {
              posSync();
              var pm = state.posModal;
              var pName = (pm.name || "").trim();
              var pJt = pm.addingType ? (pm.newType || "").trim() : (pm.jt || "").trim();
              if (!pName) { pm.err = "Enter a position name."; render(); break; }
              if (!pJt) { pm.err = pm.addingType ? "Enter a job type name." : "Choose a job type."; render(); break; }
              if (allPositions().some(function (p) { return p.name.toLowerCase() === pName.toLowerCase(); })) {
                pm.err = "\u201c" + pName + "\u201d already exists."; render(); break;
              }
              if (pm.addingType && !allJobTypes().some(function (j) { return j.name.toLowerCase() === pJt.toLowerCase(); })) {
                state.customJobTypes.push(pJt); saveCustomJobTypes();
              }
              state.customPositions.push({ name: pName, jt: pJt }); saveCustomPositions();
              state.posModal = null; render(); toast("Position added");
              break;
            }
            case "download-template": downloadTemplate(); break;
            case "remove-file": state.upload = null; if (state.rcWizard) { state.rcWizard.previewGrid = null; state.rcWizard.up = null; } render(); break;
            case "process":
              if (state.upload && !state.upload.processed) {
                var ed = app.querySelector("#effdate");
                var eff = (ed && ed.value) || state.upload.effDate || defaultEffDate();
                applyRateCardVersion(state.upload, eff);
                state.showUpload = false; state.uploadStep = 1; state.upload = null;
                render();
              }
              break;
            case "toggle-lookup": state.showLookup = !state.showLookup; render(); break;
            // ---- Full-screen upload wizard (v0.88) ----
            case "upload-new": if (window.RU) RU.pick(); break;
            case "ru-close": state.ruValidateId = null; render(); break;
            case "load-sample":
              // Run the bundled reference CSV through the same upload
              // lifecycle (upload → readability check → ready).
              rcWizLoadSample();
              break;
            case "wiz-next":
              if (state.rcWizard) {
                var wz = state.rcWizard;
                if (wz.step === 1) { if (!state.upload) break; rcWizPrepGrid(); wz.step = 2; wz.proc = null; rcWizStartProcess(); }
                else if (wz.step === 2) {
                  if (!(wz.proc && wz.proc.done)) break;
                  // DEMO: blockers/confirmations don't block the walk-through.
                  wz.step = 3;
                }
                else if (wz.step === 3) {
                  wz.step = 4;   // Pay rate configuration — edits staged, no gate
                }
                else if (wz.step === 4) {
                  // DEMO: continue even if a position group is missing markup.
                  wz.step = 5;
                }
                else if (wz.step === 5) {
                  wz.step = 6;   // Rate cards is review-only — continue to the simulator
                }
                else if (wz.step === 6) {
                  wz.step = 7;   // Simulator is what-if only — no gate
                }
                render();

      }
    }
    state.bsimUI = { showAsm: false, showWorker: true, showRateCard: true };

    render();
  })();
  </script>
</body>
