      ]},

    // Rate-card template — the columns an agency rate upload must match.
    var RATE_COLUMNS = ["Position", "Market", "Sector", "Base Pay Rate - Pay rate - USD/hr", "Bill Rate (USD/hr)", "Daily Overtime - OT multiplier - \u00d7", "Effective Date"];
    var RATE_SAMPLE = [
      ["Warehouse Associate", "Dallas, TX",   "Logistics",     18.50, 27.75, 1.5, "2026-06-01"],
      ["Forklift Operator",   "Dallas, TX",   "Logistics",     21.00, 31.50, 1.5, "2026-06-01"],
      ["General Labor",       "Houston, TX",  "Manufacturing", 17.00, 25.50, 1.5, "2026-06-01"],
      ["Picker / Packer",     "Austin, TX",   "Logistics",     16.75, 25.13, 1.5, "2026-06-01"],
      ["Machine Operator",    "San Antonio, TX","Manufacturing",19.25, 28.88, 1.5, "2026-06-01"],
    ];

    // ============================================================
    //  Rate-card reference-file format (the real Staffline Group upload).
    //  The uploaded workbook is a CONFIG file, not a price list — it
    //  declares which areas/contracts are in scope and how each
    //  net-pay job maps to a job type and a rate-card role. The pay
    //  rate ENGINE below turns that config + agency settings into
    //  charge rates.
    // ============================================================
    // Section markers that live in column A of the sheet.
    var RC_SECTIONS = {
      "Areas Indicated": "areas",
      "Regions Indicated": "regions",
      "Job Types Matching": "jobTypes",
      "Rate To Be Included": "contracts",
      "Rate Card Job Role Matching": "roleMatching",
    };

    // GBP — the real file is a UK logistics rate card (HGV, Warrington…).
    function gbp(n) { return "\u00a3" + n.toFixed(2); }

    // Representative base (net) pay per net-pay job, derived from job
    // type + shift modifiers in the name. Stands in for the Net Pay
    // Rate Table tab that lives in the source workbook.
    function basePayFor(name, jobType) {
      var n = (name || "").toLowerCase();
      var base;
      switch (jobType) {
        case "HGV Driver":       base = 16.20; break;
        case "Van Driver":       base = 13.10; break;
        case "Warehouse Parity": base = 12.85; break;
        case "Warehouse":        base = 11.78; break;
        default:                 base = 12.40;
      }
      if (/night/.test(n)) base += 1.45;
      else if (/twilight|\bpm\b/.test(n)) base += 0.70;
      if (/c&e|c\+e|c & e/.test(n)) base += 0.85;
      if (/\b44\b/.test(n)) base += 0.40;
      if (/assessor|trainer/.test(n)) base += 1.10;
      return Math.round(base * 100) / 100;
    }

    // Parse the multi-table reference workbook into structured scope.
    function parseRateCard(aoa) {
      var out = { detected: false, areas: [], regions: [], jobTypes: [], contracts: [], roleMatching: [] };
      var section = null;
      aoa.forEach(function (row) {
        if (!row) return;
        var a = (row[0] == null ? "" : String(row[0])).trim();
        var b = (row[1] == null ? "" : String(row[1])).trim();
        var c = (row[2] == null ? "" : String(row[2])).trim();
        if (a && RC_SECTIONS[a]) { section = RC_SECTIONS[a]; out.detected = true; return; }
        if (a && !RC_SECTIONS[a]) { section = null; return; } // a different section header — stop collecting
        if (!section || !b) return;
        // skip the in-table header row (e.g. "Area Name", "Net Pay Rate Table Job")
        if (/^(area name|region name|net pay rate table job|contract type|net pay table rate)$/i.test(b)) return;
        if (section === "areas")        out.areas.push({ name: b, on: /^y(es)?$/i.test(c) });
        else if (section === "regions") out.regions.push({ name: b, on: /^y(es)?$/i.test(c) });
        else if (section === "contracts") out.contracts.push({ name: b, on: /^y(es)?$/i.test(c) });
        else if (section === "jobTypes" && c) out.jobTypes.push({ netJob: b, jobType: c });
        else if (section === "roleMatching") out.roleMatching.push({ netJob: b, role: c });
      });
      return out;
    }

    // Build a computed rate card from parsed scope + engine settings.
    function buildRateCard(parsed, engine) {
      var typeMap = {};
      parsed.jobTypes.forEach(function (j) { typeMap[j.netJob] = j.jobType; });
      var seen = {}, rows = [];
      parsed.roleMatching.forEach(function (m) {
        if (!m.role) return;                 // unmapped net-pay jobs are excluded
        if (seen[m.role]) return;            // dedupe by rate-card role name
        seen[m.role] = true;
        var jobType = typeMap[m.netJob] || "Warehouse";
        var group = positionGroupFor(jobType);
        var base = basePayFor(m.netJob, jobType);
        var markup = markupFor(engine, group);
        rows.push({ role: m.role, netJob: m.netJob, jobType: jobType, group: group, calc: computeRate(base, engine, markup) });
      });
      return rows;
    }

    // THE PAY RATE ENGINE — net pay → on-costs → flat markup → charge.
    // Markup is a flat £/hr supplied per call (it varies by position group).
    function computeRate(base, engine, markup) {
      var parts = engine.onCosts.map(function (o) {
        return { key: o.key, label: o.label, pct: o.pct, on: o.on, amt: o.on ? base * o.pct / 100 : 0 };
      });
      var oncost = parts.reduce(function (s, p) { return s + p.amt; }, 0);
      var payCost = base + oncost;
      var charge = payCost + markup;
      var marginPctOfCharge = charge > 0 ? markup / charge * 100 : 0;
      return { base: base, parts: parts, oncost: oncost, payCost: payCost, markup: markup, marginAmt: markup, charge: charge, marginPctOfCharge: marginPctOfCharge };
    }

    // A job type resolves to one of the agency position groups.
    function positionGroupFor(jobType) {
      if (jobType === "Warehouse" || jobType === "Warehouse Parity") return "Warehouse Group";
      if (jobType === "HGV Driver") return "Transport Group";
      return "Driver Group";
    }
    // Flat markup lookup with a safe fallback.
    function markupFor(engine, group) {
      return typeof engine.markup[group] === "number" ? engine.markup[group] : 0;
    }
    // Representative base pay for a position group (drives the preview).
    function groupBase(group) {
      if (group === "Warehouse Group") return basePayFor("Warehouse Operative AM", "Warehouse");
      if (group === "Transport Group") return basePayFor("Cat C Day Driver", "HGV Driver");
      return basePayFor("Van Drivers Day", "Van Driver");
    }

    // ============================================================
    //  Sample workforce — the company picks a real worker to see
    //  exactly what they would pay for them. Each worker carries its
    //  own assumptions (net-pay job, location, contracted hours, shift).
    // ============================================================
    var WORKER_JOBTYPE = {
      "Cat C Day Driver": "HGV Driver", "Cat C Night Driver": "HGV Driver",
      "Cat C&E Day Driver": "HGV Driver", "Van Drivers Day": "Van Driver",
      "Warehouse Operative AM": "Warehouse", "Day Loader": "Warehouse",
    };
    var WORKERS = [
      { name: "Marcus Bell",     ref: "SG-2071", netJob: "Cat C Day Driver",       location: "Warrington", hours: 45,   shift: "Days \u00b7 Mon \u2013 Fri",  started: "Mar 2024",
        weeksTenure: 34, age: 41, prePar: 15.10, postPar: 16.20, seasonal: 0,    otHours: 5, shiftDiff: "Days \u00b7 none", booking: "Mon 9 Jun \u00b7 06:00 \u2013 14:00 \u00b7 standard day", agency: "Staffline Group", override: "None", entity: "Evri" },
      { name: "Priya Raman",     ref: "SG-1188", netJob: "Cat C Night Driver",     location: "Nuneaton",   hours: 42,   shift: "Nights \u00b7 Sun \u2013 Thu", started: "Aug 2023",
        weeksTenure: 8,  age: 29, prePar: 16.10, postPar: 17.65, seasonal: 0,    otHours: 0, shiftDiff: "Nights +\u00a31.45", booking: "Sun 8 Jun \u00b7 22:00 \u2013 06:00 \u00b7 night", agency: "Staffline Group", override: "Night uplift +\u00a30.50", entity: "Evri Premium" },
      { name: "Tomasz Nowak",    ref: "SG-3304", netJob: "Cat C&E Day Driver",     location: "Warrington", hours: 48,   shift: "Days \u00b7 Mon \u2013 Sat",  started: "Jan 2025",
        weeksTenure: 3,  age: 36, prePar: 16.20, postPar: 17.05, seasonal: 0,    otHours: 8, shiftDiff: "C+E +\u00a30.85", booking: "Mon 9 Jun \u00b7 06:00 \u2013 16:00 \u00b7 standard day", agency: "Staffline Group", override: "None", entity: "Evri" },
      { name: "Sofia Mendes",    ref: "SG-0925", netJob: "Van Drivers Day",        location: "Rugby",      hours: 40,   shift: "Days \u00b7 Tue \u2013 Sat",  started: "Nov 2024",
        weeksTenure: 16, age: 24, prePar: 12.40, postPar: 13.10, seasonal: 0.50, otHours: 2, shiftDiff: "Days \u00b7 none", booking: "Tue 10 Jun \u00b7 08:00 \u2013 16:30 \u00b7 standard day", agency: "Staffline Group", override: "None", entity: "Evri" },
      { name: "Aisha Khan",      ref: "SG-4417", netJob: "Warehouse Operative AM", location: "Barnsley",   hours: 37.5, shift: "AM \u00b7 Mon \u2013 Fri",    started: "Feb 2025",
        weeksTenure: 52, age: 19, prePar: 11.20, postPar: 11.78, seasonal: 0,    otHours: 0, shiftDiff: "AM \u00b7 none", booking: "Mon 9 Jun \u00b7 05:00 \u2013 13:00 \u00b7 standard day", agency: "Staffline Group", override: "None", entity: "Evri" },
      { name: "Liam O\u2019Connor", ref: "SG-5560", netJob: "Day Loader",          location: "Nuneaton",   hours: 40,   shift: "Days \u00b7 Mon \u2013 Fri",  started: "Jun 2024",
        weeksTenure: 11, age: 47, prePar: 11.50, postPar: 11.78, seasonal: 0.50, otHours: 6, shiftDiff: "Days \u00b7 none", booking: "Mon 9 Jun \u00b7 14:00 \u2013 22:00 \u00b7 holiday rate", agency: "Staffline Group", override: "Holiday pricing +12%", entity: "Evri" },
    ];

    // Effective net base pay for a worker — pre/post-parity rate (AWR 12-week
    // rule) plus any seasonal allowance.
    function effectiveBase(w, jobType) {
      var pre = (typeof w.prePar === "number") ? w.prePar : basePayFor(w.netJob, jobType);
      var post = (typeof w.postPar === "number") ? w.postPar : pre;
      var base = (w.weeksTenure >= 12 ? post : pre) + (w.seasonal || 0);
      return Math.round(base * 100) / 100;
    }
    function tenureStatus(w) { return w.weeksTenure >= 12 ? "Post-parity" : "Pre-parity"; }

    // Resolve each sample worker against the uploaded card + engine.
    function buildWorkers(parsed, engine) {
      var typeMap = {}; parsed.jobTypes.forEach(function (j) { typeMap[j.netJob] = j.jobType; });
      var roleMap = {}; parsed.roleMatching.forEach(function (m) { if (m.role && !roleMap[m.netJob]) roleMap[m.netJob] = m.role; });
      var list = WORKERS.filter(function (w) { return roleMap[w.netJob]; }).map(function (w) {
        var jobType = typeMap[w.netJob] || WORKER_JOBTYPE[w.netJob] || "Warehouse";
        var group = positionGroupFor(jobType);
        var base = effectiveBase(w, jobType);
        return { worker: w, role: roleMap[w.netJob], netJob: w.netJob, jobType: jobType, group: group, location: w.location, calc: chargeForSupplier(base, primarySupplier(), jobType) };
      });
      // Custom file with no matching sample workers — synthesize from roles.
      if (!list.length) {
        list = buildRateCard(parsed, engine).slice(0, 8).map(function (r, i) {
          var w = { name: "Sample worker " + (i + 1), ref: "\u2014", netJob: r.netJob, location: "\u2014", hours: 40, shift: "Days \u00b7 Mon \u2013 Fri", started: "\u2014",
            weeksTenure: 16, age: 30, prePar: r.calc.base, postPar: r.calc.base, seasonal: 0, otHours: 0, shiftDiff: "\u2014", booking: "Standard day", agency: "Staffline Group", override: "None", entity: "Evri" };
          return { worker: w, role: r.role, netJob: r.netJob, jobType: r.jobType, group: r.group, location: "\u2014", calc: r.calc };
        });
      }
      return list;
    }

    // ============================================================
    //  v0.82 — RATE CARD DATA MODEL (aligned to the source workbook:
    //  "NMW July 2025 HUBS Temp Labour Rate Card Tool"). The workbook is
    //  a multi-tab tool; we mirror its real structure:
    //    · Control Panel  → Supplier List (include + formulas available),
    //                       Location table (Site Name + Site Area),
    //                       Job Types, Net Pay Reference (which net-pay
    //                       column drives the charge calc)
    //    · Net Pay Table  → one row per Site × Job Title × Parity status
    //                       (Pre / Post parity, AWR 12-week rule), holding
    //                       a net-pay figure per net-pay type
    //    · Charge Rate    → per-supplier formula (on-costs + margin),

      var parts = oncostPartsFor(netPay);

      } else {

        marginType = sup.marginType; marginRate = sup.margin;
      }
      var charge = payCost + margin;
      return {
        base: netPay, parts: parts, oncost: oncost, payCost: payCost, group: group,

    // Format a date-only "YYYY-MM-DD" in LOCAL time (avoids the UTC
    // midnight shift that makes new Date("2026-06-01") read as May 31).
    function fmtDay(iso) {

        return new Date(+p[0], +p[1] - 1, +p[2]).toLocaleDateString(undefined, { day: "numeric", month: "short", year: "numeric" });

    function migrateVersionRules(vs) {

      var same = function (a, b) { return Array.isArray(a) && a.length === b.length && a.every(function (x, i) { return x === b[i]; }); };

    // The rate-card position catalogue (window.RM.catalog), with a safe
    // fallback to the local lists if rate-model.js hasn't loaded yet.
    function rateCardCatalog() {
      if (window.RM && typeof window.RM.catalog === "function") return window.RM.catalog();

    // Every job type the catalogue knows — from the rate cards first, then
    // any the user added — de-duplicated, source-tagged, order preserved.
    function allJobTypes() {
      var seen = {}, out = [];
      rateCardCatalog().jobTypes.forEach(function (n) { if (n && !seen[n]) { seen[n] = 1; out.push({ name: n, source: "rate-card" }); } });
      state.customJobTypes.forEach(function (n) { if (n && !seen[n]) { seen[n] = 1; out.push({ name: n, source: "custom" }); } });
      return out;
    }
    // Every position — rate-card positions first, then custom.
    function allPositions() {
      var out = rateCardCatalog().positions.map(function (p) { return { name: p.name, jt: p.jt, source: "rate-card" }; });
      state.customPositions.forEach(function (p) { out.push({ name: p.name, jt: p.jt, source: "custom" }); });
      return out;
    }
    // How many positions reference a given job type (drives the count column).
    function positionsForJobType(name) {
      return allPositions().filter(function (p) { return p.jt === name; }).length;

    // Order versions by effective date and classify each relative to
    // today: superseded (a later card already took over), active (the
    // latest card whose date has arrived) or scheduled (date is future).
    function versionTimeline() {
      var vs = state.versions.slice().sort(function (a, b) {
        if (a.effectiveDate !== b.effectiveDate) return a.effectiveDate < b.effectiveDate ? -1 : 1;
        return a.version - b.version;
      });
      var today = todayISO();
      var activeIdx = -1;
      vs.forEach(function (v, i) { if (v.effectiveDate <= today) activeIdx = i; });
      return vs.map(function (v, i) {
        var status = i < activeIdx ? "superseded" : (i === activeIdx ? "active" : "scheduled");
        var endDate = (i < vs.length - 1) ? vs[i + 1].effectiveDate : null;
        return Object.assign({}, v, { status: status, startDate: v.effectiveDate, endDate: endDate });
      });
    }

    // Create a new version from an applied upload, stamped with effDate.
    function applyRateCardVersion(u, effDate) {
      u.processed = true;
      u.effDate = effDate;
      var no = nextVersionNo();
      var v;
      if (u.kind === "grid" && u.grid) {
        // Grid template upload — load the parsed rate lines straight into the
        // live rate-cards grid, then snapshot it onto the version.
        state.grid = JSON.parse(JSON.stringify(u.grid));
        rgSave();
        v = { version: no, effectiveDate: effDate, appliedAt: new Date().toISOString(),
              source: u.name, kind: "grid", note: "", grid: rgGridSnapshot() };
      } else if (u.parsed && u.parsed.detected) {
        v = { version: no, effectiveDate: effDate, appliedAt: new Date().toISOString(),
              source: u.name, kind: "structured", note: "", rates: snapshotStructured(u.parsed, state.engine), grid: rgGridSnapshot() };
        storeAppliedRates(u);
      } else {
        v = { version: no, effectiveDate: effDate, appliedAt: new Date().toISOString(),
              source: u.name, kind: "flat", note: "",
              cols: (u.cols || []).slice(), rows: (u.rows || []).map(function (r) { return r.slice(); }), grid: rgGridSnapshot() };
      }
      state.versions.push(v);
      state.lastAppliedVersion = no;
      saveVersions();
      render();
      var future = effDate > todayISO();
      toast("Version v" + no + (future ? " scheduled for " + fmtDay(effDate) : " applied \u00b7 active from " + fmtDay(effDate)));
    }

    // Roll back = re-issue a past version's rates as a new version that
    // takes effect today, preserving the audit trail (no history rewrite).
    function rollbackToVersion(no) {
      var src = state.versions.filter(function (v) { return v.version === no; })[0];
      if (!src) return;
      var nn = nextVersionNo();
      var copy = JSON.parse(JSON.stringify(src));
      copy.version = nn;
      copy.effectiveDate = todayISO();
      copy.appliedAt = new Date().toISOString();
      copy.note = "Rolled back from v" + no;
      state.versions.push(copy);
      state.lastAppliedVersion = nn;
      state.openVersion = nn;
      saveVersions();
      render();
      toast("Rolled back to v" + no + " \u00b7 now active as v" + nn);
    }
    function cancelScheduledVersion(no) {
      state.versions = state.versions.filter(function (v) { return v.version !== no; });
      if (state.openVersion === no) state.openVersion = null;
      saveVersions();
      render();
      toast("Scheduled version v" + no + " cancelled");
    }

    // Merge the rates resolved from an applied upload into the store.
    // Dedupes by the full field key so re-applying the same card (or a
    // changed engine) updates rather than duplicates. Returns the count.
    function storeAppliedRates(u) {
      if (!u || !u.parsed) return 0;
      var workers = buildWorkers(u.parsed, state.engine);
      if (!workers.length) return 0;
      var map = {};
      state.storedRates.forEach(function (r) { map[r.key] = r; });
      var when = new Date().toISOString();
      workers.forEach(function (wr) {
        var w = wr.worker;
        var parity = tenureStatus(w);
        var key = [parity, w.agency, wr.location, w.entity, wr.role].join("|");
        map[key] = {
          key: key, parity: parity, agency: w.agency, location: wr.location, entity: w.entity,
          role: wr.role, jobType: wr.jobType,
          base: wr.calc.base, payCost: wr.calc.payCost, markup: wr.calc.markup, charge: wr.calc.charge,
          source: u.name, appliedAt: when,
        };
      });
      state.storedRates = Object.keys(map).map(function (k) { return map[k]; });
      saveStored();
      return workers.length;
    }

    // Stored rows sorted by the active lookup priority (leftmost first),
    // so the table reads like the resolution order it encodes.
    function sortedStored() {
      var order = state.lookupOrder;
      return state.storedRates.slice().sort(function (a, b) {
        for (var i = 0; i < order.length; i++) {
          var p = LOOKUP_FIELDS[order[i]].prop;
          var c = String(a[p]).localeCompare(String(b[p]));
          if (c) return c;
        }
        return String(a.role).localeCompare(String(b.role));
      });
    }

    // Move a lookup field so it sits at the target field's position.
    function reorderLookup(from, to) {
      if (!from || !to || from === to) return false;
      var order = state.lookupOrder.slice();
      var fi = order.indexOf(from), ti = order.indexOf(to);
      if (fi < 0 || ti < 0) return false;
      order.splice(fi, 1);
      order.splice(ti, 0, from);
      state.lookupOrder = order;
      saveLookup();
      return true;
    }

    function fmtDate(iso) {
      try { return new Date(iso).toLocaleDateString(undefined, { day: "numeric", month: "short", year: "numeric" }); }
      catch (e) { return ""; }
    }

    var app = document.getElementById("app");

    function render() {

      fillIcons(app);
      try { wire(); } catch (wireErr) { if (window.console) console.error("wire() error:", wireErr); }
      // Mount the "② Validate" screen on wizard step 2 (after processing).
      if (state.rcWizard && state.rcWizard.step === 2 && state.rcWizard.proc && state.rcWizard.proc.done && window.RV) {
        var rvRoot = app.querySelector("#rv-root");
        if (rvRoot) {

          window.RV.mount(rvRoot, {

        var rmRoot = app.querySelector("#rm-root"); if (rmRoot) window.RM.mount(rmRoot, { key: rmKey });
      }
      // Mount the "④ Agency rate configuration" screen on wizard step 4.
      if (state.rcWizard && state.rcWizard.step === 4 && window.RC) {
        var rcKey = (state.upload && state.upload.name) || "sample";
        var rcRoot = app.querySelector("#rc-root"); if (rcRoot) window.RC.mount(rcRoot, { key: rcKey });
      }
      // Mount the captured-rates tables on the rate card version DETAIL page.
      // Read-only snapshots — the same Pay / Agency tables as the upload flow.
      if (state.view === "settings" && state.settingsItem === "pricing" && !state.rcWizard && state.versionDetail != null) {
        var vdKey = "ver:" + state.versionDetail;
        if (state.vdTab === "agency") {
          var vdRc = app.querySelector("#vd-rc-root");
          if (vdRc && window.RC) window.RC.mount(vdRc, { key: vdKey, readOnly: true });
        } else {
          var vdRm = app.querySelector("#vd-rm-root");
          if (vdRm && window.RM) window.RM.mount(vdRm, { key: vdKey, canEdit: false });
        }
      }
      // Mount the Settings · Rate Engine surface (structure-only engine).
      if (state.view === "settings" && state.settingsItem === "rate-engine" && window.RE) {
        var reRoot = app.querySelector("#re-root");
        if (reRoot) {
          // When opening a specific engine row, pre-set the detail view
          // BEFORE mount so the table view never renders.
          if (state.reEngDetail) {
            ensureReEngines();
            var detEng2 = (state.reEngines || []).filter(function (r) { return r.id === state.reEngDetail; })[0];
            if (detEng2) {
              if (!window.RE.state && window.RE._build) window.RE._build();
              if (window.RE.state) {
                var leRaw = (detEng2.keys && detEng2.keys.legalEntity);
              var leName2 = (Array.isArray(leRaw) ? leRaw[0] : leRaw) || detEng2.name || "";
                var tgtId = null;
                window.RE.state.configs.forEach(function (c) {
                  if (!tgtId && c.legalEntity.toLowerCase() === leName2.replace(/ ltd\.?$/i, "").trim().toLowerCase()) tgtId = c.id;
                });
                if (!tgtId) tgtId = window.RE.state.configs[0] && window.RE.state.configs[0].id;
                if (tgtId) {
                  window.RE.state.activeConfigId = tgtId;
                  window.RE.state.view = "detail";
                  window.RE.state.configMenuOpen = false;
                  window.RE.state.versionMenuOpen = false;
                  window.RE.state.collapsed = {};
                  window.RE.state.expanded = {};
                  window.RE.state.q = "";
                }
              }
            }
          }
          window.RE.mount(reRoot);
          // Intercept RE's internal "back to table" to go back to my list
          if (state.reEngDetail && !reRoot.__reListBackWired) {
            reRoot.__reListBackWired = true;
            reRoot.addEventListener("click", function (e) {
              if (e.target.closest("[data-re-backtotable]")) {
                e.stopImmediatePropagation();
                state.reEngDetail = null;
                if (window.RE && window.RE.state) window.RE.state.view = "table";
                render();
              }
            }, true);
          }
        }
      }
      // Mount the Rate Cards library (window.RC2) on the Pricing landing.
      if (state.view === "settings" && state.settingsItem === "pricing" && window.RC2) {
        var rc2Root = app.querySelector("#rc2-root");
        if (rc2Root) window.RC2.mount(rc2Root);
      }
      // Mount the Rate Cards uploads queue + validate screen (window.RU) on
      // the Rate Cards landing (not the legacy wizard, not a version detail).
      if (state.view === "settings" && state.settingsItem === "pricing" && !state.rcWizard && state.versionDetail == null && window.RU) {
        var ruRoot = app.querySelector("#ru-root");
        if (ruRoot) window.RU.mount(ruRoot, { validateId: state.ruValidateId, host: RU_HOST });
      }
      // Mount the "⑤ Rate cards" screen (cards only) on wizard step 5.
      if (state.rcWizard && state.rcWizard.step === 5 && window.RA) {
        var raRoot = app.querySelector("#ra-root");
        if (raRoot) {
          var u = state.upload || {};
          window.RA.mount(raRoot, { key: (u.name || "sample") + ":" + (u.size || 0), view: "cards" });
        }
      }
      // Mount the "⑥ Simulator" screen on wizard step 6.
      if (state.rcWizard && state.rcWizard.step === 6 && window.RA) {
        var simRoot = app.querySelector("#ra-root");
        if (simRoot) {
          var us = state.upload || {};
          window.RA.mount(simRoot, { key: (us.name || "sample") + ":" + (us.size || 0), view: "sim" });
        }
      }
      // Mount the agency-scoped "Rate cards" table on an agency detail page.
      // Reuses the rate cards Agency-rate (pay) recipe table (window.RC),
      // read-only and scoped to this agency's supplier lines.
      var agRcRoot = app.querySelector("#ag-ratecards-root");
      if (agRcRoot && window.RC) {
        var agSup = agRcRoot.getAttribute("data-ag-supplier") || "";
        window.RC.mount(agRcRoot, { key: "agency:" + agSup, readOnly: true, supplier: agSup });
      }

    //  serves, the job types it bids, its weekly hours, the statutory
    //  on-cost profile, and its per-position-group margin. This is the
    //  exact pricing the platform holds for that agency.
    // ============================================================
    function round2(n) { return Math.round(n * 100) / 100; }

    var PDF_NAME = { staffline: "Staffline" };
    function pdfNameFor(a) { return PDF_NAME[a.id] || a.name; }
    function pdfRowsForAgency(a) {
      var nm = pdfNameFor(a);

    function agencyConfig(a) {
      var rows = pdfRowsForAgency(a);
      var groupMargins = {}, jtHours = {};
      rows.forEach(function (r) {
        var g = positionGroupFor(r.jt);
        (groupMargins[g] = groupMargins[g] || {})[r.margin] = true;
        jtHours[r.jt] = r.hrs;
      });
      var margins = ["Transport Group", "Driver Group", "Warehouse Group"]
        .filter(function (g) { return groupMargins[g]; })
        .map(function (g) {
          return { group: g, vals: Object.keys(groupMargins[g]).map(Number).sort(function (x, y) { return x - y; }) };
        });
      return {
        rows: rows,
        sites: uniq(rows.map(function (r) { return r.loc; })),
        jobTypes: uniq(rows.map(function (r) { return r.jt; })),
        jtHours: jtHours,
        margins: margins,
        lineCount: rows.length,
      };
    }
    // Sectors implied by the job types an agency bids.
    function sectorsFor(cfg) {
      var s = [];
      if (cfg.jobTypes.some(function (j) { return j === "HGV Driver" || j === "Van Driver"; })) s.push("Driving");
      if (cfg.jobTypes.some(function (j) { return j.indexOf("Warehouse") === 0; })) s.push("Warehousing");
      if (!s.length) s.push("Logistics");
      return s;

    // Stable display-only GUID derived from the agency id.
    function agencyGuid(seed) {
      var h = 2166136261 >>> 0;
      for (var i = 0; i < seed.length; i++) { h ^= seed.charCodeAt(i); h = Math.imul(h, 16777619) >>> 0; }
      function next() { h ^= h << 13; h ^= h >>> 17; h ^= h << 5; h >>>= 0; return h; }
      var hex = "";
      while (hex.length < 32) hex += ("0000000" + next().toString(16)).slice(-8);
      hex = hex.slice(0, 32);
      return hex.slice(0, 8) + "-" + hex.slice(8, 12) + "-" + hex.slice(12, 16) + "-" + hex.slice(16, 20) + "-" + hex.slice(20, 32);

    // statutory on-cost profile. Holiday + NI are statutory; pension, levy
    // and sick pay are seeded from the agency's own rate-card lines.
    // Statutory / pack constants — locked, never agency-editable (Engine tier).
    var WTR_PCT = 12.07;          // working-time / holiday accrual
    var NI_PCT = 15;              // employer's secondary Class 1
    var NI_THRESHOLD_WK = 96;     // £/wk secondary threshold
    var LEVY_PCT = 0.5;           // apprenticeship levy on paybill (rate is statutory)
    var VAT_PCT = 20;             // standard-rated VAT on the client charge
    var PENSION_BAND = "\u00a3120\u2013\u00a3967 / wk"; // qualifying-earnings band
    var PENSION_MIN_PCT = 3;      // auto-enrolment employer minimum

    // Most-frequent value in a list (the representative rate-card figure).
    function modeOf(arr) {
      var c = {}, best = arr.length ? arr[0] : 0, bc = 0;
      arr.forEach(function (v) { c[v] = (c[v] || 0) + 1; if (c[v] > bc) { bc = c[v]; best = v; } });
      return best;

    // Build an agency's editable configuration straight from its own rate-card
    // lines. Only the five genuinely agency-set variables are produced, each at
    // the grain it actually varies in the data:
    //   per position group → markup (£/hr) · pension % · weekly hours
    //   supplier-wide       → sick pay (one value) · levy inclusion (one toggle)
    // Net pay, statutory burden rates and VAT are NOT here — they are read-only
    // (Pay tier / Engine tier) and sourced elsewhere.
    function deriveEngine(a) {
      var rows = pdfRowsForAgency(a);
      var byGroup = {}, sickVals = [], levyFlags = [];
      rows.forEach(function (r) {
        var g = positionGroupFor(r.jt);
        var G = byGroup[g] = byGroup[g] || { margins: [], pens: [], hrs: [], nets: [] };
        G.margins.push(r.margin); G.pens.push(r.pen); G.hrs.push(r.hrs); G.nets.push(r.net);
        sickVals.push(r.sick); levyFlags.push(r.levy > 0 ? 1 : 0);
      });
      var positionGroups = ["Transport Group", "Driver Group", "Warehouse Group"]
        .filter(function (g) { return byGroup[g]; });
      var groups = {};
      positionGroups.forEach(function (g) {
        var G = byGroup[g];
        var net = modeOf(G.nets) || NMW_FLOOR;
        groups[g] = {
          markup: modeOf(G.margins),                  // Agency · £/hr
          penPct: round2(modeOf(G.pens) / net * 100), // Agency · % of net (from rate card £/hr)
          hours: modeOf(G.hrs),                       // Agency · weekly hours
          net: net,                                   // Pay tier · read-only
        };
      });
      // Supplier-wide sick pay: representative non-zero £/hr top-up, else none.
      var nzSick = sickVals.filter(function (x) { return x > 0; });
      var sick = nzSick.length ? { type: "fixed", value: round2(modeOf(nzSick)) } : { type: "none", value: 0 };
      // Supplier-wide levy inclusion: included when most lines carry the levy.
      var levyOn = levyFlags.reduce(function (s, x) { return s + x; }, 0);
      var levyIncluded = levyFlags.length ? levyOn > levyFlags.length / 2 : true;
      return { positionGroups: positionGroups, groups: groups, sick: sick, levyIncluded: levyIncluded };
    }

    function loadEngines() { try { var v = JSON.parse(localStorage.getItem(LS_ENGINES)); if (v && typeof v === "object") return v; } catch (e) {} return {}; }
    function saveEngines() { try { localStorage.setItem(LS_ENGINES, JSON.stringify(state.engines)); } catch (e) {} }
    state.engines = loadEngines();
    function engineFor(idOrAgency) {
      var a = typeof idOrAgency === "string" ? AGENCIES.filter(function (x) { return x.id === idOrAgency; })[0] : idOrAgency;
      if (!a) return state.engine;

    function currentEngine() { return state.agencyOpen ? engineFor(state.agencyOpen) : state.engine; }
    function currentAgency() { return AGENCIES.filter(function (x) { return x.id === state.agencyOpen; })[0] || null; }

    // Faithful per-group charge build-up — reproduces the workbook formula:
    // holiday (WTR) on net; employer NI at 15% of (net + holiday) above the
    // £96/wk threshold spread over the group's weekly hours; levy on the paybill
    // when included; per-group pension % + supplier-wide sick on net; plus the
    // flat agency markup. Charge is pre-VAT; chargeVat adds standard-rated VAT.
    function previewParts(e, g) {
      var grp = (e.groups && e.groups[g]) || { net: NMW_FLOOR, hours: 40, penPct: 0, markup: 0 };
      var net = grp.net || NMW_FLOOR, hrs = grp.hours || 40;
      var holiday = net * WTR_PCT / 100;
      var ni = NI_PCT / 100 * Math.max(0, net + holiday - NI_THRESHOLD_WK / hrs);
      var pension = net * (grp.penPct || 0) / 100;
      var levy = e.levyIncluded ? (net + holiday + ni) * LEVY_PCT / 100 : 0;
      var sick = (!e.sick || e.sick.type === "none") ? 0 : e.sick.type === "pct" ? net * (e.sick.value || 0) / 100 : (e.sick.value || 0);
      var oncost = holiday + ni + pension + levy + sick;
      var payCost = net + oncost;
      var markup = grp.markup || 0;
      var charge = payCost + markup;
      return { base: net, hrs: hrs, holiday: holiday, ni: ni, pension: pension, levy: levy, sick: sick,
               oncost: oncost, payCost: payCost, markup: markup, charge: charge, chargeVat: charge * (1 + VAT_PCT / 100) };
    }

    // ── Audit: platform recomputes each line from the configured inputs ──
    // Platform charge = net pay + Σ statutory on-costs + agency margin.
    // Compared to the client's stated charge; ≤ £0.01 is rounding tolerance.
    function auditLine(r) {
      var oncosts = round2(r.wtr + r.eni + r.pen + r.levy + r.sick);
      var direct = round2(r.net + oncosts);
      var charge = round2(direct + r.margin);
      var dCharge = round2(charge - r.charge);
      var status = dCharge === 0 ? "exact" : (Math.abs(dCharge) <= 0.01 ? "rounding" : "variance");
      return { oncosts: oncosts, direct: direct, charge: charge, dCharge: dCharge, status: status };
    }

    function auditSummary(rows) {
      var s = { lines: rows.length, exact: 0, rounding: 0, variance: 0, maxAbs: 0 };
      rows.forEach(function (r) {
        var a = auditLine(r);

    }
    function liveCardVersionLabel(eid) {
      try {
        if (window.RC2 && window.RC2.cardForEngine && window.RC2.liveVersionLabel) {
          var c = window.RC2.cardForEngine(eid); if (c) return window.RC2.liveVersionLabel(c);
        }
      } catch (e) {}
      return "v2";
    }
    // Locations the bound engine version covers (declared scope + any operator
    // extension applied via the coverage panel's "extend engine" fix).
    function engineCoversLoc(eid, loc) {
      if (ENGINE_SCOPE_LOCS.indexOf(loc) >= 0) return true;
      return !!(state.engScopeExt && state.engScopeExt[eid + "|" + loc]);
    }
    // Seed/get the agency contract record. Existing agencies map to Active and
    // start fully covered (grandfathered); a Draft agency carries its declared
    // gaps. Scope = operating locations × position groups it bids.
    function ensureAgContract(a) {
      if (!state.agContracts[a.id]) {
        var locs = (a.markets || []).slice();
        var groups = Object.keys(a.pricing || {});
        if (!groups.length) groups = ["Warehouse Group"];
        var lifecycle = a.lifecycle || "active";
        var covered = {};
        // Active (grandfathered) agencies start covered for every in-engine-scope
        // pair; a Draft agency starts uncovered (its card isn't built yet).
        if (lifecycle !== "draft") {
          locs.forEach(function (loc) { groups.forEach(function (g) { if (engineCoversLoc("evri", loc)) covered[g + "|" + loc] = true; }); });
        }
        state.agContracts[a.id] = {
          engineId: "evri",
          engineVersion: a.engineVersion || "pinned",   // "pinned" | "live"
          lifecycle: lifecycle,
          scope: { locations: locs, positions: groups },
          covered: covered,
          contractVersion: 1,
          stamp: lifecycle === "active" ? { engineVersionId: engineVersionLabel("evri"), cardVersion: liveCardVersionLabel("evri") } : null,
        };
        saveAgContracts();
      }
      return state.agContracts[a.id];
    }
    function agLifecycle(a) { return ensureAgContract(a).lifecycle; }
    // Every (position × location) in scope, classified: covered / gap-engine
    // (type A, out of engine scope) / gap-card (type B, engine covers, no rate row).
    function coverageRows(a) {
      var k = ensureAgContract(a), eid = k.engineId, out = [];
      k.scope.locations.forEach(function (loc) {
        k.scope.positions.forEach(function (g) {
          var key = g + "|" + loc, st;
          if (!engineCoversLoc(eid, loc)) st = "gap-engine";
          else if (!k.covered[key]) st = "gap-card";
          else st = "covered";
          out.push({ key: key, group: g, loc: loc, status: st });
        });
      });
      return out;
    }
    function coverageGaps(a) { return coverageRows(a).filter(function (r) { return r.status !== "covered"; }); }
    // The invite gate (C.3): engine bound + card exists + zero gaps. Hard-blocks
    // Invite and Activate; the same check warns (non-blocking) in Draft.
    function inviteGate(a) {
      var k = ensureAgContract(a), reasons = [];
      if (!k.engineId) reasons.push("Bind a rate engine.");
      else if (!hasCardForEngine(k.engineId)) reasons.push("No rate card exists for the bound engine yet.");
      var gaps = coverageGaps(a);
      if (gaps.length) reasons.push(gaps.length + " coverage gap" + (gaps.length === 1 ? "" : "s") + " to resolve.");
      return { ok: reasons.length === 0, reasons: reasons, gaps: gaps };
    }

    // ---------- Part C UI builders ----------
    function agLifecycleChip(a) {
      var m = AG_LIFECYCLE[agLifecycle(a)] || AG_LIFECYCLE.active;
      return '<span class="ag-life ag-life--' + m.cls + '">' + m.label + '</span>';
    }
    // The gated primary action for the agency's current lifecycle state.
    function agGatedAction(a) {
      var lc = agLifecycle(a), gate = inviteGate(a);
      if (lc === "draft" || lc === "invited") {
        var label = lc === "draft" ? "Send invite" : "Activate contract";
        var act = lc === "draft" ? "ag-invite" : "ag-activate";
        var blocked = !gate.ok;
        return '<div class="ag-gate">' +
          '<button class="proto-btn proto-btn--primary ag-gate-btn" data-act="' + act + '"' + (blocked ? ' disabled aria-disabled="true"' : '') + '>' +
            ico(lc === "draft" ? "PersonPlus" : "Check") + label +
          '</button>' +
          (blocked
            ? '<div class="ag-gate-why">' + ico("Lock") + '<span>' + esc(label) + ' is blocked until: ' + gate.reasons.map(esc).join(" ") + '</span></div>'
            : '<div class="ag-gate-ok">' + ico("Check") + '<span>Coverage is complete \u2014 ready to ' + (lc === "draft" ? "invite" : "activate") + '.</span></div>') +
        '</div>';
      }
      if (lc === "active") return '<button class="proto-linkbtn" data-act="ag-deactivate">Deactivate Agency Contract</button>';
      return '<button class="proto-btn proto-btn--ghost" data-act="ag-reactivate">' + ico("Refresh") + 'Reactivate contract</button>';
    }
    function esc(s) { return escapeHtml(s); }

    // The "Pricing Configuration Contract" accordion body: engine binding, the
    // resolved rate card + coverage chip, and the coverage panel (C.6).
    function agencyContractSection(a) {
      var k = ensureAgContract(a), eid = k.engineId;
      var rows = coverageRows(a), gaps = rows.filter(function (r) { return r.status !== "covered"; });
      var draftLike = k.lifecycle === "draft";
      var engName = eid === "evrip" ? "Evri Premium" : "Evri";
      var verLabel = engineVersionLabel(eid);
      var pinned = k.engineVersion !== "live";

      // Binding card — the engine + version (pinned vs live auto-follow).
      var editable = draftLike;
      var bindCard = '<div class="ag-cc-card">' +
        '<div class="ag-cc-card-head">' + ico("DataGridView") + '<span class="ag-cc-card-t">Bound rate engine</span>' +
          '<span class="ag-cc-badge">One engine per agency</span></div>' +
        '<div class="ag-cc-bind">' +
          '<div class="ag-cc-engine">' +
            '<span class="ag-cc-engine-name">' + esc(engName) + ' pricing engine</span>' +
            '<span class="ag-cc-engine-ver">' + (pinned ? "Pinned to " + esc(verLabel) : "Live \u2014 follows published " + esc(verLabel)) + '</span>' +
          '</div>' +
          '<div class="ag-cc-vermode" role="group" aria-label="Engine version mode">' +
            '<button class="ag-seg-btn' + (pinned ? " is-on" : "") + '"' + (editable ? '' : ' disabled') + ' data-act="ag-bind-version" data-mode="pinned">Pinned</button>' +
            '<button class="ag-seg-btn' + (!pinned ? " is-on" : "") + '"' + (editable ? '' : ' disabled') + ' data-act="ag-bind-version" data-mode="live">Live</button>' +
          '</div>' +
        '</div>' +
        (pinned
          ? '<p class="ag-cc-note">' + ico("Information") + 'The agency stays on this version until an operator migrates it through the coverage gate \u2014 the whole chain stays reproducible.</p>'
          : '<p class="ag-cc-note ag-cc-note--warn">' + ico("Alert") + 'Auto-follow: a new engine version can introduce coverage gaps without an explicit opt-in.</p>') +
      '</div>';

      // Rate card card — resolves through the shared engine, with coverage chip.
      var card = null; try { card = window.RC2 && window.RC2.cardForEngine ? window.RC2.cardForEngine(eid) : null; } catch (e) {}
      var cardName = card ? card.name : (engName + " rate card");
      var cardVer = card && window.RC2.liveVersionLabel ? window.RC2.liveVersionLabel(card) : liveCardVersionLabel(eid);
      var covChip = gaps.length
        ? '<span class="ag-cov-chip ag-cov-chip--gap">' + ico("Alert") + gaps.length + ' gap' + (gaps.length === 1 ? "" : "s") + '</span>'
        : '<span class="ag-cov-chip ag-cov-chip--ok">' + ico("Check") + 'Complete</span>';
      var cardCard = '<div class="ag-cc-card">' +
        '<div class="ag-cc-card-head">' + ico("CreditCard") + '<span class="ag-cc-card-t">Rate card (value layer)</span>' + covChip + '</div>' +
        '<div class="ag-cc-bind">' +
          '<div class="ag-cc-engine">' +
            '<span class="ag-cc-engine-name">' + esc(cardName) + '</span>' +
            '<span class="ag-cc-engine-ver">Resolves through the engine \u00b7 live ' + esc(cardVer || "\u2014") + '</span>' +
          '</div>' +
          (hasCardForEngine(eid) ? '' : '<span class="ag-cc-badge ag-cc-badge--miss">No card yet</span>') +
        '</div>' +
      '</div>';

      // Provenance stamp on active contracts.
      var stampHtml = (k.lifecycle === "active" && k.stamp)
        ? '<p class="ag-cc-stamp">' + ico("Lock") + 'Contract v' + k.contractVersion + ' runs against engine ' + esc(k.stamp.engineVersionId) + ' \u00b7 rate card ' + esc(k.stamp.cardVersion) + '.</p>'
        : '';

      // Operating scope + scope-expansion control (opens a new contract version).
      var locUniverse = ENGINE_SCOPE_LOCS.concat(EXTRA_SCOPE_LOCS).filter(function (l) { return k.scope.locations.indexOf(l) < 0; });
      var scopeChips = k.scope.locations.map(function (l) {
        var inEng = engineCoversLoc(eid, l);
        return '<span class="ag-scope-chip' + (inEng ? "" : " ag-scope-chip--out") + '">' + esc(l) + (inEng ? "" : ico("Alert")) + '</span>';
      }).join("");
      var addMenu = state.agScopeAddOpen
        ? '<div class="ag-scope-add-menu">' + locUniverse.map(function (l) {
            return '<button class="ag-scope-add-opt" data-act="ag-scope-add" data-loc="' + esc(l) + '">' + esc(l) + (ENGINE_SCOPE_LOCS.indexOf(l) < 0 && !engineCoversLoc(eid, l) ? '<span class="ag-scope-add-out">out of engine scope</span>' : '') + '</button>';
          }).join("") + '</div>'
        : '';
      var scopePanel = '<div class="ag-cc-card">' +
        '<div class="ag-cc-card-head">' + ico("Globe") + '<span class="ag-cc-card-t">Operating scope</span>' +
          '<span class="ag-cc-sub">' + k.scope.positions.length + ' position group' + (k.scope.positions.length === 1 ? "" : "s") + ' \u00d7 ' + k.scope.locations.length + ' location' + (k.scope.locations.length === 1 ? "" : "s") + '</span></div>' +
        '<div class="ag-scope-chips">' + scopeChips +
          '<span class="ag-scope-add-wrap"><button class="ag-scope-add-btn" data-act="ag-scope-add-toggle">' + ico("AddCircle") + 'Add location</button>' + addMenu + '</span>' +
        '</div>' +
        '<p class="ag-cc-note">' + ico("Information") + 'Editing scope opens a new contract version and re-runs coverage on the new pairs.</p>' +
      '</div>';

      // Coverage panel — every uncovered (position × location) pair, classified,
      // with the fix routed to the correct layer (C.4).
      var covPanel;
      if (!gaps.length) {
        covPanel = '<div class="ag-cov-panel ag-cov-panel--ok">' + ico("Check") +
          '<span>Full coverage \u2014 every position \u00d7 location in scope resolves to a rate under the bound engine version.</span></div>';
      } else {
        covPanel = '<div class="ag-cov-panel">' +
          '<div class="ag-cov-head">' + ico("Alert") + '<span>' + gaps.length + ' uncovered ' + (gaps.length === 1 ? "pair" : "pairs") + '</span>' +
            (draftLike ? '<span class="ag-cov-mode ag-cov-mode--warn">Warning \u2014 close before inviting</span>' : '<span class="ag-cov-mode ag-cov-mode--block">Blocks activate</span>') + '</div>' +
          gaps.map(function (r) {
            var typeA = r.status === "gap-engine";
            return '<div class="ag-cov-row">' +
              '<div class="ag-cov-pair"><span class="ag-cov-pos">' + esc(r.group.replace(" Group", "")) + '</span>' +
                '<span class="ag-cov-x">\u00d7</span><span class="ag-cov-loc">' + esc(r.loc) + '</span></div>' +
              '<span class="ag-cov-type ag-cov-type--' + (typeA ? "a" : "b") + '">' + (typeA ? "Out of engine scope" : "No rate row") + '</span>' +
              (typeA
                ? '<button class="ag-cov-fix" data-act="ag-fix-engine" data-key="' + esc(r.key) + '" data-loc="' + esc(r.loc) + '">' + ico("DataGridView") + 'Extend engine version</button>'
                : '<button class="ag-cov-fix" data-act="ag-fix-card" data-key="' + esc(r.key) + '">' + ico("CreditCard") + 'Add rate-card rows</button>') +
            '</div>';
          }).join("") +
        '</div>';
      }

      return '<div class="ag-cc">' + bindCard + cardCard + stampHtml + scopePanel + covPanel + '</div>';
    }

    // ---------- Agencies → agency detail (router) ----------
    function agencyView() {
      var a = AGENCIES.filter(function (x) { return x.id === state.agencyOpen; })[0];
      if (!a) { state.agencyOpen = null; return agencyListView(); }
      if (a.id === "staffline") return agencyViewStaffline();
      return agencyViewGeneric(a);
    }

    // ---------- Generic agency detail, driven by the rate-card config ----------
    function agencyViewGeneric(a) {
      var cfg = agencyConfig(a);
      var configured = isConfigured(a.id);
      var acc = [
        { id: "details", title: "Agency Details", icon: "Briefcase" },
        { id: "pricing", title: "Pricing Configuration Contract", icon: "DataGridView" },
        { id: "ratecards", title: "Rate cards", icon: "Wallet" },
        { id: "cancel",  title: "Cancellation Policy", icon: "Settings" },
        { id: "users",   title: "Users", icon: "Employees" },
        { id: "comments",title: "Comments", icon: "Notes" },
        { id: "logs",    title: "Logs", icon: "Row" },
      ];
      var bodies = {
        details:
          '<div class="proto-fieldgrid">' +
            field("Legal name", escapeHtml(a.name) + (/(group|recruitment|co|connection|staff)/i.test(a.name) ? "" : " Recruitment") + " Ltd") +
            field("Primary contact", escapeHtml(a.contact)) +
            field("Email", escapeHtml(a.email)) +
            field("Markets served", cfg.sites.length ? escapeHtml(cfg.sites.join(", ")) : "\u2014") +
            field("Job types", cfg.jobTypes.length ? escapeHtml(cfg.jobTypes.join(", ")) : "\u2014") +
            field("Sectors", escapeHtml(sectorsFor(cfg).join(", "))) +
          '</div>',
        pricing: agencyContractSection(a),
        ratecards: agencyRateCards(a),
        cancel:  '<p class="muted" style="margin-top:4px">Free cancellation up to 24 hours before shift start. Within 24 hours, a 4-hour minimum applies.</p>',
        users:   '<p class="muted" style="margin-top:4px">No agency users have been invited yet.</p>',
        comments:'<p class="muted" style="margin-top:4px">No comments on this contract.</p>',
        logs:    (configured
          ? '<p class="muted" style="margin-top:4px">Contract activated ' + escapeHtml(a.activated) + '. Pricing configuration applied from the rate card.</p>'
          : '<p class="muted" style="margin-top:4px">Contract activated ' + escapeHtml(a.activated) + '. Pricing not yet applied.</p>'),
      };
      var accHtml = acc.map(function (it) {
        return '<div class="proto-acc-item' + (state.openAcc[it.id] ? " is-open" : "") + '" data-acc="' + it.id + '">' +
          '<button class="proto-acc-head" data-acctoggle="' + it.id + '">' +
            ico(it.icon, "lead") +
            '<span class="proto-acc-title">' + it.title + '</span>' +
            '<span class="proto-acc-chev proto-ico" data-icon="ChevronDown"></span>' +
          '</button>' +
          '<div class="proto-acc-body">' + (bodies[it.id] || "") + '</div>' +
        '</div>';
      }).join("");

      return crumb([
        { label: "Agencies", act: "noop" },
        { label: "Active Agencies", act: "agency-list" },
        { label: a.name },
      ]) +
      '<div class="proto-card proto-hero">' +
        '<div class="proto-hero-logo">' + monogram(a.name) + '</div>' +
        '<div class="proto-hero-main">' +
          '<h2>' + escapeHtml(a.name) + ' ' + agLifecycleChip(a) + '</h2>' +
          '<div class="proto-hero-line">' + escapeHtml(a.contact) + ' \u00b7 ' + escapeHtml(a.email) + '</div>' +
          '<div class="proto-hero-line">GUID: <span class="mono">' + agencyGuid(a.id) + '</span></div>' +
          '<div class="proto-hero-line">' + (agLifecycle(a) === "draft" ? 'Status: <b>Draft \u2014 not yet invited</b>' : 'Activation Date: <b>' + escapeHtml(a.activated) + '</b>') + '</div>' +
        '</div>' +
        '<div class="proto-hero-stats">' +
          stat(String(cfg.sites.length), "Markets") + stat(String(cfg.jobTypes.length), "Job types") + stat(String(cfg.lineCount), "Rate lines") +
        '</div>' +
      '</div>' +
      '<div class="proto-acc">' + accHtml + '</div>' +
      agGatedAction(a);
    }

    // Simple 2-letter monogram tile for an agency (Everest-styled).
    function monogram(name) {
      var letters = name.replace(/[^A-Za-z]/g, "");
      var initials = (letters.slice(0, 2) || "AG").toUpperCase();
      return '<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">' +
        '<rect x="3" y="3" width="58" height="58" rx="14" fill="#161F5A"/>' +
        '<text x="32" y="41" text-anchor="middle" font-family="Clarika Geometric, Helvetica, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="-0.5" fill="#FFFFFF">' + escapeHtml(initials) + '</text></svg>';
    }

    // Rate cards body — the agency pay-rate table from the rate-card
    // uploader (window.RA, "Rate cards" output), scoped to this one agency
    // by supplier. Mounts on render() into #ag-ratecards-root.
    function agencyRateCards(a) {
      if (!a) return '<p class="muted" style="margin-top:4px">No agency selected.</p>';
      var sup = pdfNameFor(a);
      return '<div class="ag-ratecards" id="ag-ratecards-root" data-ag-supplier="' + escapeHtml(sup) + '"></div>';
    }

    // Rate cards body — the agency rate (pay) recipe table from the rate-card
    // uploader (window.RC, the "Agency rate" table), read-only and scoped to
    // this one agency. Mounts on render() into #ag-ratecards-root. A version
    // selector mirrors the rate-card version history in Settings.
    function agencyRateCards(a) {
      if (!a) return '<p class="muted" style="margin-top:4px">No agency selected.</p>';
      var sup = pdfNameFor(a);
      return agencyRateCardVersionBar() +
        '<div class="ag-ratecards" id="ag-ratecards-root" data-ag-supplier="' + escapeHtml(sup) + '"></div>';
    }

    // Version selector for the agency rate-card view — same date-effective
    // versions as Settings → Rate Cards. Defaults to the live version.
    function agencyRateCardVersionBar() {
      var tl = versionTimeline();
      if (!tl.length) return '';
      var live = tl.filter(function (v) { return v.status === "active"; })[0] || tl[tl.length - 1];
      var selNo = state.agencyRcVersion != null ? state.agencyRcVersion : live.version;
      var sel = tl.filter(function (v) { return v.version === selNo; })[0] || live;
      var m = verStatusMeta(sel.status);
      var opts = tl.slice().reverse().map(function (v) {
        var vm = verStatusMeta(v.status);
        return '<option value="' + v.version + '"' + (v.version === selNo ? ' selected' : '') + '>v' + v.version + ' \u00b7 ' + vm.label + '</option>';
      }).join('');
      return '<div class="ag-rc-verbar">' +
        '<div class="ag-rc-verbar-main">' +
          ico("CreditCard", "ag-rc-verbar-ico") +
          '<label class="ag-rc-versel"><span class="ag-rc-versel-l">Rate card version</span>' +
            '<span class="proto-select ag-rc-verselect"><select data-ag-rcver>' + opts + '</select></span></label>' +
          '<span class="proto-ver-badge ' + m.cls + '">' + m.label + '</span>' +
          '<span class="ag-rc-vereff">' + escapeHtml(verEffectivePhrase(sel)) + '</span>' +
        '</div>' +
        '<span class="ag-rc-verbar-src">' + ico("Excel", "ag-rc-verbar-src-ico") + escapeHtml(sel.source) + '</span>' +
      '</div>';
    }

    // Rate Configuration body — the EXACT config from the rate card.
    function agencyPricingConfig(a) {
      var cfg = agencyConfig(a);
      var configured = isConfigured(a.id);
      if (!cfg.lineCount) {
        return '<p class="muted" style="margin-top:4px">This agency has no priced lines in the current rate card.</p>';
      }
      // margin-by-group summary chips
      var marginChips = cfg.margins.map(function (m) {
        var label = m.vals.length === 1 ? gbp(m.vals[0]) : gbp(m.vals[0]) + "\u2013" + gbp(m.vals[m.vals.length - 1]);
        return '<span class="ag-chip"><span class="ag-chip-k">' + escapeHtml(m.group.replace(" Group", "")) + '</span><span class="ag-chip-v">' + label + ' / hr</span></span>';
      }).join("");

      // the exact rate lines as priced in the client's workbook
      var body = cfg.rows.map(function (r) {
        return '<tr>' +
          '<td>' + escapeHtml(r.loc) + '</td>' +
          '<td>' + escapeHtml(r.jt) + '</td>' +
          '<td class="num">' + r.hrs + '</td>' +
          '<td class="num">' + gbp(r.net) + '</td>' +
          '<td class="num">' + gbp(r.wtr) + '</td>' +
          '<td class="num">' + gbp(r.eni) + '</td>' +
          '<td class="num">' + gbp(r.pen) + '</td>' +
          '<td class="num">' + gbp(r.levy) + '</td>' +
          '<td class="num">' + gbp(r.sick) + '</td>' +
          '<td class="num ag-col-strong">' + gbp(r.direct) + '</td>' +
          '<td class="num">' + gbp(r.margin) + '</td>' +
          '<td class="num ag-col-charge">' + gbp(r.charge) + '</td>' +
        '</tr>';
      }).join("");

      var applyRow = configured
        ? '<div class="ag-apply-bar ag-apply-bar--ok">' + ico("Check", "lead") +
            '<div class="ag-apply-text"><b>Configuration applied</b><span>' + cfg.lineCount + ' rate lines from the client rate card are live for this agency.</span></div>' +
            '<button class="proto-btn proto-btn--secondary" data-act="open-audit" data-agid="' + a.id + '" style="margin-left:auto">' + ico("ClipboardCircleCheck") + 'View in audit</button>' +
            '<button class="proto-btn proto-btn--ghost" data-act="apply-config" data-agid="' + a.id + '">Re-apply</button>' +
          '</div>'
        : '';

      return applyRow +
        agencyEngineSettings(a, engineFor(a)) +
        '<div class="proto-set-section-label">Rate-card lines \u00b7 ' + cfg.lineCount + ' <span class="ag-src-tag">source</span></div>' +
        '<p class="muted" style="margin:6px 0 0;font:var(--evr-body2)">The exact priced lines this configuration is read from \u2014 the client\u2019s workbook, by site \u00d7 job type.</p>' +
        '<div class="proto-table-wrap"><table class="proto-table ag-cfg-table"><thead><tr>' +
          '<th>Site</th><th>Job type</th><th>Hrs</th><th>Net pay</th><th>WTR</th><th>Employer NI</th><th>Pension</th><th>App. levy</th><th>Sick pay</th><th>Direct cost</th><th>Margin</th><th>Charge rate</th>' +
        '</tr></thead><tbody>' + body + '</tbody></table></div>' +
        '<p class="ag-cfg-foot muted">Source: Rate Card Automation workbook \u00b7 Charge Rate Calculations tab \u00b7 nominal net pay \u00a312.21, NI threshold \u00a396/wk.</p>';
    }

    // ============================================================
    //  Rate alignment audit — does the platform reproduce the client's
    //  rate-card calculation? Recomputes every priced line (net pay +
    //  statutory on-costs + agency margin) and reconciles it against the
    //  charge rate stated in the client's workbook.
    // ============================================================
    function fmtDelta(d) {
      if (d === 0) return "\u00a30.00";
      return (d > 0 ? "+" : "\u2212") + "\u00a3" + Math.abs(d).toFixed(2);
    }
    function statusPill(st) {
      if (st === "exact") return '<span class="au-pill au-pill--exact">' + ico("Check") + 'Exact</span>';
      if (st === "rounding") return '<span class="au-pill au-pill--round">Rounding</span>';
      return '<span class="au-pill au-pill--var">Variance</span>';
    }

    function auditView() {
      if (state.auditAgency) return auditAgencyView(state.auditAgency);

      var ags = configurableAgencies();
      var overall = { lines: 0, exact: 0, rounding: 0, variance: 0 };
      var perAgency = ags.map(function (a) {
        var rows = pdfRowsForAgency(a);
        var s = auditSummary(rows);
        overall.lines += s.lines; overall.exact += s.exact; overall.rounding += s.rounding; overall.variance += s.variance;
        return { a: a, s: s };
      });
      var aligned = overall.exact + overall.rounding;
      var alignedPct = overall.lines ? Math.round(aligned / overall.lines * 100) : 0;

      var statRow =
        '<div class="au-stats">' +
          auStat(String(overall.lines), "Rate lines checked", "") +
          auStat(alignedPct + "%", "Reconciled", "ok") +
          auStat(String(overall.rounding), "Within \u00a30.01 rounding", "round") +
          auStat(String(overall.variance), "Variances > \u00a30.01", overall.variance ? "var" : "ok") +
          auStat(configuredCount() + " / " + ags.length, "Agencies applied", "") +
        '</div>';

      var trows = perAgency.map(function (p) {
        var a = p.a, s = p.s;
        var st = s.variance ? "var" : "ok";
        return '<tr class="au-arow is-clickable" data-audit-agency="' + a.id + '">' +
          '<td class="au-aname">' + escapeHtml(a.name) +
            (isConfigured(a.id) ? '<span class="ag-pill ag-pill--ok">' + ico("Check") + 'Applied</span>' : '<span class="ag-pill ag-pill--wait">Pending</span>') + '</td>' +
          '<td class="num">' + s.lines + '</td>' +
          '<td class="num au-ok">' + (s.exact + s.rounding) + '</td>' +
          '<td class="num">' + s.rounding + '</td>' +
          '<td class="num ' + (s.variance ? "au-var" : "") + '">' + s.variance + '</td>' +
          '<td class="num">' + fmtDelta(round2(s.maxAbs)) + '</td>' +
          '<td><span class="au-rollup au-rollup--' + st + '">' + (s.variance ? "Review" : "Reconciled") + '</span></td>' +
          '<td class="au-go"><span class="proto-ico" data-icon="ChevronRight"></span></td>' +
        '</tr>';
      }).join("");

      return crumb([
        { label: "Agencies", act: "noop" },
        { label: "Active Agencies", act: "agency-list" },
        { label: "Rate alignment audit" },
      ]) +
      '<div class="proto-card au-card">' +
        '<div class="ag-list-head">' + ico("ClipboardCircleCheck", "lead") + '<h2>Rate Alignment Audit</h2></div>' +
        '<p class="muted au-intro">For every configured agency, the platform recomputes each rate line \u2014 nominal net pay plus statutory on-costs (WTR, employer NI, pension, apprenticeship levy, sick pay) plus the agency margin \u2014 and reconciles it against the charge rate the client states in the Rate Card Automation workbook. Differences of \u00a30.01 or less are workbook rounding.</p>' +
        statRow +
        (overall.variance === 0
          ? '<div class="au-banner au-banner--ok">' + ico("Check", "lead") + 'All ' + overall.lines + ' priced lines reconcile to the client rate card within \u00a30.01 rounding tolerance.</div>'
          : '<div class="au-banner au-banner--var">' + ico("Alert", "lead") + overall.variance + ' line' + (overall.variance === 1 ? "" : "s") + ' differ from the client rate card by more than \u00a30.01 \u2014 review below.</div>') +
        '<div class="proto-table-wrap"><table class="proto-table au-table"><thead><tr>' +
          '<th>Agency</th><th>Lines</th><th>Reconciled</th><th>Rounding</th><th>Variances</th><th>Max \u0394</th><th>Status</th><th></th>' +
        '</tr></thead><tbody>' + trows + '</tbody></table></div>' +
      '</div>';
    }
    function auStat(v, l, tone) {
      return '<div class="au-stat au-stat--' + (tone || "n") + '"><span class="au-stat-v">' + v + '</span><span class="au-stat-l">' + l + '</span></div>';
    }

          auStat(String(s.variance), "Variances", s.variance ? "var" : "ok") +
          auStat(fmtDelta(round2(s.maxAbs)), "Max \u0394 / hr", "") +
        '</div>' +
        (s.variance === 0
          ? '<div class="au-banner au-banner--ok">' + ico("Check", "lead") + 'Every line reconciles to the client rate card within \u00a30.01.</div>'
          : '<div class="au-banner au-banner--var">' + ico("Alert", "lead") + s.variance + ' line' + (s.variance === 1 ? "" : "s") + ' exceed \u00a30.01 \u2014 highlighted below.</div>') +

          '<th>Site</th><th>Job type</th><th>Net pay</th><th>On-costs</th><th>Margin</th><th>Client charge</th><th>Platform charge</th><th>\u0394 / hr</th><th>Status</th>' +
        '</tr></thead><tbody>' + body + '</tbody></table></div>' +
        '<p class="ag-cfg-foot muted">Client charge = the rate stated in the Rate Card Automation workbook. Platform charge = net pay + on-costs + margin, recomputed by the platform engine.</p>' +

            '<h2 class="agv1-hero-name">Staffline Group <span class="agv1-tag ok">Active</span></h2>' +

    function field(k, v) { return '<div class="proto-field"><div class="k">' + k + '</div><div class="vv">' + v + '</div></div>'; }

    // Update only the derived bits (banners, peaks, error states, count,

    function rgSyncDerived() {
      var bz = app.querySelector("#rg-banners"); if (bz) bz.innerHTML = state.rcDetailPos ? rgDetailBanners(state.rcDetailPos) : rgBannersHtml();
      var cz = app.querySelector("#rg-count");

      var sv = app.querySelector("#rg-save"); if (sv) sv.disabled = !state.gridUI.dirty;

        var bf = app.querySelector("#rg-basefield-" + p.code); if (bf) bf.classList.toggle("is-error", miss);
        var bm = app.querySelector("#rg-basemiss-" + p.code); if (bm) bm.classList.toggle("is-hidden", !miss);

    // ---- grid mutations driven from the toolbar [data-act] switch ----
    function rgDupOverride(id) {
      var idx = -1;
      state.grid.overrides.forEach(function (o, i) { if (o.id === id) idx = i; });
      if (idx >= 0) {
        var src = state.grid.overrides[idx];
        state.grid.overrides.splice(idx + 1, 0, { id: rgUid(), pos: src.pos, cond: JSON.parse(JSON.stringify(src.cond || {})), rate: src.rate, up: src.up ? rgUp(src.up.type, src.up.val) : rgUp("pct", null) });
      }
      rgDirty(); render();
    }
    function rgRemoveCondition(k) {
      if (k === "agency") { toast("Supplier is a fixed first column and can\u2019t be removed"); return; }
      state.grid.active = state.grid.active.filter(function (x) { return x !== k; });
      state.grid.lookup = (state.grid.lookup || []).filter(function (x) { return x !== k; });
      state.grid.overrides.forEach(function (o) { if (o.cond) delete o.cond[k]; });
      delete state.gridUI.filters[k];
      rgDirty(); render(); toast(RG_CONDS[k].label + " column removed");
    }
    function rgAddCondition(k) {
      // No key (or an unavailable one) — fall back to the first addable.
      var addable = Object.keys(RG_CONDS).filter(function (x) { return state.grid.active.indexOf(x) < 0; });
      var next = (k && addable.indexOf(k) >= 0) ? k : addable[0];
      if (!next) { toast("All conditions are already columns"); return; }
      state.grid.active.push(next);
      if ((state.grid.lookup || []).indexOf(next) < 0) { state.grid.lookup = state.grid.lookup || []; state.grid.lookup.push(next); }
      state.gridUI.showAddMenu = false;
      rgDirty(); render(); toast(RG_CONDS[next].label + " column added");
    }
    function rgResetGrid() {
      if (!window.confirm("Reset the rate cards to seed data? This discards saved changes for this prototype.")) return;
      state.grid = rgSeed(); rgSave();
      state.gridUI = { collapsed: {}, filters: {}, showLookup: state.gridUI.showLookup, dirty: false, savedAt: null };
      render(); toast("Rate cards reset");
    }
    // Remove ALL rate cards — clears every base rate + override line, so the
    // page falls back to the empty upload state (rgHasCards() → false).
    function rgClearGrid() {
      if (!window.confirm("Remove all rate cards? This clears every base rate and override line and returns the page to the upload state.")) return;
      state.grid.overrides = [];
      state.grid.bases = {};
      state.grid.baseUp = {};
      RG_POSITIONS.forEach(function (p) { state.grid.bases[p.code] = null; state.grid.baseUp[p.code] = rgUp("pct", null); });
      rgSave();
      state.gridUI = { collapsed: {}, filters: {}, showLookup: false, dirty: false, savedAt: null };
      render(); toast("Rate cards removed");
    }
    function rgReorderField(fromKey, toKey) {
      if (!fromKey || !toKey || fromKey === toKey) return false;
      var arr = state.grid.active.slice(), fi = arr.indexOf(fromKey), ti = arr.indexOf(toKey);
      if (fi < 0 || ti < 0) return false;
      arr.splice(fi, 1); arr.splice(ti, 0, fromKey);
      state.grid.active = arr; state.grid.lookup = arr.slice();
      return true;
    }
    // Bind grid-specific inputs each render (full re-render rebinds).
    function rgWire() {
      app.querySelectorAll("[data-rg-base]").forEach(function (inp) {
        inp.addEventListener("input", function () { state.grid.bases[inp.getAttribute("data-rg-base")] = inp.value === "" ? null : Number(inp.value); rgDirty(); rgSyncDerived(); });
      });
      app.querySelectorAll("[data-pe-name]").forEach(function (inp) {
        inp.addEventListener("input", function () { var it = rcFindPe(inp.getAttribute("data-pe-kind"), inp.getAttribute("data-pe-name")); if (it) it.label = inp.value; rgDirty(); });
      });

      });
      app.querySelectorAll("[data-rg-baseup-type]").forEach(function (b) {

      });
      app.querySelectorAll("[data-rg-rate]").forEach(function (inp) {
        inp.addEventListener("input", function () { var o = rgFindOver(inp.getAttribute("data-rg-rate")); if (o) o.rate = inp.value === "" ? null : Number(inp.value); rgDirty(); rgSyncDerived(); });
      });
      app.querySelectorAll("[data-rg-up-val]").forEach(function (inp) {
        inp.addEventListener("input", function () { var o = rgFindOver(inp.getAttribute("data-rg-up-val")); if (o) { o.up = o.up || rgUp("pct", null); o.up.val = inp.value === "" ? null : Number(inp.value); } rgDirty(); rgSyncDerived(); });
      });
      app.querySelectorAll("[data-rg-up-type]").forEach(function (b) {
        b.addEventListener("click", function () { var o = rgFindOver(b.getAttribute("data-rg-up-type")); if (o) { o.up = o.up || rgUp("pct", null); o.up.type = b.getAttribute("data-uptype"); } rgDirty(); render(); });
      });
      app.querySelectorAll("[data-rg-cond]").forEach(function (sel) {
        sel.addEventListener("change", function () {
          var o = rgFindOver(sel.getAttribute("data-rg-cond")), k = sel.getAttribute("data-condkey");

      });
      app.querySelectorAll("[data-rg-filter]").forEach(function (sel) {

      });
      var pfSel = app.querySelector("[data-rg-posfilter]");
      if (pfSel) pfSel.addEventListener("change", function () { state.gridUI.posFilter = pfSel.value; render(); });
      app.querySelectorAll("[data-rg-collapse]").forEach(function (b) {
        b.addEventListener("click", function () { var c = b.getAttribute("data-rg-collapse"); state.gridUI.collapsed[c] = !state.gridUI.collapsed[c]; render(); });
      });
      app.querySelectorAll("[data-rg-addover]").forEach(function (b) {
        b.addEventListener("click", function () { state.grid.overrides.push({ id: rgUid(), pos: b.getAttribute("data-rg-addover"), cond: {}, rate: null, up: rgUp("pct", null) }); rgDirty(); render(); });

      app.querySelectorAll("[data-rg-del]").forEach(function (b) { b.addEventListener("click", function () { state.grid.overrides = state.grid.overrides.filter(function (x) { return x.id !== b.getAttribute("data-rg-del"); }); rgDirty(); render(); }); });
      app.querySelectorAll("[data-rg-removecond]").forEach(function (b) { b.addEventListener("click", function () { rgRemoveCondition(b.getAttribute("data-rg-removecond")); }); });
      app.querySelectorAll("[data-rg-addcond-pick]").forEach(function (b) { b.addEventListener("click", function () { rgAddCondition(b.getAttribute("data-rg-addcond-pick")); }); });
      // Close the add-condition menu on an outside click / Escape.
      if (state.gridUI.showAddMenu) {
        var closeAdd = function (e) {
          if (e.type === "keydown" && e.key !== "Escape") return;
          if (e.type === "click" && e.target.closest("[data-rg-addcond-wrap]")) return;
          state.gridUI.showAddMenu = false;
          document.removeEventListener("click", closeAdd, true);
          document.removeEventListener("keydown", closeAdd, true);
          render();
        };
        setTimeout(function () {
          document.addEventListener("click", closeAdd, true);

        }, 0);
      }

      var dragged = null;
      app.querySelectorAll("[data-rglk],[data-rgcol]").forEach(function (el) {
        var key = el.getAttribute("data-rglk") || el.getAttribute("data-rgcol");

          if (rgReorderField(from, key)) { rgDirty(); render(); toast("Lookup order updated"); }
        });
      });

    // ============================================================
    //  BOOKING SIMULATOR  (Settings → Configuration → Booking Simulator)
    //  Resolve a booking against the rate cards grid above, then run the
    //  UK pay-to-bill build-up: worker pay → WTR holiday → employer NI →
    //  pension → apprenticeship levy → seasonal allowance (the rate
    //  card's own uplift, in peak season) → agency markup → VAT. Every
    //  constant is editable in an assumptions panel and persists locally.
    //  Phase 1: flat NI / pension (no thresholds), no NMW floor check.
    // ============================================================
    var LS_BSIM_IN  = "flexwork-proto-rate-automation-bsim-inputs-v7";
    var LS_BSIM_ASM = "flexwork-proto-rate-automation-bsim-asm-v4";
    var BSIM_BAR_COLOR = {
      worker: "var(--evr-blue-400)", statutory: "var(--evr-teal-400)",
      seasonal: "var(--evr-orange-400)", markup: "var(--evr-purple-400)", tax: "var(--evr-neutral-50)",
    };

    // The base pricing engine is the MASTER RATE CARD resolved on the Rate
    // Cards screen. The booking's agency selection then layers that agency's
    // override lines (Rate Cards \u2192 Agency condition) and its real per-hour
    // margin on top of the master engine. Statutory on-costs are shared and
    // default to the values in the Evri rate-card workbook (NMW net pay, WTR
    // 12.07%, Employer NI 15% above the \u00a396/wk allowance, pension,
    // apprenticeship levy 0.5%).
    var BSIM_STAT = { holidayPct: 12.07, niPct: 15, niWeeklyAllowance: 96, weeklyHours: 40, pensionPct: 3, levyPct: 0.5, sickPct: 1, geoAllowance: 0.30, nightUplift: 1.50, otThresholdHours: 40, otMultiplier: 1.5, vatPct: 20 };
    // Agencies set up in the Agencies tab. Each carries the engine settings
    // edited on its detail page (Rate Configuration) — the
    // statutory on-costs + per-group markup. Today only Staffline Group is
    // configured; new agencies appear here automatically as they are added.
    function bsimAgencyRegistry() { return { "Staffline Group": state.engine }; }
    function bsimAgencies() { return Object.keys(bsimAgencyRegistry()); }
    function bsimAgencyEngine(name) { return bsimAgencyRegistry()[name] || null; }
    // ---- rate-card configurations (versions) + their pricing rules -------
    // Each rate-card VERSION is a pricing configuration. It carries the set
    // of pricing RULES it applies (keys below). The simulator reads the
    // selected version's rules to decide (a) which booking inputs actually
    // matter and (b) which on-cost lines to build — so the form and the
    // numbers reflect exactly that card. `needs` lists the booking inputs a
    // rule depends on: an input is shown only when some active rule needs it.
    var BSIM_RULE_CATALOG = [
      { key: "pay",     label: "Worker pay",             group: "worker",    needs: [] },
      { key: "overtime",label: "Overtime premium",       group: "worker",    needs: ["workedHours", "shift"] },
      { key: "geo",     label: "Geo allowance",          group: "worker",    needs: ["location"] },
      { key: "shiftdiff",label: "Shift differential",     group: "worker",    needs: ["shift"] },
      { key: "holiday", label: "WTR holiday pay",        group: "worker",    needs: [] },
      { key: "ni",      label: "Employer NI",            group: "statutory", needs: [] },
      { key: "niRelief",label: "NI age-band relief",     group: "statutory", needs: ["age"] },
      { key: "pension", label: "Pension",                group: "statutory", needs: ["age"] },
      { key: "levy",    label: "Apprenticeship levy",    group: "statutory", needs: [] },
      { key: "sick",    label: "Sick pay",               group: "statutory", needs: [] },
      { key: "tenure",  label: "Tenure margin reduction",group: "markup",    needs: ["tenureWeeks"] },
      { key: "markup",  label: "Agency margin",          group: "markup",    needs: ["agency"] },
      { key: "vat",     label: "VAT",                    group: "tax",       needs: [] },
    ];
    var BSIM_RULE_BY = {}; BSIM_RULE_CATALOG.forEach(function (r) { BSIM_RULE_BY[r.key] = r; });
    var BSIM_DEFAULT_RULES = BSIM_RULE_CATALOG.map(function (r) { return r.key; });
    // The booking conditions a card can vary PAY by that the user picks
    // directly (job type is derived from the position, so not listed).
    var BSIM_SELECTABLE_CONDS = ["location", "agency", "parity"];

    // Decorated version list (oldest → newest, with status/startDate).
    function bsimVersions() { return versionTimeline(); }
    function bsimActiveVersionNo() {
      var vs = bsimVersions(); if (!vs.length) return null;
      var a = vs.filter(function (v) { return v.status === "active"; })[0] || vs[vs.length - 1];
      return a ? a.version : null;
    }
    function bsimSelectedVersion() {
      var vs = bsimVersions(); if (!vs.length) return null;
      var no = state.bsim && state.bsim.version;
      return vs.filter(function (v) { return v.version === no; })[0]
        || vs.filter(function (v) { return v.status === "active"; })[0]
        || vs[vs.length - 1];
    }
    function bsimVersionRules(v) { return (v && Array.isArray(v.rules) && v.rules.length) ? v.rules : BSIM_DEFAULT_RULES; }
    function bsimHasRule(v, key) { return bsimVersionRules(v).indexOf(key) >= 0; }
    // The active card is the live grid; older cards use their captured snapshot.
    function bsimVersionGrid(v) {
      if (!v) return state.grid;
      if (v.status === "active") return state.grid;
      return v.grid || state.grid;
    }
    // Which booking inputs the selected card actually depends on — the union
    // of the conditions it varies pay by and every input its rules need.
    function bsimInputsForVersion(v) {
      var grid = bsimVersionGrid(v), active = (grid && grid.active) || [], set = {};
      BSIM_SELECTABLE_CONDS.forEach(function (k) { if (active.indexOf(k) >= 0) set[k] = true; });
      set.agency = true; // agency always layers its margin + on-costs
      bsimVersionRules(v).forEach(function (key) {

    // Tenure-banded margin reduction (£/hr off the agency margin).

    // ---- resolution against a SPECIFIC card's grid -----------------------
    function bsimLinesForPos(grid, code) {
      var lines = ((grid && grid.overrides) || []).filter(function (o) { return o.pos === code; })
        .map(function (o) { return { id: o.id, kind: "override", cond: o.cond || {}, rate: o.rate, up: o.up || null }; });
      var base = grid && grid.bases ? grid.bases[code] : null;
      if (base != null && base !== "") { var bu = (grid.baseUp && grid.baseUp[code]) || null; lines.push({ id: "base_" + code, kind: "base", cond: {}, rate: Number(base), up: bu }); }

      var ranked = lines.map(function (l, i) { return { l: l, i: i, score: bsimRankScoreFor(grid, l.cond) }; })
        .sort(function (a, b) { return (b.score - a.score) || (a.i - b.i); });
      for (var j = 0; j < ranked.length; j++) {

    }
    // Agency margin (£/hr) for the booking's agency + the position's group —
    // read live from that agency's engine settings on its detail page.
    function bsimMarginFor(agencyName, posCode) { var e = bsimAgencyEngine(agencyName); var g = rgPosGroup(posCode); return (e && e.markup && e.markup[g] != null) ? e.markup[g] : 0; }

    function bsimAsmForBooking(inp) {

        (e.onCosts || []).forEach(function (c) {
          var pct = c.on ? c.pct : 0;
