    }
    function bsimDefaults() { return bsimAsmForBooking(bsimInputDefaults()); }
    // Booking inputs. Which of these the form actually shows depends on the
    // selected rate-card version's rules (bsimInputsForVersion): the position
    // and the conditions the card varies by are always relevant; age appears
    // only with the NI age-relief rule, tenure only with the tenure rule, etc.
    function bsimInputDefaults() {
      var firstAgency = bsimAgencies()[0];
      return {
        version: null,            // selected rate-card version (set on load → active)
        position: "RC-DLOAD",
        location: "Warrington", agency: firstAgency,
        parity: "Post-parity",
        age: 22, tenureWeeks: 30,
        workedHours: 38,
        startTime: "18:00", endTime: "02:00",
      };
    }
    function bsimLoad(kind, fb) {
      try { var v = JSON.parse(localStorage.getItem(kind === "inputs" ? LS_BSIM_IN : LS_BSIM_ASM)); if (v && typeof v === "object") return Object.assign({}, fb, v); } catch (e) {}
      return Object.assign({}, fb);
    }
    function bsimSave() { try { localStorage.setItem(LS_BSIM_IN, JSON.stringify(state.bsim)); localStorage.setItem(LS_BSIM_ASM, JSON.stringify(state.bsimAsm)); } catch (e) {} }

    // ---- resolution (reuses the grid's lines + custom-lookup rank) ----
    function rgLineMatches(active, cond, booking) {
      for (var i = 0; i < active.length; i++) { var k = active[i], lv = cond[k]; if (lv == null || lv === RG_ALL) continue; if (lv !== booking[k]) return false; }

    }
    function rgResolveBooking(code, booking) {
      var lines = rgLinesForPos(code), active = state.grid.active;
      var ranked = lines.map(function (l, i) { return { l: l, i: i, score: rgRankScore(l.cond) }; })
        .sort(function (a, b) { return (b.score - a.score) || (a.i - b.i); });
      for (var j = 0; j < ranked.length; j++) {
        var L = ranked[j].l;
        if (rgLineMatches(active, L.cond, booking)) {
          return { rate: L.rate == null ? null : Number(L.rate), up: L.up || null, eff: rgApplyUplift(L.rate, L.up), source: L.kind, lineId: L.id };
        }
      }
      return { rate: null, up: null, eff: null, source: "none", lineId: null };
    }

    // ---- helpers ----
    function bsimNum(v) { var n = Number(v); return isFinite(n) ? n : 0; }
    function bsimMoney(v) { if (v == null || !isFinite(v)) return "\u2014"; return "\u00a3" + Number(v).toLocaleString("en-GB", { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
    function bsimRate(v) { if (v == null || !isFinite(v)) return "\u2014"; return "\u00a3" + Number(v).toFixed(2); }
    function bsimUpText(up) { if (!up || up.val == null || up.val === "") return "\u2014"; return up.type === "abs" ? "+" + RG_CUR + Number(up.val).toFixed(2) : "+" + up.val + "%"; }
    function bsimShiftHours(s, e) { if (!s || !e) return 0; var a = s.split(":").map(Number), b = e.split(":").map(Number); var m = (b[0] * 60 + b[1]) - (a[0] * 60 + a[1]); if (m <= 0) m += 1440; return Math.round(m / 60 * 100) / 100; }
    function bsimDays(s, e) { if (!s) return 1; if (!e || e < s) return 1; var d = Math.round((new Date(e + "T00:00:00") - new Date(s + "T00:00:00")) / 86400000) + 1; return Math.max(1, d); }
    // Format minutes-from-midnight back to a HH:MM clock label.
    function bsimClock(min) { var t = ((min % 1440) + 1440) % 1440; var h = Math.floor(t / 60), m = t % 60; return (h < 10 ? "0" : "") + h + ":" + (m < 10 ? "0" : "") + m; }
    // Split the shift into rate INTERVALS. Walk the shift minute-by-minute and
    // at each minute apply the single best premium that applies: overtime (a
    // multiplier on base pay, once the worker's cumulative weekly hours pass the
    // OT threshold) or the night-shift uplift (a flat \u00a3/hr inside 22:00\u201306:00).
    // Where both apply, the higher of the two wins \u2014 they do not stack. Adjacent
    // minutes carrying the same rate merge into one interval. workedHours is the
    // hours already worked this week BEFORE this shift, so overtime begins
    // (threshold \u2212 workedHours) hours into the shift.
    function bsimShiftIntervals(payRate, inp, a, has) {
      var toMin = function (t) { var p = String(t || "").split(":").map(Number); return (p[0] || 0) * 60 + (p[1] || 0); };
      var s = toMin(inp.startTime), e = toMin(inp.endTime); if (e <= s) e += 1440;
      var mins = e - s; if (!(mins > 0)) return null;
      var prior = bsimNum(inp.workedHours);
      var thr = bsimNum(a.otThresholdHours), otMult = bsimNum(a.otMultiplier), night = bsimNum(a.nightUplift);
      var otStartMin = has("overtime") ? Math.max(0, thr - prior) * 60 : Infinity; // minutes into shift where OT begins

        var clock = ((s + m) % 1440 + 1440) % 1440;

        if (isOT && isNight) { if (otRate >= nightRate) { kind = "overtime"; rate = otRate; } else { kind = "night"; rate = nightRate; } }

    }

    // ---- engine ----
    // Resolve a booking against the SELECTED rate-card version, then build the
    // per-worked-hour charge rate applying ONLY the pricing rules that version
    // carries. Add or drop a rule on the card and the build-up changes here.
    function bsimCompute(inp, a) {
      var v = bsimSelectedVersion();
      var grid = bsimVersionGrid(v);
      var has = function (k) { return bsimHasRule(v, k); };
      var booking = {};
      (grid.active || []).forEach(function (k) { booking[k] = inp[k]; });
      booking.jobType = rgPosJobType(inp.position);   // job type is fixed by the position
      booking.parity = bsimParity(inp);               // parity is a direct booking condition

      // hourly direct cost; then the agency margin to the hourly charge rate.
      // VAT is applied afterwards (step 2). A peak-season uplift is part of pay,
      // so the on-costs build on the uplifted rate.
      var payRate = seasonActive ? peakRate : stdRate;
      var geoHr = has("geo") ? bsimNum(a.geoAllowance) : 0;          // per-site worker top-up

      var shiftBreak = (has("overtime") || has("shiftdiff")) ? bsimShiftIntervals(payRate, inp, a, has) : null;
      var showIntervals = shiftBreak && shiftBreak.intervals.length && shiftBreak.hasVariation;
      var workerBaseHr = shiftBreak ? shiftBreak.blended : payRate;  // blended base across the shift
      var workerPayHr = workerBaseHr + geoHr;
      var holidayHr = has("holiday") ? workerPayHr * bsimNum(a.holidayPct) / 100 : 0;  // WTR holiday pay
      var niBaseHr = workerPayHr + holidayHr;                        // NI-able hourly pay
      // Employer NI above the secondary threshold (weekly allowance ÷ weekly hours).
      var weeklyHours = Math.max(1, bsimNum(a.weeklyHours));
      var niThreshHr = bsimNum(a.niWeeklyAllowance) / weeklyHours;
      var niRelieved = has("niRelief") && bsimNum(inp.age) < 21;     // under-21 employer NI relief
      var employerNiHr = (has("ni") && !niRelieved) ? Math.max(0, niBaseHr - niThreshHr) * bsimNum(a.niPct) / 100 : 0;
      // Pension auto-enrolment applies from age 22 (to State Pension age).
      var pensionEligible = bsimNum(inp.age) >= 22;
      var pensionHr = (has("pension") && pensionEligible) ? niBaseHr * bsimNum(a.pensionPct) / 100 : 0;
      var levyHr = has("levy") ? niBaseHr * bsimNum(a.levyPct) / 100 : 0;
      var sickHr = has("sick") ? niBaseHr * bsimNum(a.sickPct) / 100 : 0;
      var directCostHr = workerPayHr + holidayHr + employerNiHr + pensionHr + levyHr + sickHr;
      // Agency margin (flat £/hr) with the tenure-banded reduction if carried.
      var grossMarginHr = has("markup") ? bsimNum(a.markupAbs) : 0;
      var tenureCutHr = has("tenure") ? Math.min(grossMarginHr, bsimTenureCut(inp.tenureWeeks)) : 0;
      var marginHr = grossMarginHr - tenureCutHr;
      var chargeRateHr = directCostHr + marginHr;                    // total hourly charge rate

      // === Step 2 — VAT (per worked hour) ===

      var chargeInclVatHr = chargeRateHr + vatHr;

      // --- hourly rate-card waterfall ---
      var share = function (val) { return chargeRateHr > 0 ? Math.max(0, val) / chargeRateHr * 100 : 0; };
      var rateCard = [];
      if (showIntervals) {
        rateCard.push({ shiftHead: true, label: "Shift pay", basis: shiftBreak.totalHours + "h shift \u00b7 " + bsimNum(inp.workedHours) + "h earlier this week" });
        shiftBreak.intervals.forEach(function (iv) {
          var tag = iv.kind === "overtime" ? ("Overtime " + otMult + "\u00d7") : iv.kind === "night" ? ("Night +" + bsimRate(a.nightUplift)) : "Regular";
          rateCard.push({ interval: true, kind: iv.kind, label: bsimClock(iv.start) + "\u2013" + bsimClock(iv.end), tag: tag, hours: iv.hours, amount: iv.rate });
        });
        rateCard.push({ key: "pay", group: "worker", label: "Worker pay", basis: "blended across the " + shiftBreak.totalHours + "h shift", amount: workerBaseHr });
      } else {
        rateCard.push({ key: "pay", group: "worker", label: "Regular rate", basis: "hourly net pay" + (seasonActive ? " \u00b7 peak" : ""), amount: payRate });
      }
      if (has("geo")) rateCard.push({ key: "geo", group: "worker", label: "Geo allowance", basis: "site top-up \u00b7 " + (inp.location || "\u2014"), amount: geoHr });
      if (has("holiday")) rateCard.push({ key: "holiday", group: "worker", label: "WTR holiday pay", pct: a.holidayPct, basis: "of worker pay", amount: holidayHr });
      if (has("ni")) rateCard.push({ key: "ni", group: "statutory", label: "Employer NI", pct: niRelieved ? null : a.niPct, basis: niRelieved ? "age-band relief \u00b7 under 21" : "on pay above " + bsimRate(niThreshHr) + "/hr", amount: employerNiHr });
      if (has("pension")) rateCard.push({ key: "pension", group: "statutory", label: "Pension", pct: pensionEligible ? a.pensionPct : null, basis: pensionEligible ? "of NI-able pay \u00b7 auto-enrolled" : "not auto-enrolled \u00b7 under 22", amount: pensionHr });
      if (has("levy")) rateCard.push({ key: "levy", group: "statutory", label: "Apprenticeship levy", pct: a.levyPct, basis: "of NI-able pay", amount: levyHr });
      if (has("sick")) rateCard.push({ key: "sick", group: "statutory", label: "Sick pay", pct: a.sickPct, basis: "of NI-able pay", amount: sickHr });
      rateCard.push({ subtotal: true, label: "Total hourly direct cost", amount: directCostHr, unit: "/hr" });
      if (has("markup")) rateCard.push({ key: "markup", group: "markup", label: "Agency margin", pct: null, basis: "agency rate \u00b7 flat per hour", amount: grossMarginHr });
      if (has("tenure") && tenureCutHr > 0) rateCard.push({ key: "tenure", group: "markup", label: "Tenure margin reduction", pct: null, basis: bsimNum(inp.tenureWeeks) + " wks tenure", amount: -tenureCutHr, negative: true });

    // ---- form pieces ----

    function bsimNumField(label, key, opts) {

      return '<label class="bsim-field"><span class="bsim-flabel">' + label + (opts.hint ? ' <em class="bsim-fhint">' + opts.hint + '</em>' : '') + '</span><div class="proto-numfield">' +
        (opts.prefix ? '<span class="nf-prefix">' + opts.prefix + '</span>' : '') +
        '<input type="number" min="0" step="' + (opts.step || "1") + '" inputmode="decimal" value="' + (state.bsim[key] == null ? "" : state.bsim[key]) + '" data-bsim="' + key + '" />' +
        (opts.suffix ? '<span class="nf-suffix">' + opts.suffix + '</span>' : '') + '</div></label>';
    }

        '<input type="time" class="bsim-input" value="' + (state.bsim[key] || "") + '" data-bsim="' + key + '" /></label>';
    }
    function bsimFormHtml() {
      var v = bsimSelectedVersion();
      var inputs = bsimInputsForVersion(v);
      var rules = bsimVersionRules(v);
      var grp = rgPosGroup(state.bsim.position);
      var marginNow = bsimMarginFor(state.bsim.agency, state.bsim.position);

      // --- Rate card selector — pick which version (configuration) to price ---
      var vs = bsimVersions();
      var verOpts = vs.slice().sort(function (a, b) { return b.version - a.version; }).map(function (x) { return { v: x.version, l: verShortLabel(x) }; });
      var selVerNo = v ? v.version : (verOpts[0] && verOpts[0].v);
      var verField = bsimField("Rate card version", bsimSelectHtml('data-bsim-sel="version"', selVerNo, verOpts));
      var statusWord = v ? (v.status === "active" ? "Active" : v.status === "scheduled" ? "Scheduled" : "Superseded") : "";
      var statusPill = v ? '<span class="bsim-ver-pill bsim-ver-pill--' + v.status + '">' + statusWord + '</span>' : "";
      var verMeta = '<div class="bsim-ver-meta">' + statusPill +
        '<span class="bsim-ver-eff">Effective ' + escapeHtml(fmtDay(v ? (v.startDate || v.effectiveDate) : "")) + '</span>' +
        '<span class="bsim-ver-rulen">' + rules.length + ' pricing rules</span></div>';
      var ruleChips = '<div class="bsim-rulechips">' + rules.map(function (k) { var r = BSIM_RULE_BY[k]; return r ? '<span class="bsim-rulechip bsim-rulechip--' + r.group + '">' + escapeHtml(r.label) + '</span>' : ""; }).join("") + '</div>';
      var verNote = '<p class="bsim-cfg-note">Pick the rate card to simulate. Only the booking details its rules use are shown below.</p>';
      var rcOpen = state.bsimUI.showRateCard !== false;
      var verSummary = v ? ("v" + v.version + " \u00b7 " + statusWord) : "";
      var configBody = '<div class="bsim-fields">' + verField + verMeta + ruleChips + verNote + '</div>';
      var configCard = '<div class="proto-card bsim-card bsim-asm' + (rcOpen ? " is-open" : "") + '">' +
        '<button class="bsim-asm-toggle" data-bsim-act="toggle-ratecard" aria-expanded="' + (rcOpen ? "true" : "false") + '"><span class="bsim-card-title">' + ico("CreditCard") + 'Rate card</span><span class="bsim-asm-toggle-right">' + (rcOpen ? "" : '<span class="bsim-asm-summary">' + escapeHtml(verSummary) + '</span>') + ico(rcOpen ? "ChevronUp" : "ChevronDown") + '</span></button>' +
        (rcOpen ? configBody : "") + '</div>';

      // --- Booking card — position + the conditions THIS card varies pay by ---
      // Job type is fixed by the position (read-only); the agency always shows
      // (it resolves a line and loads its own on-costs + margin). location /
      // parity show only when the selected card varies pay by them.
      var posField = bsimField("Position", bsimSelectHtml('data-bsim-sel="position"', state.bsim.position, RG_POSITIONS.map(function (p) { return { v: p.code, l: p.name + " (" + p.code + ")" }; })));
      var jobType = rgPosJobType(state.bsim.position);
      var gridFields = bsimDerivedField(RG_CONDS.jobType.label, jobType, "Set by the position");
      if (inputs.location) gridFields += bsimCondField("location");
      gridFields += bsimField(RG_CONDS.agency.label, bsimSelectHtml('data-bsim-sel="agency"', state.bsim.agency, bsimAgencies().map(function (x) { return { v: x, l: x }; })));
      if (inputs.parity) gridFields += bsimCondField("parity");
      var varyNote = '<p class="bsim-cfg-note">These are the conditions this rate card varies by \u2014 together they decide which line resolves.</p>';
      var agencyRate = '<div class="bsim-cfg-rate"><span class="bsim-cfg-rate-l">Agency rate</span><span class="bsim-cfg-rate-v">' + bsimRate(marginNow) + '<span class="nf-suffix">/hr</span></span><span class="bsim-cfg-rate-grp">' + escapeHtml(state.bsim.agency || "") + ' \u00b7 ' + escapeHtml(grp) + '</span></div>' +
        '<p class="bsim-cfg-note">On-costs and margin are read from this agency’s engine settings (Agencies \u2192 ' + escapeHtml(state.bsim.agency || "") + ' \u2192 Rate Configuration).</p>';
      var booking = '<div class="proto-card bsim-card"><div class="bsim-card-head"><h3 class="bsim-card-title">' + ico("Briefcase") + 'Booking</h3></div><div class="bsim-fields">' + posField + '<div class="bsim-grid2">' + gridFields + '</div>' + varyNote + agencyRate + '</div></div>';

      // --- Worker card — collapsible; only when a rule prices by a worker attribute ---
      var workerFields = "";
      if (inputs.workedHours) workerFields += bsimNumField("Hours worked this week", "workedHours", { step: "1", suffix: "hrs", hint: "Before this shift \u00b7 overtime above " + bsimNum(state.bsimAsm.otThresholdHours) + " hrs/wk" });
      if (inputs.age) workerFields += bsimNumField("Age", "age", { step: "1", suffix: "yrs", hint: "Pension auto-enrolment 22+ \u00b7 NI relief under 21" });
      if (inputs.tenureWeeks) workerFields += bsimNumField("Tenure", "tenureWeeks", { step: "1", suffix: "wks", hint: "Margin reduction by tenure" });
      var workerCard = "";
      if (workerFields) {
        var workerOpen = state.bsimUI.showWorker !== false;
        var workerBody = '<div class="bsim-fields"><div class="bsim-grid2">' + workerFields + '</div><p class="bsim-cfg-note">Shown because this rate card has rules that price by the worker\u2019s hours, age or tenure.</p></div>';
        workerCard = '<div class="proto-card bsim-card bsim-asm' + (workerOpen ? " is-open" : "") + '">' +
          '<button class="bsim-asm-toggle" data-bsim-act="toggle-worker" aria-expanded="' + (workerOpen ? "true" : "false") + '"><span class="bsim-card-title">' + ico("Person") + 'Worker</span><span class="bsim-asm-toggle-right">' + ico(workerOpen ? "ChevronUp" : "ChevronDown") + '</span></button>' +
          (workerOpen ? workerBody : "") + '</div>';
      }

      // --- Shift card — only when a rule prices by shift time (night differential) ---
      var shiftCard = "";
      if (inputs.shift) {
        var span = bsimShiftSpan(state.bsim.startTime, state.bsim.endTime);
        var shiftMeta = '<p class="bsim-cfg-note">' + span.total + ' hr shift \u00b7 ' + span.night + ' hr in the night window (22:00\u201306:00). The shift is split into pay intervals (regular / overtime / night) in the breakdown.</p>';
        shiftCard = '<div class="proto-card bsim-card"><div class="bsim-card-head"><h3 class="bsim-card-title">' + ico("Calendar") + 'Shift</h3></div><div class="bsim-fields"><div class="bsim-grid2">' +
          bsimTimeField("Start time", "startTime") + bsimTimeField("End time", "endTime") + '</div>' + shiftMeta + '</div></div>';
      }

      return configCard + booking + workerCard + shiftCard + bsimAsmCard();
    }
    // Read-only derived field (e.g. job type, fixed by the chosen position).
    function bsimDerivedField(label, value, note) {
      return '<div class="bsim-field"><span class="bsim-flabel">' + label + '</span>' +
        '<div class="bsim-derived">' + escapeHtml(value) + '</div>' +
        (note ? '<span class="bsim-fhint">' + escapeHtml(note) + '</span>' : '') + '</div>';
    }

    function bsimAsmSummary() { var a = state.bsimAsm; return a.holidayPct + '% \u00b7 NI ' + a.niPct + '% \u00b7 margin ' + bsimRate(a.markupAbs) + '/hr \u00b7 VAT ' + a.vatPct + '%'; }
    // Read-only assumption row. The values are not editable in the simulator —
    // they belong to the selected rate-card line and the agency's engine
    // settings, and are surfaced here only so the build-up is transparent.
    function bsimAsmRow(label, value, source) {
      return '<div class="bsim-asm-ro"><span class="bsim-asm-ro-l">' + label + '</span>' +
        '<span class="bsim-asm-ro-r"><span class="bsim-asm-ro-v">' + value + '</span>' +
        (source ? '<span class="bsim-asm-ro-src">' + source + '</span>' : '') + '</span></div>';
    }
    function bsimAsmCard() {
      return '<div class="proto-card bsim-card bsim-asm' + (state.bsimUI.showAsm ? " is-open" : "") + '">' +
        '<button class="bsim-asm-toggle" data-bsim-act="toggle-asm" aria-expanded="' + (state.bsimUI.showAsm ? "true" : "false") + '"><span class="bsim-card-title">' + ico("Settings") + 'Assumptions</span><span class="bsim-asm-toggle-right"><span class="bsim-asm-summary" id="bsim-asm-summary">' + bsimAsmSummary() + '</span>' + ico(state.bsimUI.showAsm ? "ChevronUp" : "ChevronDown") + '</span></button>' +
        (state.bsimUI.showAsm ? bsimAsmBody() : "") + '</div>';
    }
    function bsimAsmBody() {
      var v = bsimSelectedVersion();
      var has = function (k) { return bsimHasRule(v, k); };
      var a = state.bsimAsm;
      var rows = "";
      var card = "this rate card", agency = state.bsim.agency || "agency";
      if (has("overtime")) rows += bsimAsmRow("Overtime", a.otMultiplier + "\u00d7 over " + bsimNum(a.otThresholdHours) + " hrs/wk", card);
      if (has("ni")) rows += bsimAsmRow("Standard week", bsimNum(a.weeklyHours) + " hrs", card);
      if (has("geo")) rows += bsimAsmRow("Geo allowance", bsimRate(a.geoAllowance) + "/hr", card);
      if (has("shiftdiff")) rows += bsimAsmRow("Night-shift uplift", bsimRate(a.nightUplift) + "/hr", card);
      if (has("holiday")) rows += bsimAsmRow("WTR holiday pay", a.holidayPct + "%", agency);
      if (has("ni")) rows += bsimAsmRow("Employer NI rate", a.niPct + "%", agency);
      if (has("ni")) rows += bsimAsmRow("NI weekly allowance", RG_CUR + bsimNum(a.niWeeklyAllowance) + "/wk", "statutory");
      if (has("pension")) rows += bsimAsmRow("Pension rate", a.pensionPct + "%", agency);
      if (has("levy")) rows += bsimAsmRow("Apprenticeship levy", a.levyPct + "%", agency);
      if (has("sick")) rows += bsimAsmRow("Sick pay", a.sickPct + "%", agency);
      if (has("markup")) rows += bsimAsmRow("Agency margin", bsimRate(a.markupAbs) + "/hr", agency);
      if (has("vat")) rows += bsimAsmRow("VAT", a.vatPct + "%", "statutory");
      var note = '<p class="bsim-cfg-note">These parameters belong to the selected rate-card line and the agency\u2019s engine settings \u2014 they\u2019re read-only here. Switch cards or agencies to see a different set.</p>';
      return '<div class="bsim-asm-body"><div class="bsim-asm-rolist">' + rows + '</div>' + note + '</div>';
    }

    // ---- result column ----
    // Hourly rate-card lines render in £/hr; the build mirrors the Evri
    // rate-card workbook (worker pay rate \u2192 on-costs \u2192 margin).
    function bsimRcLineHtml(l) {
      if (l.shiftHead) {
        return '<div class="bsim-ivl-head"><span class="bsim-ivl-head-l">' + l.label + '</span><span class="bsim-ivl-head-b">' + l.basis + '</span></div>';
      }
      if (l.interval) {
        var icol = l.kind === "overtime" ? "var(--evr-orange-400)" : l.kind === "night" ? "var(--evr-purple-400)" : "var(--evr-blue-400)";
        return '<div class="bsim-ivl bsim-ivl--' + l.kind + '">' +
          '<span class="bsim-ivl-dot" style="background:' + icol + '"></span>' +
          '<span class="bsim-ivl-time">' + l.label + '</span>' +
          '<span class="bsim-ivl-tag">' + l.tag + '</span>' +
          '<span class="bsim-ivl-hrs">' + l.hours + 'h</span>' +
          '<span class="bsim-ivl-rate">' + bsimRate(l.amount) + '<span class="bsim-rate-unit">/hr</span></span>' +
          '</div>';
      }
      if (l.subtotal || l.chargerate) {
        return '<div class="bsim-line ' + (l.chargerate ? "bsim-line--charge" : "bsim-line--sub") + '">' +
          '<span class="bsim-line-label">' + l.label + '</span>' +
          '<span class="bsim-line-amt">' + bsimRate(l.amount) + '<span class="bsim-rate-unit">' + (l.unit || "") + '</span></span>' +
          '</div>';
      }
      var color = BSIM_BAR_COLOR[l.group] || "var(--evr-neutral-50)";
      var amt = l.negative ? "\u2212" + bsimRate(Math.abs(l.amount)) : bsimRate(l.amount);
      return '<div class="bsim-line' + (l.negative ? " bsim-line--neg" : "") + '">' +
        '<span class="bsim-line-bar"><span class="bsim-line-bar-fill" style="width:' + (l.share || 0) + '%;background:' + color + '"></span></span>' +
        '<span class="bsim-line-main"><span class="bsim-line-label">' + l.label + (l.pct != null ? '<span class="bsim-line-pct">' + l.pct + '%</span>' : '') + '</span><span class="bsim-line-basis">' + l.basis + '</span></span>' +
        '<span class="bsim-line-figs"><span class="bsim-line-amt">' + amt + '<span class="bsim-rate-unit">/hr</span></span></span>' +
        '</div>';
    }
    // Booking lines render in absolute \u00a3 (duration + VAT applied).
    function bsimBkLineHtml(l) {
      if (l.total) return '<div class="bsim-line bsim-line--total"><span class="bsim-line-label">' + l.label + '</span><span class="bsim-line-amt">' + bsimMoney(l.amount) + '</span></div>';
      return '<div class="bsim-line bsim-line--bk">' +
        '<span class="bsim-line-main"><span class="bsim-line-label">' + l.label + (l.pct != null ? '<span class="bsim-line-pct">' + l.pct + '%</span>' : '') + '</span><span class="bsim-line-basis">' + l.basis + '</span></span>' +
        '<span class="bsim-line-figs"><span class="bsim-line-amt">' + bsimMoney(l.amount) + '</span></span>' +
        '</div>';
    }
    function bsimResultHtml(res) {
      var r = res.resolved;

      // ---- no rate resolved ----
      if (!res.ok) {
        return '<div class="bsim-section"><div class="bsim-section-body bsim-tc-none">' + ico("Alert") +
          '<div><b>No rate resolved.</b> This position has no base rate and no override matches these conditions. Add one on the Rate Cards screen.</div></div></div>';
      }

      var a = state.bsimAsm, t = res.totals;

      // === Card 1 — the hourly rate card (per worked hour) ===
      var srcPill = '<span class="bsim-src bsim-src--' + r.source + '">' + (r.source === "override" ? "Override line" : "Base rate") + '</span>';
      var resolveMeta = 'Standard ' + bsimRate(r.rate) + (r.hasUplift ? ' \u00b7 season uplift ' + bsimUpText(r.up) + ' \u2192 peak ' + bsimRate(r.eff) : '');
      var verNo = res.version ? res.version.version : "";
      var rcHead =
        '<div class="bsim-section-head">' +
          '<div class="bsim-section-titlewrap"><span class="bsim-section-step">1</span><span class="bsim-section-title">Hourly rate card</span></div>' +
          srcPill +
        '</div>' +
        '<div class="bsim-section-meta">Rate card v' + verNo + ' \u00b7 built per worked hour for ' + escapeHtml((RG_POSITIONS.filter(function (p) { return p.code === state.bsim.position; })[0] || {}).name || state.bsim.position) + ' \u00b7 ' + escapeHtml(rgPosJobType(state.bsim.position)) + ' \u00b7 ' + escapeHtml(state.bsim.location || "") + '. ' + resolveMeta + '</div>';
      var rcLines = res.rateCard.map(bsimRcLineHtml).join("");
      var card1 = '<div class="bsim-section">' + rcHead + '<div class="bsim-breakdown">' + rcLines + '</div></div>';

      // === Card 2 — charge rate (per worked hour, + VAT) ===
      // Chips echo the conditions that resolved this line, plus a season-uplift
      // flag when the resolved line carries an in-season uplift.
      var inputs = bsimInputsForVersion(res.version);
      var chipKeys = ["jobType", "location", "agency", "parity", "workedHours", "age", "tenureWeeks", "shift"];
      var condChips = chipKeys.map(function (k) {
        if (k !== "jobType" && !inputs[k]) return "";
        var val = k === "jobType" ? rgPosJobType(state.bsim.position)
          : k === "workedHours" ? (state.bsim.workedHours != null ? state.bsim.workedHours + " hrs/wk" : "")
          : k === "tenureWeeks" ? (state.bsim.tenureWeeks != null ? state.bsim.tenureWeeks + " wks" : "")
          : k === "age" ? (state.bsim.age != null ? state.bsim.age + " yrs" : "")
          : k === "shift" ? ((state.bsim.startTime && state.bsim.endTime) ? state.bsim.startTime + "\u2013" + state.bsim.endTime : "")
          : state.bsim[k];
        if (val == null || val === "") return "";
        return '<span class="bsim-chip">' + escapeHtml(String(val)) + '</span>';
      }).join("");
      var chips = '<div class="bsim-bk">' + condChips +
        (res.seasonActive ? '<span class="bsim-chip bsim-chip--peak">' + ico("Leaf") + 'Season uplift ' + bsimUpText(r.up) + '</span>' : '') +
        '</div>';
      var bkHead =
        '<div class="bsim-section-head">' +
          '<div class="bsim-section-titlewrap"><span class="bsim-section-step">2</span><span class="bsim-section-title">Charge rate</span></div>' +
        '</div>' + chips;
      var bkLines = res.booking.map(bsimBkLineHtml).join("");
      var stats =
        '<div class="bsim-bk-stats">' +
          '<div class="bsim-stat2"><span class="v">' + bsimRate(t.chargeInclVatHr) + '</span><span class="l">Charge / hr incl VAT</span></div>' +
          '<div class="bsim-stat2"><span class="v">' + t.marginPct.toFixed(1) + '%</span><span class="l">Margin of charge rate</span></div>' +
          '<div class="bsim-stat2"><span class="v">' + t.billMultiple.toFixed(2) + '\u00d7</span><span class="l">Charge vs regular rate</span></div>' +
        '</div>';
      var card2 = '<div class="bsim-section bsim-section--booking">' + bkHead + '<div class="bsim-breakdown">' + bkLines + '</div>' + stats + '</div>';

      return card1 + card2;
    }

    // ---------- Settings → Rate Engine (structure-only engine) ----------
    function reEngRemoveModal() {
      var id = state.reEngRemoveConfirm;
      var eng = (state.reEngines || []).filter(function (r) { return r.id === id; })[0];
      var name = eng ? escapeHtml(eng.name) : "this engine";
      return '<div class="rc2-confirm-overlay">' +
        '<div class="rc2-confirm-modal" role="dialog" aria-modal="true">' +
          '<div class="rc2-confirm-ico">' + ico("TrashCan") + '</div>' +
          '<h2 class="rc2-confirm-title">Remove rate engine?</h2>' +
          '<p class="rc2-confirm-body"><strong>' + name + '</strong> will be permanently removed. Any rate cards linked to this engine will lose their pricing configuration.</p>' +
          '<div class="rc2-confirm-actions">' +
            '<button class="proto-btn proto-btn--ghost" data-act="re-eng-remove-cancel">Cancel</button>' +
            '<button class="proto-btn proto-btn--danger" data-act="re-eng-remove-confirm">Remove engine</button>' +
          '</div>' +
        '</div>' +
      '</div>';
    }

    // The engine that defines HOW pay/bill rates are calculated and at
    // what LEVELS — emitting a value-free rate-card schema. Rendered by
    // window.RE (rate-engine.js) into #re-root. Distinct from the upload's
    // "Pay rate configuration" step; never touches Rate Cards or Rate Simulator.
    function rateEngineView() {
      // Detail view — go straight to window.RE configuration
      if (state.reEngDetail) {
        ensureReEngines();
        var detEng = (state.reEngines || []).filter(function (r) { return r.id === state.reEngDetail; })[0];
        var detName = detEng ? escapeHtml(detEng.name) : "Rate Engine";
        return crumb([
          { label: "Settings",    act: "settings-root" },
          { label: "Pricing",     act: "noop" },
          { label: "Rate Engine", act: "re-eng-back" },
          { label: detName },
        ]) +
        '<div id="re-root"></div>';
      }

      var chain      = state.reLookupChain || [];
      var addOpen    = state.reLookupAddOpen;
      var collapsed  = state.reLookupCollapsed;
      var available  = RE_CHAIN_TYPES.filter(function (t) { return chain.indexOf(t.id) < 0; });
      var arrow      = '<span class="proto-lk-arrow" aria-hidden="true">' + ico("ArrowRight") + '</span>';

      var chips = chain.map(function (id, i) {
        return '<div class="proto-lk-chip re-lk-chip" draggable="true" data-re-chain="' + id + '" tabindex="0"' +
          ' aria-label="' + escapeHtml(reChainTypeLabel(id)) + ', priority ' + (i + 1) + '. Drag to reorder.">' +
          '<span class="lk-num">' + (i + 1) + '</span>' +
          '<span class="lk-label">' + escapeHtml(reChainTypeLabel(id)) + '</span>' +
          '<button class="re-lk-remove" data-act="re-chain-remove" data-re-chain="' + id + '" aria-label="Remove ' + escapeHtml(reChainTypeLabel(id)) + '">' + ico("X") + '</button>' +
        '</div>';
      }).join(arrow);

      var addMenu = "";
      if (addOpen && available.length) {
        addMenu = '<div class="re-chain-add-menu" id="re-chain-add-menu">' +
          available.map(function (t) {
            return '<button class="re-chain-add-item" data-act="re-chain-add" data-re-chain="' + t.id + '">' + escapeHtml(t.label) + '</button>';
          }).join("") +
        '</div>';
      }
      var addBtn = available.length
        ? '<div class="re-chain-add-wrap"><button class="re-chain-add-btn proto-btn proto-btn--ghost" data-act="re-chain-add-open">' + ico("Plus") + 'Add type</button>' + addMenu + '</div>'
        : '';

      var collapseBtn = '<button class="lk-collapse" data-act="re-chain-toggle" aria-label="' + (collapsed ? 'Expand' : 'Collapse') + ' lookup chain">' +
        ico(collapsed ? "ChevronDown" : "ChevronUp") + '</button>';

      // Summary shown when collapsed: e.g. "Legal Entity → Tenure Status → …"
      var summary = chain.length
        ? chain.map(function (id) { return escapeHtml(reChainTypeLabel(id)); }).join(' \u2192 ')
        : '<em style="color:var(--evr-content-primary-lowemp)">No types selected</em>';

      var body = collapsed
        ? '<div class="re-chain-summary">' + summary + '</div>'
        : (chain.length
            ? '<div class="proto-lk-chips">' + chips + (available.length ? arrow + addBtn : "") + '</div>'
            : '<div class="proto-lk-chips re-lk-empty">' + addBtn + '<span class="re-lk-empty-msg">No types selected \u2014 add one to build the chain</span></div>') +
          '<div class="proto-lk-hint">Drag chips to reorder \u00b7 click \u00d7 to remove a type \u00b7 the chain defines how a rate engine is selected for a given worker context</div>';

      var lookupPanel = '<div class="proto-lookup re-chain-lookup">' +
        '<div class="proto-lookup-head">' +
          '<span class="lk-bolt">' + ico("Bolt") + '</span>' +
          '<span class="lk-title">Rate engine lookup chain</span>' +
          '<span class="lk-desc">\u2014 drag to reorder \u00b7 leftmost type has highest lookup priority</span>' +
          collapseBtn +
        '</div>' +
        body +
      '</div>';

      return crumb([{ label: "Settings", act: "settings-root" }, { label: "Pricing", act: "noop" }, { label: "Rate Engine" }]) +
        '<div class="proto-page-head"><h1>Rate Engine</h1><p>Define how a pay rate and a bill rate are calculated, and at what levels \u2014 the structure only, never the values. The engine compiles to the rate-card import\u2019s columns and inputs; the values are entered there.</p></div>' +
        lookupPanel +
        reEngTableHtml() +
        reEngEditorHtml() +
        (state.reEngRemoveConfirm ? reEngRemoveModal() : '');
    }

    function reEngTableHtml() {
      ensureReEngines();
      var engines = state.reEngines || [];
      var chain   = state.reLookupChain || [];

      var keyThs = chain.map(function (id) {
        return '<th>' + escapeHtml(reChainTypeLabel(id)) + '</th>';
      }).join("");

      var rows = engines.map(function (eng) {
        var keyCells = chain.map(function (id) {
          var val = eng.keys && eng.keys[id];
          var disp;
          if (!val || (Array.isArray(val) && !val.length)) {
            disp = '<span class="re-eng-any">Any</span>';
          } else if (Array.isArray(val)) {
            var shown = val.slice(0, 2);
            var rest = val.length - shown.length;
            disp = shown.map(function (v) {
              return id === "tenureStatus" ? escapeHtml(reTenureLabel(v)) : escapeHtml(v);
            }).join(', ');
            if (rest > 0) disp += ' <span class="re-eng-any">+' + rest + '</span>';
          } else {
            disp = id === "tenureStatus" ? escapeHtml(reTenureLabel(val)) : escapeHtml(val);
          }
          return '<td class="re-eng-key-cell">' + disp + '</td>';
        }).join("");
        return '<tr class="re-eng-row re-eng-row--clickable" data-act="re-eng-detail" data-re-id="' + eng.id + '">' +
          '<td class="re-eng-name">' + escapeHtml(eng.name || '—') + '</td>' +
          '<td class="re-eng-ver"><span class="re-eng-ver-badge">' + escapeHtml(eng.activeVersion || '—') + '</span></td>' +
          keyCells +
          '<td class="re-eng-td-arrow">' + ico("ChevronRight") + '</td>' +
          '<td class="re-eng-td-remove"><button class="re-tv-remove-btn" data-act="re-eng-remove-prompt" data-re-id="' + eng.id + '" title="Remove engine">' + ico("TrashCan") + '</button></td>' +
        '</tr>';
      }).join("");

      var tbody = engines.length
        ? '<tbody>' + rows + '</tbody>'
        : '<tbody><tr><td colspan="' + (chain.length + 4) + '" class="re-eng-empty-cell">No rate engines configured. Add one to get started.</td></tr></tbody>';

      return '<div class="proto-card re-eng-card">' +
        '<div class="re-eng-toolbar">' +
          '<div class="re-eng-toolbar-info">' + ico("Information") +
            '<span>' + engines.length + ' engine' + (engines.length !== 1 ? 's' : '') + ' configured</span>' +
          '</div>' +
          '<button class="proto-btn proto-btn--primary" data-act="re-eng-add">' + ico("Plus") + 'Add engine</button>' +
        '</div>' +
        '<div class="re-eng-table-scroll">' +
          '<table class="re-eng-table">' +
            '<thead><tr>' +
              '<th>Name</th>' +
              '<th>Active version</th>' +
              keyThs +
              '<th class="re-eng-th-arrow"></th>' +
              '<th class="re-eng-th-remove"></th>' +
            '</tr></thead>' +
            tbody +
          '</table>' +
        '</div>' +
      '</div>';
    }

    function reEngEditorHtml() {
      if (!state.reEngEditing || !state.reEngDraft) return "";
      var d = state.reEngDraft, isNew = state.reEngEditing === "new";
      var chain = state.reLookupChain || [];

      function chainLabel(id) {
        var t = RE_CHAIN_TYPES.filter(function (x) { return x.id === id; })[0];
        return t ? t.label : id;
      }
      function chainOpts(typeId) {
        if (typeId === "legalEntity")  return RE_LEGAL_ENTITIES.map(function (n) { return { v: n, l: n }; });

    //   3. Choose the start date and confirm the edge cases, then apply
    // Step 2 edits a staged copy of the grid (previewGrid); the live grid is
    // backed up and restored unless the wizard is applied.
    function gridFromUpload(u) {
      if (u && u.kind === "grid" && u.grid) return JSON.parse(JSON.stringify(u.grid));
      // Reference workbook (the seed CSV) or a flat sheet → the canonical
      // seeded rate lines. The seed intentionally leaves a couple of bases
      // unset so the preview step has real issues to fix.
      return rgSeed();
    }
    function rcWizStart() {
      state.rcWizard = { step: 1, up: null, rmTab: "engine", previewGrid: null, backupGrid: null, proc: null, parsedStamp: null };
      state.upload = null;
      state.gridUI.showAddMenu = false;
      if (window.RP) window.RP.reset();
      if (window.RV) window.RV.reset();
      if (window.RM) window.RM.reset();
      if (window.RC) window.RC.reset();
      if (window.RA) window.RA.reset();

    // Ensure the staged grid exists for the eventual apply (the version
    // capture still uses previewGrid). The new step-3 review screen reads
    // the canonical PDF_RATES set, so we no longer hijack state.grid here.
    function rcWizPrepGrid() {
      var w = state.rcWizard;
      if (!w.previewGrid) w.previewGrid = gridFromUpload(state.upload);
    }
    // Kick off the step-2 Validate pipeline animation (spec §6:
    // Parse → Map → Classify → Normalize → Validate → Diff), then reveal
    // the organize / resolve / change-summary surface (window.RV).
    function rcWizStartProcess() {
      var w = state.rcWizard;
      if (w.proc && w.proc.started) return;
      w.proc = { started: true, stage: 0, done: false };
      function step() {
        if (!state.rcWizard || state.rcWizard !== w || w.step !== 2) return;
        w.proc.stage++;
        if (w.proc.stage >= 6) {
          w.proc.done = true;
          w.parsedStamp = new Date().toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
          if (window.RV) window.RV.reset();
          render();
          return;
        }
        render();
        setTimeout(step, 430);
      }
      setTimeout(step, 430);
    }
    function rcWizEnterPreview() {
      var w = state.rcWizard;
      if (!w.previewGrid) w.previewGrid = gridFromUpload(state.upload);
      w.backupGrid = rgGridSnapshot();                 // remember the live grid (holds the Advanced-settings structure)
      // #2 — the preview's column order + which conditions/pay elements show
      // follow the Advanced settings configured on step 1 (the live grid).
      var pg = JSON.parse(JSON.stringify(w.previewGrid));
      if (w.backupGrid && Array.isArray(w.backupGrid.active)) {
        pg.active = w.backupGrid.active.slice();
        pg.lookup = (w.backupGrid.lookup || w.backupGrid.active).slice();
        pg.seasonUplift = w.backupGrid.seasonUplift;
        pg.overrides.forEach(function (o) { if (o.cond) Object.keys(o.cond).forEach(function (k) { if (pg.active.indexOf(k) < 0) delete o.cond[k]; }); });
      }
      w.previewGrid = pg;
      state.grid = JSON.parse(JSON.stringify(pg));
      state.gridUI = { collapsed: {}, filters: {}, showLookup: false, dirty: false, savedAt: null };
      w.step = 2;
    }
    function rcWizCommitPreview() {                     // leave step 2 → keep edits, restore live

      w.previewGrid = rgGridSnapshot();
      if (w.backupGrid) { state.grid = w.backupGrid; w.backupGrid = null; }
    }
    function rcWizCancel() {
      var w = state.rcWizard;
      if (w && w.backupGrid) state.grid = w.backupGrid;  // discard any preview hijack

    function rcUploadBlock() {

      var phase = up ? up.phase : (state.upload ? "ready" : "idle");

        return '<div class="rc-up">' +
          '<div class="rc-up-file">' + ico("Excel", "rc-up-ico") +

      if (phase === "failed") {
        var er = up.error || { title: "We couldn\u2019t read the file", detail: "Try again or choose a different file." };
        return '<div class="rc-up rc-up--fail">' +
          '<div class="rc-up-file">' + ico("Excel", "rc-up-ico") +
            '<div class="rc-up-fmain"><div class="rc-up-name">' + escapeHtml(up.fileName) + '</div>' +
              '<div class="rc-up-fmeta">Couldn\u2019t be read</div></div>' +

          '</div>' +
          '<div class="rc-up-error">' + ico("Alert") +
            '<div><div class="rc-up-error-t">' + escapeHtml(er.title) + '</div>' +
            '<div class="rc-up-error-d">' + escapeHtml(er.detail) + '</div></div></div>' +
          '<button class="proto-btn proto-btn--secondary rc-up-retry" data-act="remove-file">' + ico("FileUpload") + 'Choose a different file</button>' +
        '</div>';
      }

      // ready
      var u = state.upload;
      var lineCount = u.kind === "grid" ? rgGridLineCount(u.grid)
        : (u.parsed && u.parsed.detected) ? u.parsed.roleMatching.filter(function (m) { return m.role; }).length
        : (u.rows ? u.rows.length : 0);
      var meta = u.kind === "grid"
        ? (lineCount + ' rate ' + (lineCount === 1 ? 'line' : 'lines') + (u.size ? ' \u00b7 ' + fmtSize(u.size) : ''))
        : (u.parsed && u.parsed.detected)
        ? (lineCount + ' roles \u00b7 ' + u.parsed.jobTypes.length + ' job mappings')
        : (fmtSize(u.size || 0) + ' \u00b7 ' + lineCount + ' rows detected');
      var structSub = u.kind === "grid" ? "Rate card template"
        : (u.parsed && u.parsed.detected) ? "Reference workbook" : "Flat rate sheet";
      return '<div class="rc-up rc-up--ok">' +
        '<div class="rc-up-file">' + ico("Excel", "rc-up-ico") +
          '<div class="rc-up-fmain"><div class="rc-up-name">' + escapeHtml(u.name) + '</div>' +
            '<div class="rc-up-fmeta">' + meta + '</div></div>' +
          '<span class="rc-up-okpill">' + ico("Check") + 'Readable</span>' +
          '<button class="fc-x" data-act="remove-file" aria-label="Remove file">' + ico("X") + '</button>' +
        '</div>' +
        '<ul class="rc-up-checks">' +
          rcUpCheck("ok", "Readable format", ".xlsx, .xls or .csv") +
          rcUpCheck("ok", "Recognised structure", structSub) +
          rcUpCheck("ok", "Rates found", lineCount + ' rate ' + (lineCount === 1 ? 'line' : 'lines')) +
        '</ul>' +
      '</div>';
    }

    function rcWizStep1() {
      var w = state.rcWizard, up = w && w.up;
      var phase = up ? up.phase : (state.upload ? "ready" : "idle");

      if (phase === "idle") {
        rightBody =

            ico("FileUpload", "dz-ico") +
            '<div class="dz-title">Drag and drop your rate card</div>' +
            '<div class="dz-sub">or <span class="dz-browse">browse</span> &middot; .xlsx, .xls or .csv</div>' +

          '<input type="file" id="fileinput" accept=".xlsx,.xls,.csv" style="display:none" />' +
          '<button class="proto-btn proto-btn--ghost rc-wiz-sample" data-act="load-sample">' + ico("Excel") + 'Load the sample rate card</button>';
      } else {
        rightBody = rcUploadBlock();
      }
      return '<div class="rc-wiz-body">' +
        '<div class="rc-wiz-stepintro"><h2>Upload the rate card</h2>' +

        '<div class="rc-wiz-grid2">' +

            '<button class="proto-btn proto-btn--secondary" data-act="download-template">' + ico("FileDownload") + 'Download template (.xlsx)</button>' +
          '</div>' +
          '<div class="proto-card rc-wiz-panel">' +
            '<div class="rc-wiz-panel-head">' + ico("FileUpload") + '<span>Your file</span></div>' +
            rightBody +
          '</div>' +
        '</div>' +
        rcAdvancedHtml() +

    // A single editable pay-element row (an extra uplift or holiday-pay
    // rule): name + %/£ type toggle + value + remove. Mirrors the grid's
    // inline-input pattern so typing never triggers a full re-render.
    function rcFindPe(kind, id) {
      var arr = kind === "uplift" ? (state.grid.uplifts || []) : (state.grid.holidayPays || []);
      for (var i = 0; i < arr.length; i++) { if (arr[i].id === id) return arr[i]; }
      return null;
    }
    function rcPeRowHtml(kind, item) {
      var type = item.type || "pct";
      var seg = [["pct", "%"], ["abs", RG_CUR]].map(function (o) {
        return '<button class="rc-seg-btn' + (type === o[0] ? " is-on" : "") + '" data-act="rc-pe-type" data-pe-kind="' + kind + '" data-pe-id="' + item.id + '" data-uptype="' + o[0] + '" aria-pressed="' + (type === o[0] ? "true" : "false") + '">' + o[1] + '</button>';
      }).join("");
      var ph = kind === "uplift" ? "e.g. Night uplift" : "e.g. Enhanced bank-holiday pay";
      return '<div class="rc-pe-item" data-pe-id="' + item.id + '">' +
        '<input class="rc-pe-name" type="text" value="' + escapeHtml(item.label || "") + '" placeholder="' + ph + '" data-pe-kind="' + kind + '" data-pe-name="' + item.id + '" aria-label="Pay element name" />' +
        '<div class="rc-seg" role="group" aria-label="Value type">' + seg + '</div>' +
        '<div class="proto-numfield rc-pe-num"><input type="number" min="0" step="' + (type === "pct" ? "0.5" : "0.01") + '" inputmode="decimal" value="' + (item.val == null ? "" : item.val) + '" placeholder="' + (type === "pct" ? "0" : "0.00") + '" data-pe-kind="' + kind + '" data-pe-val="' + item.id + '" aria-label="Value" /><span class="nf-suffix">' + (type === "pct" ? "%" : "/ hr") + '</span></div>' +
        '<button class="rc-pe-del" data-act="rc-pe-del" data-pe-kind="' + kind + '" data-pe-id="' + item.id + '" title="Remove" aria-label="Remove pay element">' + ico("TrashCan") + '</button>' +
      '</div>';
    }
    // Pay elements section of Advanced settings. Worker pay, overtime and
    // holiday pay are always included (unselectable); uplifts and extra
    // holiday-pay rules can be added without limit.
    function rcPayElementsHtml(seasonOn) {
      var ups = state.grid.uplifts || [], hps = state.grid.holidayPays || [];
      var upRows = ups.map(function (it) { return rcPeRowHtml("uplift", it); }).join("");
      var hpRows = hps.map(function (it) { return rcPeRowHtml("holpay", it); }).join("");
      return '<div class="rc-adv-sec">' +
        '<h4 class="rc-adv-h">Pay elements</h4>' +
        '<p class="rc-adv-hint">Worker pay, every type of overtime and statutory holiday pay are always included and applied to every line. Layer optional uplifts and extra holiday-pay rules on top — add as many as the card needs.</p>' +
        '<div class="rc-pe-group">' +
          '<span class="rc-pe-grouplabel">Always included</span>' +
          '<div class="rc-adv-chips">' +
            '<span class="rc-struct-chip is-locked">' + ico("Check") + 'Worker pay<em>per line</em></span>' +
            '<span class="rc-struct-chip is-locked">' + ico("Check") + 'Overtime<em>all types</em></span>' +
            '<span class="rc-struct-chip is-locked">' + ico("Check") + 'Holiday pay<em>WTR 12.07%</em></span>' +
          '</div>' +
        '</div>' +
        '<div class="rc-pe-group">' +
          '<span class="rc-pe-grouplabel">Uplifts</span>' +
          '<div class="rc-pe-list">' +
            '<div class="rc-pe-item rc-pe-item--toggle">' +
              '<button class="rc-struct-chip' + (seasonOn ? " is-on" : "") + '" data-act="rc-toggle-season">' + ico(seasonOn ? "Check" : "AddCircle") + 'Season uplift<em>per line</em></button>' +
              '<span class="rc-pe-note">Peak value is set on each rate line.</span>' +
            '</div>' +
            upRows +
            '<button class="rc-pe-add" data-act="rc-add-uplift">' + ico("Add") + 'Add uplift</button>' +
          '</div>' +
        '</div>' +
        '<div class="rc-pe-group">' +
          '<span class="rc-pe-grouplabel">Holiday pay</span>' +
          '<div class="rc-pe-list">' +
            '<div class="rc-pe-item rc-pe-item--toggle">' +
              '<span class="rc-struct-chip is-locked">' + ico("Check") + 'Statutory holiday pay<em>WTR 12.07%</em></span>' +
              '<span class="rc-pe-note">Always accrued — cannot be removed.</span>' +
            '</div>' +
            hpRows +
            '<button class="rc-pe-add" data-act="rc-add-holpay">' + ico("Add") + 'Add holiday pay</button>' +
          '</div>' +
        '</div>' +
      '</div>';
    }
    // Advanced settings on upload step 1 — the rate card STRUCTURE (which
    // conditions and pay elements this card carries) plus the moved
    // Add-condition and Rate-custom-lookup controls.
    function rcAdvancedHtml() {
      var open = !!state.gridUI.showAdvanced;
      var active = state.grid.active;
      var seasonOn = state.grid.seasonUplift !== false;
      var condChips = Object.keys(RG_CONDS).map(function (k) {
        var on = active.indexOf(k) >= 0;
        return '<button class="rc-struct-chip' + (on ? " is-on" : "") + '" data-act="rc-toggle-cond" data-cond="' + k + '">' + ico(on ? "Check" : "AddCircle") + RG_CONDS[k].label + '</button>';
      }).join("");
      var body = '<div class="proto-card rc-adv-body">' +
        '<div class="rc-adv-sec">' +
          '<h4 class="rc-adv-h">Conditions</h4>' +
          '<p class="rc-adv-hint">Position is always a condition — one rate card per position. Add the dimensions this card varies pay by.</p>' +
          '<div class="rc-adv-chips">' +
            '<span class="rc-struct-chip is-locked">' + ico("Check") + 'Position<em>default</em></span>' +
            condChips +
          '</div>' +
        '</div>' +
        rcPayElementsHtml(seasonOn) +
        '<div class="rc-adv-sec">' +
          '<h4 class="rc-adv-h">Lookup order</h4>' +
          '<p class="rc-adv-hint">Set the order bookings use to resolve a rate when more than one line matches \u2014 the leftmost field has the highest weight.</p>' +
          '<div class="rc-adv-actions">' +
            '<button class="proto-btn proto-btn--secondary rg-tbtn' + (state.gridUI.showLookup ? " is-on" : "") + '" data-act="rg-toggle-lookup" aria-pressed="' + (state.gridUI.showLookup ? "true" : "false") + '">' + ico("Bolt") + 'Rate custom lookup</button>' +
          '</div>' +
          (state.gridUI.showLookup ? rgLookupPanelHtml() : "") +
        '</div>' +
      '</div>';
      return '<div class="rc-adv">' +
        '<button class="rc-adv-toggle" data-act="rc-toggle-adv" aria-expanded="' + (open ? "true" : "false") + '">' +
          ico("Adjustment") + '<span class="rc-adv-title">Advanced settings</span>' +
          '<span class="rc-adv-cap">Rate card structure, conditions &amp; lookup</span>' +
          ico(open ? "ChevronUp" : "ChevronDown") +
        '</button>' +
        (open ? body : "") +
      '</div>';
    }

    // Scope summary of the parsed upload, for the step-2 confirmation and
    // the step-3 footer. Builds + validates the canonical staged set once.
    function rcScopeStats() {
      if (!window.RPCore) return { rates: 0, suppliers: 0, sites: 0, jobTypes: 0, errors: 0, warnings: 0 };
      var lines = window.RPCore.validate(window.RPCore.buildStaged());
      function uniq(f) { var o = {}; lines.forEach(function (L) { o[f(L)] = 1; }); return Object.keys(o).length; }
      var e = 0, w = 0;
      lines.forEach(function (L) { e += L.errCount; w += L.warnCount; });
      return { rates: lines.length, suppliers: uniq(function (L) { return L.supplier; }), sites: uniq(function (L) { return L.site; }), jobTypes: uniq(function (L) { return L.jobType; }), errors: e, warnings: w };
    }

    // Step 2 — "Process & confirm": parse, recompute, validate, diff. Shows
    // a stepwise pipeline (spec §6 Processing) then the organize / resolve /
    // change-summary surface (window.RV, mounted into #rv-root).
    function rcWizStepProcess() {
      var w = state.rcWizard;
      var proc = w.proc || { stage: 0, done: false };

      if (proc.done) {
        // Validate surface (A · organize, B · resolve, C · change summary)
        return '<div class="rc-wiz-body">' +
          '<div class="rc-wiz-stepintro"><h2>Validate</h2>' +
            '<p>We recomputed every charge rate with the standardized engine and diffed it against the live version. Review how the data was organized, resolve what\u2019s blocking, and see what this upload changes. Nothing goes live until you apply.</p></div>' +
          '<div id="rv-root"></div>' +
        '</div>';
      }

      var stages = [
        { t: "Parsing the workbook", s: "Reading the Net Pay Table, engine constants and agency config" },
        { t: "Mapping columns", s: "Matching each source column to a model field" },
        { t: "Classifying data", s: "Routing rows to the pay rate engine, agency config, constants and lookups" },
        { t: "Normalizing", s: "Replacing the source\u2019s per-row formulas with the standardized burden engine" },
        { t: "Validating", s: "Tagging blockers, confirmations and warnings on every row" },
        { t: "Diffing", s: "Comparing the staged set against the current live version" },
      ];
      var rows = stages.map(function (st, i) {
        var done = proc.done || proc.stage > i;
        var active = !proc.done && proc.stage === i;
        var icon = done ? '<span class="rcp-stage-ic">' + ico("Check") + '</span>'
          : active ? '<span class="rcp-stage-ic is-spin"><span class="rcp-spin"></span></span>'
          : '<span class="rcp-stage-ic">' + String(i + 1) + '</span>';
        var status = done ? "Done" : active ? "Working\u2026" : "Waiting";
        return '<div class="rcp-stage ' + (done ? "is-done" : active ? "is-active" : "") + '">' +
          icon +
          '<div class="rcp-stage-main"><div class="rcp-stage-title">' + st.t + '</div><div class="rcp-stage-sub">' + st.s + '</div></div>' +
          '<span class="rcp-stage-status">' + status + '</span>' +
        '</div>';
      }).join("");

      return '<div class="rc-wiz-body">' +
        '<div class="rc-wiz-stepintro"><h2>Validating the upload</h2>' +
          '<p>We parse the workbook, map and classify every row, normalize the source\u2019s inconsistent per-row formulas, recompute with the standardized engine, then validate and diff against the current live version.</p></div>' +
        '<div class="rcp-proc"><div class="rcp-stages">' + rows + '</div></div>' +
      '</div>';
    }

    // Step 3 — "Pay Rate Configuration": every pay rate for the client in
    // one editable, grouped table. RM mounts into #rm-root (rate-model.js).
    // Split out from the old sub-tabbed "Rate model" step.
    function rcWizStepPayConfig() {
      return '<div class="rc-wiz-body">' +
        '<div class="rc-wiz-stepintro"><h2>Pay rate configuration</h2>' +
          '<p>Your uploaded template in full \u2014 every column, in template order, as one flat list, so you can confirm the upload landed exactly as your file. Group, filter, sort or focus the columns to investigate; read each rate\u2019s build (base \u2192 NMW floor \u2192 pay rate) and edit the pay data. The recipe is read-only; edits are staged until Activate.</p></div>' +
        '<div id="rm-root"></div>' +
      '</div>';
    }

    // Step 4 — "Agency Rate Configuration": each supplier's commercial
    // markup and cost parameters. RC mounts into #rc-root (rate-config.js).
    function rcWizStepAgencyConfig() {
      return '<div class="rc-wiz-body">' +
        '<div class="rc-wiz-stepintro"><h2>Agency rate configuration</h2>' +
          '<p>The full agency recipe \u2014 the same columns the rate engine compiles \u2014 filled in for every supplier \u00d7 site \u00d7 job-type line. Edit the five agency inputs (hours, pension %, sick, levy, markup) in place; the burden and bill recompute live. Inputs propagate to their scope; unlink a cell to override one line. Net pay and statutory rates are read-only. Open in template view — a flat list of every column in template order across all suppliers — then group, filter, sort or focus the columns (Inputs &amp; bill / Burden build) to investigate, and Reset to template view to return to the mirror. Edits stage until Activate.</p></div>' +
        '<div id="rc-root"></div>' +
      '</div>';
    }

    // Step 5 — "Rate Cards": read-only bill-rate cards (8.1) +

    // #ra-root (see rate-cards.js). No live data is written here.
    function rcWizStepPreview() {
      return '<div class="rc-wiz-body">' +
        '<div class="rc-wiz-stepintro"><h2>Rate cards</h2>' +
          '<p>The resulting bill-rate cards by supplier, built from the staged markup and engine burden. Bill rate is the anchor \u2014 expand any row for the tier-tagged waterfall. Read-only here; edit markup or cost inputs back in Agency Rate Configuration. Nothing goes live until Activate.</p></div>' +
        '<div id="ra-root"></div>' +

          '<p>Confirm what you\u2019d actually bill for a concrete booking before going live \u2014 with UK-law guardrails (NMW by age, NIC relief, pension minimum, AWR parity, levy, SSP, VAT, working time). All from the staged data; nothing goes live until Activate.</p></div>' +
        '<div id="ra-root"></div>' +
      '</div>';
    }

    function rcWizStep2() {
      var w = state.rcWizard;
      var cmpOn = w.compareVer != null;
      var cmpVer = cmpOn ? compareVerObj(w.compareVer) : null;
      if (cmpOn && !cmpVer) { w.compareVer = null; cmpOn = false; }   // selected version went away

      var miss = rgMissingBase();
      var intro = cmpOn
        ? '<p>Comparing this upload against ' + escapeHtml(verShortLabel(cmpVer)) + '. Only the differences show below \u2014 switch to All rates to edit the staged card.</p>'
        : (miss.length
          ? '<p>Review the staged rates below. Fix the highlighted issues \u2014 every position needs a base rate before you can continue.</p>'
