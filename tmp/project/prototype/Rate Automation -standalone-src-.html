      var bodyBlock = cmpOn
        ? rcWizCompareControl() + rcWizDiffView(cmpVer)
        : rcWizCompareControl() +
          '<div class="rg-root' + (state.grid.seasonUplift === false ? " rg-no-uplift" : "") + '">' +
            rcWizPreviewToolbar() +
            (state.gridUI.showLookup ? rgLookupPanelHtml() : "") +
            '<div class="rg-banners" id="rg-banners">' + rgBannersHtml() + '</div>' +
            rgTableHtml() +
          '</div>';

      return '<div class="rc-wiz-body">' +
        '<div class="rc-wiz-stepintro"><h2>Preview the rates</h2>' + intro + '</div>' +
        bodyBlock +
      '</div>';
    }

    function rcWizStep3() {
      var w = state.rcWizard;
      var grid = w.previewGrid || state.grid;
      var nLines = (grid.overrides || []).length + RG_POSITIONS.filter(function (p) { var b = grid.bases[p.code]; return b != null && b !== ""; }).length;
      var nUplifts = (grid.overrides || []).filter(function (o) { return o.up && o.up.val != null && o.up.val !== ""; }).length +
        RG_POSITIONS.filter(function (p) { var bu = grid.baseUp && grid.baseUp[p.code]; return bu && bu.val != null && bu.val !== ""; }).length;
      var def = (state.upload && state.upload.effDate) ? state.upload.effDate : defaultEffDate();
      var scheduledN = versionTimeline().filter(function (v) { return v.status === "scheduled"; }).length;

      var edgeItems = '';
      edgeItems += '<li>' + ico("Information") + '<span>Bookings already placed keep their locked rate. Only bookings created on or after the start date use this version.</span></li>';
      edgeItems += '<li>' + ico("Check") + '<span>Every position has a base rate, so any booking resolves to at least the base.</span></li>';
      if (nUplifts) edgeItems += '<li>' + ico("TimeAdd") + '<span>' + nUplifts + ' line' + (nUplifts === 1 ? '' : 's') + ' carry a season uplift \u2014 it applies automatically during the peak window.</span></li>';
      if (scheduledN) edgeItems += '<li>' + ico("Alert") + '<span>' + scheduledN + ' version' + (scheduledN === 1 ? ' is' : 's are') + ' already scheduled. If their dates overlap, the latest applicable date wins.</span></li>';

      return '<div class="rc-wiz-body">' +
        '<div class="rc-wiz-stepintro"><h2>Choose the start date</h2>' +
          '<p>Pick the date the new version takes effect. It supersedes the current Master Rate Card from that date and stays in force until a newer version replaces it.</p></div>' +
        '<div class="rc-wiz-grid2">' +
          '<div class="proto-card rc-wiz-panel">' +
            '<div class="rc-wiz-panel-head">' + ico("TimeAdd") + '<span>Applicable from</span></div>' +
            '<label class="proto-datefield" style="margin-bottom:14px"><span class="df-label">' + ico("CreditCard") + 'Rate card name</span>' +
              '<input type="text" id="rc-card-name" class="bsim-input" value="' + escapeHtml(w.cardName != null ? w.cardName : (state.upload && state.upload.name ? state.upload.name : "")) + '" placeholder="e.g. Staffline June uplift" aria-label="Rate card name" /></label>' +
            '<label class="proto-datefield"><span class="df-label">Start date</span>' +
              '<input type="date" id="effdate" value="' + def + '" min="' + todayISO() + '" aria-label="Applicable from date" /></label>' +
            '<p class="rc-wiz-panel-text">' + nLines + ' rate ' + (nLines === 1 ? 'line' : 'lines') + ' across ' + RG_POSITIONS.length + ' positions will be captured in this version.</p>' +
          '</div>' +
          '<div class="proto-card rc-wiz-panel">' +
            '<div class="rc-wiz-panel-head">' + ico("ClipboardCircleCheck") + '<span>Before you apply</span></div>' +
            '<ul class="rc-wiz-edges">' + edgeItems + '</ul>' +
          '</div>' +
        '</div>' +
      '</div>';
    }

    function rcWizardView() {
      var w = state.rcWizard, step = w.step;
      var head = crumb([
        { label: "Settings", act: "settings-root" },
        { label: "Rate Cards", act: "wiz-cancel" },
        { label: "Upload new rate card" },
      ]) +
      '<button class="proto-subnav-back rc-detail-back" data-act="wiz-cancel">' + ico("ArrowLeft") + 'Back to rate cards</button>' +
      '<div class="proto-page-head"><h1>Upload new rate card</h1>' +
        '<p>Upload a file, preview and fix the rates, then choose the date the new version takes effect.</p></div>';

      // Persistent canonical 5-step stepper (spec §1) — internal steps map 1:1.
      var specPos = step;
      var SPEC_STEPS = [
        { n: 1, label: "Upload" },
        { n: 2, label: "Validate" },
        { n: 3, label: "Pay Rate Configuration" },
        { n: 4, label: "Agency Rate Configuration" },
        { n: 5, label: "Rate Cards" },
        { n: 6, label: "Simulator" },
        { n: 7, label: "Activate" },
      ];
      function stepPill(p) {
        var done = p.n < specPos;
        var cls = p.n === specPos ? "is-on" : (done ? "is-done" : "");
        return '<span class="upm-step ' + cls + '"><span class="upm-num">' + (done ? ico("Check") : String(p.n)) + '</span>' + p.label + '</span>';
      }
      var rail = '<div class="upm-steps rc-wiz-steps">' +
        SPEC_STEPS.map(function (p, i) { return (i ? '<span class="upm-sep"></span>' : "") + stepPill(p); }).join("") +
      '</div>';

      var body = step === 1 ? rcWizStep1()
        : step === 2 ? rcWizStepProcess()
        : step === 3 ? rcWizStepPayConfig()
        : step === 4 ? rcWizStepAgencyConfig()
        : step === 5 ? rcWizStepPreview()
        : step === 6 ? rcWizStepSimulator()
        : rcWizStep3();

      var footer;
      if (step === 1) {
        var up1 = w.up;
        var ph1 = up1 ? up1.phase : (state.upload ? "ready" : "idle");
        var s1 = ph1 === "uploading" ? ico("FileUpload") + "Uploading\u2026"
          : ph1 === "checking" ? ico("Search") + "Checking the file\u2026"
          : ph1 === "failed" ? ico("Alert") + "Couldn\u2019t read the file"
          : ph1 === "ready" ? ico("Check") + "Readable \u2014 ready to validate"
          : ico("Information") + "Upload a rate card to continue";
        var ready1 = ph1 === "ready";
        footer = '<button class="proto-btn proto-btn--ghost" data-act="wiz-cancel">Cancel</button>' +
          '<div class="rc-wiz-foot-status' + (ph1 === "failed" ? " is-block" : ready1 ? " is-ok" : "") + '">' + s1 + '</div>' +
          '<button class="proto-btn proto-btn--primary" data-act="wiz-next"' + (ready1 ? "" : " disabled") + '>Continue to validate' + ico("ArrowRight") + '</button>';
      } else if (step === 2) {
        var procDone = w.proc && w.proc.done;
        var gv = (procDone && window.RV && window.RV.state) ? window.RV.gate()
          : procDone ? { ok: true, statusHtml: ico("Check") + "Ready to continue" }
          : { ok: false, statusHtml: ico("Recalculate") + "Validating\u2026" };
        footer = '<button class="proto-btn proto-btn--ghost" data-act="wiz-back">' + ico("ArrowLeft") + 'Back</button>' +
          '<div class="rc-wiz-foot-status' + (procDone ? (gv.ok ? " is-ok" : " is-block") : "") + '" id="wiz-foot-status">' + gv.statusHtml + '</div>' +
          '<button class="proto-btn proto-btn--primary" id="wiz-next-btn" data-act="wiz-next"' + (procDone ? "" : " disabled") + '>Continue to pay rate configuration' + ico("ArrowRight") + '</button>';
      } else if (step === 3) {
        // Pay rate configuration \u2014 edits are staged, optional; no gate.
        footer = '<button class="proto-btn proto-btn--ghost" data-act="wiz-back">' + ico("ArrowLeft") + 'Back</button>' +
          '<div class="rc-wiz-foot-status is-ok" id="wiz-foot-status">' + ico("Check") + 'Pay rates staged \u2014 nothing live until Activate' + '</div>' +
          '<button class="proto-btn proto-btn--primary" id="wiz-next-btn" data-act="wiz-next">Continue to agency rate configuration' + ico("ArrowRight") + '</button>';
      } else if (step === 4) {
        // Gate on agency rate configuration validity (no missing markup).
        var rmKey3 = (state.upload && state.upload.name) || "sample";
        var gc = window.RC ? window.RC.gateState({ key: rmKey3 }) : { ok: true, statusHtml: ico("Check") + "Ready to continue" };
        footer = '<button class="proto-btn proto-btn--ghost" data-act="wiz-back">' + ico("ArrowLeft") + 'Back</button>' +
          '<div class="rc-wiz-foot-status' + (gc.ok ? " is-ok" : " is-block") + '" id="wiz-foot-status">' + gc.statusHtml + '</div>' +
          '<button class="proto-btn proto-btn--primary" id="wiz-next-btn" data-act="wiz-next">Continue to rate cards' + ico("ArrowRight") + '</button>';
      } else if (step === 5) {
        footer = '<button class="proto-btn proto-btn--ghost" data-act="wiz-back">' + ico("ArrowLeft") + 'Back</button>' +
          '<div class="rc-wiz-foot-status is-ok" id="wiz-foot-status">' + ico("Check") + 'Reviewed \u2014 no live data written yet' + '</div>' +
          '<button class="proto-btn proto-btn--primary" id="wiz-next-btn" data-act="wiz-next">Continue to simulator' + ico("ArrowRight") + '</button>';
      } else if (step === 6) {
        footer = '<button class="proto-btn proto-btn--ghost" data-act="wiz-back">' + ico("ArrowLeft") + 'Back</button>' +
          '<div class="rc-wiz-foot-status is-ok" id="wiz-foot-status">' + ico("Check") + 'Simulated \u2014 no live data written yet' + '</div>' +
          '<button class="proto-btn proto-btn--primary" id="wiz-next-btn" data-act="wiz-next">Continue to activate' + ico("ArrowRight") + '</button>';
      } else {
        footer = '<button class="proto-btn proto-btn--ghost" data-act="wiz-back">' + ico("ArrowLeft") + 'Back</button>' +
          '<button class="proto-btn proto-btn--primary" data-act="wiz-apply">' + ico("Bolt") + 'Apply rate card</button>';
      }

      return head +
        '<div class="proto-card rc-wizard">' +
          rail +
          '<div class="rc-wiz-content">' + body + '</div>' +
          '<div class="rc-wiz-foot">' + footer + '</div>' +
        '</div>';
    }

    // Lighter toolbar for the single-card detail (no destructive grid-wide
    // reset / remove-all / import-export — those belong to the whole grid).
    function rgDetailToolbar(code) {
      var n = rcLineCount(code);
      var on = state.gridUI.showLookup;
      return '<div class="rg-toolbar">' +
        '<div class="rg-toolbar-count" id="rg-count"><span class="rg-cnt-seg" style="white-space:nowrap"><b>' + n + '</b> rate ' + (n === 1 ? "line" : "lines") + ' in this card</span></div>' +
        '<div class="rg-toolbar-actions">' +
          rgAddCondMenuHtml() +
          '<button class="proto-btn proto-btn--secondary rg-tbtn" data-rg-addover="' + code + '">' + ico("AddCircle") + 'Add override</button>' +
          '<button class="proto-btn proto-btn--secondary rg-tbtn' + (on ? " is-on" : "") + '" data-act="rg-toggle-lookup" aria-pressed="' + (on ? "true" : "false") + '">' + ico("Bolt") + 'Custom lookup</button>' +
        '</div>' +
      '</div>';
    }

    // Coverage banners scoped to a single rate card (this position only).
    function rgDetailBanners(code) {
      var base = state.grid.bases[code], miss = base == null || base === "";
      var conf = rgConflicts(), dup = 0, amb = 0;
      state.grid.overrides.filter(function (o) { return o.pos === code; }).forEach(function (o) {
        var f = conf.flags[o.id]; if (f) { if (f.duplicate) dup++; else amb++; }
      });
      var html = miss
        ? '<div class="proto-banner proto-banner--error">' + ico("Alert") + '<div class="bn-text"><b>This rate card has no base rate.</b> Add a base rate in the header row so every booking resolves to at least the base.</div></div>'
        : '<div class="proto-banner">' + ico("Check") + '<div class="bn-text"><b>Base rate set.</b> Bookings for this position always resolve to at least the base.</div></div>';
      if (dup || amb) {
        var parts = [];
        if (dup) parts.push(dup + " duplicate " + (dup === 1 ? "line" : "lines"));
        if (amb) parts.push(amb + " ambiguous " + (amb === 1 ? "line" : "lines"));
        html += '<div class="proto-banner proto-banner--warning">' + ico("Alert") + '<div class="bn-text"><b>' + parts.join(" \u00b7 ") + '.</b> Order alone decides the winner. Make one line more specific to resolve an ambiguity, or delete a duplicate.</div></div>';
      }
      return html;
    }

    // Rate lines a version captured for one position.
    function verRateCountForPos(v, code) {
      if (v.grid) {
        var n = (v.grid.overrides || []).filter(function (o) { return o.pos === code; }).length;
        var b = v.grid.bases && v.grid.bases[code];
        if (b != null && b !== "") n++;
        return n;
      }
      return verRateCount(v);
    }

    // Version history for one rate card — the same date-effective timeline,
    // with each version's captured rates scoped to this position.
    function rcVersionHistoryCard(code) {
      if (!state.versions.length) return "";
      var p = RG_POSITIONS.filter(function (x) { return x.code === code; })[0];
      var disp = versionTimeline().slice().reverse();   // newest first
      var rows = disp.map(function (v) {
        var m = verStatusMeta(v.status);
        var open = state.openVersion === v.version;
        var nRates = verRateCountForPos(v, code);
        var tr = '<tr class="rc-ver-row' + (open ? " is-open" : "") + '" data-verrow="' + v.version + '" tabindex="0" role="button" aria-expanded="' + (open ? "true" : "false") + '">' +
            '<td><span class="rc-ver-no">v' + v.version + '</span></td>' +
            '<td><span class="proto-ver-badge ' + m.cls + '">' + m.label + '</span></td>' +
            '<td>' + escapeHtml(verEffectivePhrase(v)) + '</td>' +
            '<td class="num">' + nRates + '</td>' +
            '<td>' + escapeHtml(fmtDate(v.appliedAt)) + '</td>' +
            '<td class="rc-ver-chev-cell"><button class="proto-ver-link rc-ver-dl" data-verdownload="' + v.version + '" title="Download this version as a template" aria-label="Download v' + v.version + ' as a template">' + ico("FileDownload") + '</button>' + ico("ChevronDown", "rc-ver-chev") + '</td>' +
          '</tr>';
        var detail = "";   // rates now render above (in the version table), not inline
        return tr + detail;
      }).join("");

      return '<div class="proto-card" style="padding:var(--evr-spacing-lg);margin-top:var(--evr-spacing-md)">' +
        '<div class="proto-sr-head"><div>' +
          '<div class="sr-title">Version history</div>' +
          '<div class="sr-meta">Each version supersedes the previous one from its applicable date. Click a version to view the rates it captured for ' + escapeHtml(p.name) + ' above.</div>' +
        '</div>' +
          '<div class="proto-sr-actions"><button class="proto-btn proto-btn--ghost" data-act="clear-versions">Clear history</button></div>' +
        '</div>' +
        '<div class="proto-table-wrap rc-ver-table-wrap">' +
          '<table class="proto-table proto-table--versions">' +
            '<thead><tr>' +
              '<th>Version</th><th>Status</th><th>Effective</th><th class="num">Rate lines</th><th>Applied</th><th aria-label="Expand"></th>' +
            '</tr></thead>' +
            '<tbody>' + rows + '</tbody>' +
          '</table>' +
        '</div>' +
      '</div>';
    }

    // Empty-state CTA shown when no rate card has been uploaded yet.
    function uploadPromptCard() {
      return '<div class="proto-card" style="padding:var(--evr-spacing-lg)">' +
        '<div class="proto-stub" style="padding:var(--evr-spacing-2xl) var(--evr-spacing-lg)">' + ico("FileUpload") +
          '<h3>No rate card uploaded yet</h3>' +
          '<p>Upload an agency rate card to create your first version. We validate the file and preview every computed rate before anything changes.</p>' +
          '<button class="proto-btn proto-btn--primary" data-act="upload-new" style="margin-top:18px">' + ico("FileUpload") + 'Upload rate card</button>' +
        '</div></div>';
    }

    // Two-step "Upload new rate card" modal. Step 1: download template +
    // upload file. Step 2: choose the effective date and apply.
    function uploadModal(stepsHtml) {
      if (!state.showUpload) return "";
      var u = state.upload;
      var step = state.uploadStep || 1;
      var rail = '<div class="upm-steps">' +
          '<span class="upm-step' + (step === 1 ? " is-on" : " is-done") + '"><span class="upm-num">' + (step > 1 ? ico("Check") : "1") + '</span>Download &amp; upload</span>' +
          '<span class="upm-sep"></span>' +
          '<span class="upm-step' + (step === 2 ? " is-on" : "") + '"><span class="upm-num">2</span>Apply &amp; schedule</span>' +
        '</div>';
      var body, footer;
      if (step === 1) {
        body = stepsHtml;
        footer = '<button class="proto-btn proto-btn--ghost" data-act="cancel-upload">Cancel</button>' +
          '<button class="proto-btn proto-btn--primary" data-act="upload-next"' + (u ? "" : " disabled") + '>Continue' + ico("ArrowRight") + '</button>';
      } else {
        var def = (u && u.effDate) ? u.effDate : defaultEffDate();
        body = '<div class="upm-apply">' +
            '<label class="proto-datefield"><span class="df-label">' + ico("TimeAdd") + 'Applicable from</span>' +
              '<input type="date" id="effdate" value="' + def + '" min="' + todayISO() + '" aria-label="Applicable from date" /></label>' +
            '<p class="proto-apply-hint">' + ico("Information") + 'Applying creates a new rate card version that takes effect on the chosen date and stays in force until a newer version supersedes it.</p>' +
          '</div>';
        footer = '<button class="proto-btn proto-btn--ghost" data-act="upload-back">' + ico("ArrowLeft") + 'Back</button>' +
          '<button class="proto-btn proto-btn--primary" data-act="process">' + ico("Bolt") + 'Apply rate card</button>';
      }
      return '<div class="proto-modal-scrim" id="upload-scrim">' +
        '<div class="proto-modal" role="dialog" aria-modal="true" aria-label="Upload new rate card">' +
          '<div class="proto-modal-head"><div>' +
            '<h2 class="proto-modal-title">Upload new rate card</h2>' +
            '<p class="proto-modal-sub">Validate the file and preview every computed rate, then choose the date the new version takes effect.</p>' +
          '</div><button class="proto-modal-x" data-act="cancel-upload" aria-label="Close">' + ico("X") + '</button></div>' +
          rail +
          '<div class="proto-modal-body">' + body + '</div>' +
          '<div class="proto-modal-foot">' + footer + '</div>' +
        '</div>' +
      '</div>';
    }

    // The "Bulk upload & automation" section heading shown above the upload
    // flow (always present; it is the whole page when no rate cards exist).
    function bulkHead() {
      return '<div class="proto-engine-head" style="margin-bottom:var(--evr-spacing-md)">' +
          '<h2>Bulk upload &amp; automation</h2>' +
          '<p>Upload a rate card to map every net-pay job to a rate-card role, then let the pay rate engine build charge rates from the configured on-costs and margin.</p>' +
        '</div>';
    }

    // Section heading once a rate card exists — the upload moves to the
    // "Upload new rate card" button inside the status card below.
    function rateCardHead() {
      return '<div class="proto-engine-head" style="margin-bottom:var(--evr-spacing-md)">' +
          '<h2>Rate card</h2>' +
          '<p>One rate card automation runs at a time. Upload a new file to create a version that supersedes the current card from a date you choose.</p>' +
        '</div>';
    }

    // Wrap the upload flow in a titled, dismissible panel when a rate card
    // already exists (reached via the top-right button); when there is no
    // card yet the flow is the page itself, so it needs no wrapper.
    function uploadPanel(inner, hasVersions) {
      if (!hasVersions) return inner;
      return '<div class="proto-upload-panel">' +
          '<div class="proto-engine-head proto-upload-panel-head">' +
            '<div><h2>Upload a new rate card version</h2>' +
              '<p>Validate the file and preview every computed rate, then choose the date the new version takes effect.</p></div>' +
            '<button class="proto-btn proto-btn--ghost" data-act="cancel-upload">' + ico("X") + 'Cancel</button>' +
          '</div>' +
          inner +
        '</div>';
    }

    // Effective-date phrasing for a row in the versions table.
    function verEffectivePhrase(v) {
      if (v.status === "scheduled") return "From " + fmtDay(v.startDate);
      if (v.status === "active")    return fmtDay(v.startDate) + (v.endDate ? " \u2013 " + fmtDay(v.endDate) : " \u2013 present");
      return fmtDay(v.startDate) + (v.endDate ? " \u2013 " + fmtDay(v.endDate) : "");
    }

    // Rate card status + versions table. Shows the active rate card's name
    // and on/off state, a top-right "Upload new rate card" button, and a
    // table of every version. Clicking a row reveals that version's
    // captured rates inline.
    function rateCardStatusCard() {
      var tl = versionTimeline();                  // chronological
      var disp = tl.slice().reverse();             // newest first for the table
      var activeV = tl.filter(function (v) { return v.status === "active"; })[0];
      var scheduledN = tl.filter(function (v) { return v.status === "scheduled"; }).length;

      // The rate card "name" is the active version's source file (or, before
      // any version is active yet, the most recently uploaded one).
      var nameV = activeV || disp[0];
      var rcName = nameV ? nameV.source : "Rate card";
      var on = state.rateCardOn;

      var statusLine = activeV
        ? 'Active version <b>v' + activeV.version + '</b> \u00b7 in force since ' + escapeHtml(fmtDay(activeV.startDate))
        : 'No version is active yet';
      if (scheduledN) statusLine += ' \u00b7 ' + scheduledN + ' scheduled';

      var rows = disp.map(function (v) {
        var m = verStatusMeta(v.status);
        var open = state.openVersion === v.version;
        var nRates = verRateCount(v);
        var rowActions = "";
        if (v.status === "superseded") rowActions = '<button class="proto-ver-link" data-verrollback="' + v.version + '">' + ico("TimeUndo") + 'Roll back to this version</button>';
        else if (v.status === "scheduled") rowActions = '<button class="proto-ver-link is-danger" data-vercancel="' + v.version + '">' + ico("Cancel") + 'Cancel schedule</button>';

        var tr = '<tr class="rc-ver-row' + (open ? " is-open" : "") + '" data-verrow="' + v.version + '" tabindex="0" role="button" aria-expanded="' + (open ? "true" : "false") + '">' +
            '<td><span class="rc-ver-no">v' + v.version + '</span></td>' +
            '<td><span class="proto-ver-badge ' + m.cls + '">' + m.label + '</span></td>' +
            '<td><span class="rc-ver-src">' + ico("Excel", "rc-ver-src-ico") + '<span class="rc-ver-src-name">' + escapeHtml(v.source) + '</span></span></td>' +
            '<td>' + escapeHtml(verEffectivePhrase(v)) + '</td>' +
            '<td class="num">' + nRates + '</td>' +
            '<td>' + escapeHtml(fmtDate(v.appliedAt)) + '</td>' +
            '<td class="rc-ver-chev-cell">' + ico("ChevronDown", "rc-ver-chev") + '</td>' +
          '</tr>';

        var detail = open
          ? '<tr class="rc-ver-detail"><td colspan="7">' +
              '<div class="rc-ver-detail-head">' +
                '<span class="proto-ver-snap-label">Rates captured in v' + v.version + ' \u00b7 effective ' + escapeHtml(fmtDay(v.startDate)) + '</span>' +
                (rowActions ? '<div class="rc-ver-detail-actions">' + rowActions + '</div>' : "") +
              '</div>' +
              versionSnapshot(v) +
            '</td></tr>'
          : "";
        return tr + detail;
      }).join("");

      return '<div class="proto-card" style="padding:var(--evr-spacing-lg)">' +
        '<div class="proto-rc-status-head">' +
          '<div class="proto-rc-id">' +
            ico("Excel", "rc-id-ico") +
            '<div class="rc-id-text">' +
              '<div class="rc-id-name">' + escapeHtml(rcName) + '</div>' +
              '<div class="rc-id-sub">' + statusLine + '. Each version stays in force until a newer one supersedes it.</div>' +
            '</div>' +
            '<span class="rc-onpill' + (on ? "" : " is-off") + '">' + ico(on ? "Check" : "X") + (on ? "On" : "Off") + '</span>' +
            '<label class="proto-switch rc-on-switch"><input type="checkbox" data-act="toggle-ratecard"' + (on ? " checked" : "") + ' aria-label="Rate card automation on or off" /><span class="sw-track"></span><span class="sw-knob"></span></label>' +
          '</div>' +
          '<button class="proto-btn proto-btn--primary rc-upload-new" data-act="upload-new">' + ico("FileUpload") + 'Upload new rate card</button>' +
        '</div>' +
        '<div class="proto-table-wrap rc-ver-table-wrap">' +
          '<table class="proto-table proto-table--versions">' +
            '<thead><tr>' +
              '<th>Version</th><th>Status</th><th>Rate card</th><th>Effective</th><th class="num">Rates</th><th>Applied</th><th aria-label="Expand"></th>' +
            '</tr></thead>' +
            '<tbody>' + rows + '</tbody>' +
          '</table>' +
        '</div>' +
        '<div class="proto-rc-status-foot">' +
          '<span class="rc-foot-meta">' + state.versions.length + ' version' + (state.versions.length === 1 ? "" : "s") + ' total \u00b7 click a row to view its captured rates</span>' +
          '<button class="proto-btn proto-btn--ghost" data-act="clear-versions">Clear history</button>' +
        '</div>' +
      '</div>';
    }

    // Flat preview for the simple (non-reference) template.
    function flatPreview(u) {
      var theadCells = u.cols.map(function (c) { return '<th>' + escapeHtml(String(c)) + '</th>'; }).join("");
      var rowsHtml = u.rows.slice(0, 8).map(function (r) {
        return '<tr>' + u.cols.map(function (c, i) {
          var val = r[i] == null ? "" : r[i];
          var isNum = typeof val === "number" || (i >= 3 && i <= 5);
          return '<td class="' + (isNum ? "num" : "") + '">' + escapeHtml(String(val)) + '</td>';
        }).join("") + '</tr>';
      }).join("");
      var more = u.rows.length > 8 ? '<p class="muted" style="margin:10px 0 0;font:var(--evr-body2)">Showing 8 of ' + u.rows.length + ' rows.</p>' : "";
      return '<hr class="proto-divider" /><div class="proto-section-title">Preview</div>' +
        '<div class="proto-table-wrap"><table class="proto-table"><thead><tr>' + theadCells + '</tr></thead><tbody>' + rowsHtml + '</tbody></table></div>' + more +
        applyBar(u.processed);
    }

    // ---------- Pricing: Control Panel summary ----------
    function npRowsIncluded() { return NET_PAY_ROWS.filter(function (r) { return r.include; }); }
    function selectedSiteName() {
      var inc = includedSites();
      if (state.npSite && inc.some(function (s) { return s.name === state.npSite; })) return state.npSite;
      return inc.length ? inc[0].name : "";
    }

    // Net Pay Reference — segmented selector for the active net-pay type.
    function netPayRefControl() {
      var seg = NET_PAY_TYPES.map(function (t) {
        var on = t.id === state.netPayRef;
        return '<button class="rc-seg-btn' + (on ? " is-on" : "") + '" data-npref="' + t.id + '" aria-pressed="' + (on ? "true" : "false") + '">' +
          '<span class="rc-seg-col">' + t.col + '</span><span class="rc-seg-name">' + escapeHtml(t.name) + '</span></button>';
      }).join("");
      return '<div class="rc-npref"><span class="rc-npref-label">Net Pay Reference</span>' +
        '<div class="rc-seg" role="group" aria-label="Net Pay Reference">' + seg + '</div>' +
        '<span class="rc-npref-note">' + ico("Information") + 'The active net-pay column the charge calc reads</span></div>';
    }

    function controlPanelCard() {
      var supRows = SUPPLIERS.map(function (s) {
        var marginTxt = s.id === "staffline" ? "by job group" : (s.marginType === "pct" ? s.margin + "%" : gbp(s.margin) + " / hr");
        return '<div class="rc-sup-row' + (s.include ? "" : " is-off") + '">' +
          '<label class="proto-switch rc-sup-switch"><input type="checkbox" data-sup-inc="' + s.id + '"' + (s.include ? " checked" : "") + ' aria-label="Include ' + escapeHtml(s.name) + '" /><span class="sw-track"></span><span class="sw-knob"></span></label>' +
          '<div class="rc-sup-name">' + escapeHtml(s.name) + '<span class="rc-sup-margin">Margin ' + marginTxt + '</span></div>' +
          '<span class="rc-flag ' + (s.formulas ? "rc-flag--yes" : "rc-flag--no") + '">' + ico(s.formulas ? "Check" : "X") + (s.formulas ? "Formulas available" : "No formulas") + '</span>' +
          '<span class="rc-bidbadge">' + (s.formulas ? (s.bids === "all" ? "Bids all job types" : (Array.isArray(s.bids) && s.bids.length ? s.bids.length + " of " + JOB_TYPES.length + " job types" : "No valid bids")) : "Cannot bid") + '</span>' +
        '</div>';
      }).join("");

      var sitesByArea = {};
      includedSites().forEach(function (s) { (sitesByArea[s.area] = sitesByArea[s.area] || []).push(s.name); });
      var areaChips = Object.keys(sitesByArea).map(function (a) {
        return '<span class="rc-area-chip"><b>' + escapeHtml(a) + '</b> · ' + sitesByArea[a].map(escapeHtml).join(", ") + '</span>';
      }).join("");

      var rowsInc = npRowsIncluded();
      var preN = rowsInc.filter(function (r) { return r.parity === "Pre"; }).length;
      var postN = rowsInc.filter(function (r) { return r.parity === "Post"; }).length;

      function tile(v, l, sub) {
        return '<div class="rc-tile"><div class="rc-tile-v">' + v + '</div><div class="rc-tile-l">' + l + '</div>' + (sub ? '<div class="rc-tile-sub">' + sub + '</div>' : "") + '</div>';
      }
      var tiles =
        tile(includedSuppliers().length + '<span class="rc-tile-of"> / ' + SUPPLIERS.length + '</span>', "Suppliers in card", biddingSuppliers().length + " can bid") +
        tile(includedSites().length + '<span class="rc-tile-of"> / ' + SITES.length + '</span>', "Sites in scope", Object.keys(sitesByArea).length + " areas") +
        tile(String(includedJobTypes().length), "Job types", JOB_TITLES.length + " job titles") +
        tile(activeNetPayType().col, "Net pay column", activeNetPayType().name) +
        tile(rowsInc.length + '<span class="rc-tile-of"> / ' + NET_PAY_ROWS.length + '</span>', "Net pay rows", preN + " pre · " + postN + " post parity");

      return '<div class="proto-card" style="padding:var(--evr-spacing-lg);margin-top:var(--evr-spacing-md)">' +
        '<div class="proto-section-title">Control Panel</div>' +
        '<p class="muted" style="margin:2px 0 16px;max-width:72ch">What the rate card is built from \u2014 the suppliers it covers, the sites and job types in scope, and which net-pay column drives every charge. Mirrors the workbook Control Panel tab.</p>' +
        '<div class="rc-tiles">' + tiles + '</div>' +
        netPayRefControl() +
        '<div class="proto-set-section-label">Supplier list \u2014 include &amp; charge-rate formulas</div>' +
        '<div class="rc-sup-list">' + supRows + '</div>' +
        '<div class="proto-set-section-label">Sites in scope \u2014 by area</div>' +
        '<div class="rc-area-row">' + (areaChips || '<span class="muted">No sites selected</span>') + '</div>' +
      '</div>';
    }

    // ---------- Pricing: Net Pay Table (editable grid) ----------
    function netPayTableCard() {
      var site = selectedSiteName();
      var siteChips = includedSites().map(function (s) {
        var on = s.name === site;
        return '<button class="rc-site-chip' + (on ? " is-on" : "") + '" data-npsite="' + escapeHtml(s.name) + '" aria-pressed="' + (on ? "true" : "false") + '">' +
          escapeHtml(s.name) + '<span class="rc-site-area">' + escapeHtml(s.area) + '</span></button>';
      }).join("");

      var parityTabs = ["all", "Pre", "Post"].map(function (p) {
        var on = state.parityFilter === p;
        var lbl = p === "all" ? "All parity" : p + "-parity";
        return '<button class="rc-par-tab' + (on ? " is-on" : "") + '" data-parfilter="' + p + '">' + lbl + '</button>';
      }).join("");

      var rows = NET_PAY_ROWS.filter(function (r) {
        return r.site === site && (state.parityFilter === "all" || r.parity === state.parityFilter);
      });

      var headTypes = NET_PAY_TYPES.map(function (t) {
        var on = t.id === state.netPayRef;
        return '<th class="num rc-np-typecol' + (on ? " is-active" : "") + '">' + escapeHtml(t.name) + '<span class="rc-np-col">col ' + t.col + '</span></th>';
      }).join("");

      var body = rows.map(function (r) {
        var typeCells = NET_PAY_TYPES.map(function (t) {
          var on = t.id === state.netPayRef;
          return '<td class="num rc-np-rate' + (on ? " is-active" : "") + '">' + gbp(r.rates[t.id]) + '</td>';
        }).join("");
        return '<tr class="' + (r.include ? "" : "rc-np-rowoff") + '">' +
          '<td>' + escapeHtml(r.jobTitle) + '</td>' +
          '<td><span class="rc-jt-chip">' + escapeHtml(r.jobType) + '</span></td>' +
          '<td><span class="rc-parity rc-parity--' + r.parity.toLowerCase() + '">' + r.parity + '-parity</span></td>' +
          typeCells +
          '<td class="rc-np-inc"><label class="proto-switch"><input type="checkbox" data-nprow="' + escapeHtml(r.id) + '"' + (r.include ? " checked" : "") + ' aria-label="Include rate" /><span class="sw-track"></span><span class="sw-knob"></span></label></td>' +
        '</tr>';
      }).join("");

      return '<div class="proto-card" style="padding:var(--evr-spacing-lg);margin-top:var(--evr-spacing-md)">' +
        '<div class="proto-section-title">Net Pay Table</div>' +
        '<p class="muted" style="margin:2px 0 14px;max-width:72ch">Net pay per job title, with a pre-parity and a post-parity row each (AWR 12-week rule). The highlighted column is the active Net Pay Reference. Toggle "Include?" to keep a rate out of the card.</p>' +
        '<div class="rc-np-toolbar"><div class="rc-site-chips">' + siteChips + '</div><div class="rc-par-tabs">' + parityTabs + '</div></div>' +
        '<div class="proto-table-wrap"><table class="proto-table rc-np-table"><thead><tr>' +
          '<th>Job title</th><th>Job type match</th><th>Parity status</th>' + headTypes + '<th class="rc-np-inc">Include?</th>' +
        '</tr></thead><tbody>' + body + '</tbody></table></div>' +
      '</div>';
    }

    // ---------- Pricing: per-supplier computed rate card (matrix) ----------
    function supplierRateCard(processed) {
      var site = selectedSiteName();
      var sups = includedSuppliers();
      var rows = NET_PAY_ROWS.filter(function (r) {
        return r.site === site && r.include && (state.parityFilter === "all" || r.parity === state.parityFilter);
      });
      if (!rows.length || !sups.length) return "";

      var head = '<tr><th class="rc-mx-corner">Job title · parity</th>' +
        sups.map(function (s) { return '<th class="num">' + escapeHtml(s.name) + (s.formulas ? "" : '<span class="rc-mx-noformula">no formulas</span>') + '</th>'; }).join("") +
      '</tr>';

      var body = rows.map(function (r) {
        var np = netPayValue(r);
        // Find the lowest valid charge to mark the best bid.
        var charges = sups.map(function (s) { return supplierBids(s, r.jobType) ? chargeForSupplier(np, s, r.jobType).charge : null; });
        var valid = charges.filter(function (c) { return c != null; });
        var best = valid.length ? Math.min.apply(null, valid) : null;
        var cells = sups.map(function (s, i) {
          if (charges[i] == null) return '<td class="num rc-mx-nobid">No bid</td>';
          var isBest = best != null && Math.abs(charges[i] - best) < 0.005;
          return '<td class="num rc-mx-charge' + (isBest ? " is-best" : "") + '">' + gbp(charges[i]) +
            (isBest ? '<span class="rc-mx-bestdot" title="Lowest valid bid">' + ico("Check") + '</span>' : "") + '</td>';
        }).join("");
        return '<tr><th class="rc-mx-rowh">' + escapeHtml(r.jobTitle) +
          '<span class="rc-parity rc-parity--' + r.parity.toLowerCase() + '">' + r.parity + '</span></th>' + cells + '</tr>';
      }).join("");

      return '<div class="proto-card" style="padding:var(--evr-spacing-lg);margin-top:var(--evr-spacing-md)">' +
        '<div class="rc-mx-head"><div class="proto-section-title" style="margin:0">Computed rate card \u2014 ' + escapeHtml(site) + '</div>' +
          '<span class="rc-mx-sub">Charge / hr per supplier on the <b>' + escapeHtml(activeNetPayType().name) + '</b> column \u00b7 ' + ico("Check") + ' lowest valid bid</span></div>' +
        '<div class="proto-matrix-wrap"><table class="proto-matrix rc-mx-table"><thead>' + head + '</thead><tbody>' + body + '</tbody></table></div>' +
        '<div class="rc-mx-legend">' +
          '<span class="rc-mx-key"><span class="rc-mx-keybox rc-mx-keybox--best"></span>Lowest valid bid</span>' +
          '<span class="rc-mx-key"><span class="rc-mx-keybox rc-mx-keybox--nobid"></span>No valid bid for this job type</span>' +
        '</div>' +
        applyBar(processed) +
      '</div>';
    }

    // ---------- Pricing: the pay rate engine ----------
    function flowStage(step, icon, title, sub, out) {
      return '<div class="proto-flow-stage' + (out ? " is-out" : "") + '">' +
        '<div class="fs-ico">' + ico(icon) + '</div>' +
        '<div class="fs-step">' + step + '</div>' +
        '<div class="fs-title">' + title + '</div>' +
        '<div class="fs-sub">' + sub + '</div></div>';
    }
    function flowArrow() { return '<div class="proto-flow-arrow">' + ico("ChevronRight") + '</div>'; }

    function buildRow(label, pctText, val, charge, fillCls, kind) {
      var w = Math.max(2, Math.min(100, val / charge * 100));
      var cls = "proto-build-row" + (kind === "subtotal" ? " is-subtotal" : kind === "total" ? " is-total" : "");
      var valCls = "br-val" + (kind === "add" ? " is-add" : "");
      var sign = kind === "add" ? "+" : "";
      return '<div class="' + cls + '">' +
        '<div class="br-label">' + label + (pctText ? '<span class="br-pct">' + pctText + '</span>' : "") + '</div>' +
        '<div class="proto-build-track"><div class="proto-build-fill ' + fillCls + '" style="width:' + w.toFixed(1) + '%"></div></div>' +
        '<div class="' + valCls + '">' + sign + gbp(val) + '</div>' +
      '</div>';
    }

    function engineCard(parsed) {
      var engine = state.engine;
      var workers = buildWorkers(parsed, engine);
      if (!workers.length) return "";
      if (state.exampleWorker >= workers.length) state.exampleWorker = 0;
      var ex = workers[state.exampleWorker];
      var w = ex.worker;
      var c = ex.calc;
      var onParts = c.parts.filter(function (p) { return p.on; });
      var totalHours = w.hours + (w.otHours || 0);
      var weeklyCharge = c.charge * totalHours;
      var weeklyPayCost = c.payCost * totalHours;

      var flow =
        '<div class="proto-flow">' +
          flowStage("Input", "Wallet", "Net pay rate", "From the net-pay rate table") + flowArrow() +
          flowStage("Step 1", "Tag", "Classify job type", "Job-type &amp; role matching") + flowArrow() +
          flowStage("Step 2", "Calculate", "Statutory on-costs", "Holiday, NI, pension, levy") + flowArrow() +
          flowStage("Step 3", "Scale", "Agency margin &amp; overrides", "Markup + contract overrides") + flowArrow() +
          flowStage("Output", "MoneyBag", "Charge rate", "What the client is billed", true) +
        '</div>';

      var workerOpts = workers.map(function (r, i) {
        return '<option value="' + i + '"' + (i === state.exampleWorker ? " selected" : "") + '>' + escapeHtml(r.worker.name) + " \u2014 " + escapeHtml(r.role) + " \u00b7 " + escapeHtml(r.location) + '</option>';
      }).join("");

      var build = '<div class="proto-build">' +
        buildRow("Base pay rate", "net", c.base, c.charge, "is-base", "val");
      onParts.forEach(function (p) {
        build += buildRow(p.label, p.pct.toFixed(2) + "%", p.amt, c.charge, "is-oncost", "add");
      });
      build += buildRow("Pay cost", "to employ", c.payCost, c.charge, "is-base", "subtotal") +
        buildRow("Agency markup", escapeHtml(ex.group), c.margin, c.charge, "is-margin", "add") +
        buildRow("Charge rate", "billed / hr", c.charge, c.charge, "is-base", "total") +
        '</div>';

      // Per-worker assumptions + the concrete weekly cost to the client.
      var post = w.weeksTenure >= 12;
      var trow = function (k, v) { return '<div class="proto-trace-row"><div class="tr-k">' + k + '</div><div class="tr-v">' + v + '</div></div>'; };
      var tgroup = function (l) { return '<div class="proto-trace-group">' + l + '</div>'; };
      var tag = function (t) { return '<span class="tr-tag">' + escapeHtml(t) + '</span>'; };
      var applied = '<span class="tr-applied">applied</span>';

      var assume = '<div class="proto-example-side">' +
        '<div class="proto-worker-head">' +
          '<span class="proto-worker-avatar">' + escapeHtml(initials(w.name)) + '</span>' +
          '<div class="pw-id"><span class="pw-name">' + escapeHtml(w.name) + '</span>' +
            '<span class="pw-ref">' + escapeHtml(w.ref) + ' \u00b7 since ' + escapeHtml(w.started) + '</span></div>' +
        '</div>' +
        '<div class="es-title">Assumptions for this worker</div>' +
        '<div class="proto-trace">' +
          tgroup("Classification") +
          trow("Net-pay job", escapeHtml(ex.netJob)) +
          trow("Job type", tag(ex.jobType)) +
          trow("Rate-card role", escapeHtml(ex.role)) +
          trow("Position group", tag(ex.group)) +
          trow("Legal entity", tag(w.entity)) +
          trow("Agency", escapeHtml(w.agency)) +
          trow("Location", escapeHtml(ex.location)) +
          tgroup("Tenure &amp; parity") +
          trow("Age", w.age + " years") +
          trow("Weeks of tenure", w.weeksTenure + " weeks") +
          trow("Tenure status", tag(tenureStatus(w)) + (post ? "" : ' <span class="tr-note">week ' + w.weeksTenure + ' of 12</span>')) +
          trow("Pre-parity", gbp(w.prePar) + " / hr" + (post ? "" : " " + applied)) +
          trow("Post-parity", gbp(w.postPar) + " / hr" + (post ? " " + applied : "")) +
          tgroup("Booking &amp; hours") +
          trow("Booking details", escapeHtml(w.booking)) +
          trow("Shift pattern", escapeHtml(w.shift)) +
          trow("Contracted hours", w.hours + " hrs / week") +
          trow("Overtime in the week", (w.otHours ? w.otHours + " hrs" : "None")) +
          trow("Shift differentials", escapeHtml(w.shiftDiff)) +
          trow("Seasonal allowance", (w.seasonal ? "+" + gbp(w.seasonal) + " / hr" : "None")) +
          tgroup("Pay build-up") +
          trow("Base pay (net)", gbp(c.base) + " / hr") +
          trow("Statutory on-costs", gbp(c.oncost) + " \u00b7 " + (c.oncost / c.base * 100).toFixed(1) + "% of base") +
          trow("Agency markup", gbp(c.margin) + " / hr \u00b7 " + escapeHtml(ex.group)) +
          trow("Agency overrides from contract", escapeHtml(w.override)) +
        '</div>' +
        '<div class="proto-pay-callout">' +
          '<div class="pc-row"><span class="pc-k">You pay (charge rate)</span><span class="pc-big">' + gbp(c.charge) + '<span class="pc-unit">/ hr</span></span></div>' +
          '<div class="pc-week"><span>At ' + totalHours + ' hrs / week' + (w.otHours ? ' (incl. ' + w.otHours + ' OT)' : '') + '</span><span class="pc-week-v">' + gbp(weeklyCharge) + ' / wk</span></div>' +
          '<div class="pc-week pc-week--sub"><span>of which pay cost</span><span>' + gbp(weeklyPayCost) + ' / wk</span></div>' +
        '</div>' +
      '</div>';

      return '<div class="proto-card" style="padding:var(--evr-spacing-lg);margin-top:var(--evr-spacing-md)">' +
        '<div class="proto-engine-head"><h2>Pay rate engine</h2><p>Choose a worker to see exactly what you would pay for them, and how the charge rate is built from their base pay.</p></div>' +
        flow +
        '<div class="proto-engine-panel">' +
          '<div><div class="proto-build-head"><span class="bh-label">Charge rate breakdown \u2014 per hour</span>' +
            '<span class="proto-select"><select id="workerselect" aria-label="Choose a worker">' + workerOpts + '</select></span></div>' +
            build + '</div>' +
          assume +
        '</div>' +
        '<div class="proto-engine-note">' + ico("Information") +
          '<p>On-costs and margin come from this agency\u2019s engine settings. Change them in <b>Agencies \u2192 Staffline Group \u2192 Rate Configuration</b> and every rate here recalculates. ' +
          '<button class="proto-linkbtn" data-act="open-agency-settings" style="margin-top:8px;padding:8px 14px;font-size:13px">' + ico("Settings") + 'Open agency engine settings</button></p>' +
        '</div>' +
      '</div>';
    }

    // Initials for a worker avatar (first + last).
    function initials(name) {
      var p = String(name).trim().split(/\s+/);
      return ((p[0] || "")[0] || "") + ((p[p.length - 1] || "")[0] || "");
    }

    // ---------- Pricing: computed rate card output ----------
    function computedCard(parsed, processed) {
      var rows = buildRateCard(parsed, state.engine);
      if (!rows.length) return "";
      var body = rows.map(function (r) {
        return '<tr><td>' + escapeHtml(r.role) + '</td>' +
          '<td>' + escapeHtml(r.jobType) + '</td>' +
          '<td class="num">' + gbp(r.calc.base) + '</td>' +
          '<td class="num">' + gbp(r.calc.payCost) + '</td>' +
          '<td class="num">' + gbp(r.calc.marginAmt) + '</td>' +
          '<td class="num" style="font-weight:700;color:var(--evr-interactive-primary-default)">' + gbp(r.calc.charge) + '</td></tr>';
      }).join("");

      return '<div class="proto-card" style="padding:var(--evr-spacing-lg);margin-top:var(--evr-spacing-md)">' +
        '<div class="proto-section-title">Computed rate card \u2014 ' + rows.length + ' roles</div>' +
        '<div class="proto-table-wrap"><table class="proto-table"><thead><tr>' +
          '<th>Rate-card role</th><th>Job type</th><th>Base pay</th><th>Pay cost</th><th>Markup</th><th>Charge rate</th>' +
        '</tr></thead><tbody>' + body + '</tbody></table></div>' +
        '<div class="proto-set-actions">' +
          '<button class="proto-btn proto-btn--primary" data-act="process"' + (processed ? " disabled" : "") + '>' + ico("Bolt") + (processed ? "Rates applied" : "Apply rate automation") + '</button>' +
          '<button class="proto-btn proto-btn--ghost" data-act="remove-file">Choose a different file</button>' +
        '</div>' +
      '</div>';
    }

    // ---------- Pricing: custom lookup strategy + stored rates ----------

    // The AIX "Rate card custom lookup" panel — draggable priority chips.
    function lookupPanel() {
      var chips = state.lookupOrder.map(function (f, i) {
        return '<div class="proto-lk-chip" draggable="true" data-lk="' + escapeHtml(f) + '" tabindex="0" aria-label="' + escapeHtml(f) + ', lookup priority ' + (i + 1) + '. Drag to reorder.">' +
          '<span class="lk-num">' + (i + 1) + '</span>' +
          '<span class="lk-label">' + escapeHtml(f) + '</span>' +
        '</div>';
      }).join('<span class="proto-lk-arrow" aria-hidden="true">' + ico("ChevronRight") + '</span>');

      return '<div class="proto-lookup">' +
        '<div class="proto-lookup-head">' +
          '<span class="lk-bolt">' + ico("Bolt") + '</span>' +
          '<span class="lk-title">Rate card custom lookup</span>' +
          '<span class="lk-desc">\u2014 field priority order for rate resolution</span>' +
          '<button class="lk-collapse" data-act="toggle-lookup" aria-label="Hide lookup strategy">' + ico("ChevronUp") + '</button>' +
        '</div>' +
        '<div class="proto-lk-chips">' + chips + '</div>' +
        '<div class="proto-lk-hint">Drag chips to reorder \u00b7 leftmost field has highest lookup priority \u00b7 reordering here also reorders the table columns</div>' +
      '</div>';
    }

    // Persistent table of every applied rate, across uploads + sessions.
    function storedRatesCard() {
      if (!state.storedRates.length) return "";
      var order = state.lookupOrder;
      var rows = sortedStored();
      var sources = {};
      state.storedRates.forEach(function (r) { sources[r.source] = 1; });
      var nSrc = Object.keys(sources).length;
      var lastWhen = state.storedRates.reduce(function (m, r) { return r.appliedAt > m ? r.appliedAt : m; }, "");

      var lkHeads = order.map(function (f, i) {
        return '<th class="lk-col' + (i === 0 ? " is-priority" : "") + '" data-lk="' + escapeHtml(f) + '" draggable="true" title="Drag to change lookup priority">' +
          '<span class="th-grip">' + ico("DragIndicator") + '</span>' + escapeHtml(f) +
          (i === 0 ? '<span class="sr-prio">1st</span>' : "") + '</th>';
      }).join("");

      var body = rows.map(function (r) {
        var lkCells = order.map(function (f, i) {
          return '<td class="' + (i === 0 ? "is-priority" : "") + '">' + escapeHtml(String(r[LOOKUP_FIELDS[f].prop])) + '</td>';
        }).join("");
        return '<tr>' + lkCells +
          '<td>' + escapeHtml(r.role) + '</td>' +
          '<td>' + escapeHtml(r.jobType) + '</td>' +
          '<td class="num" style="font-weight:700;color:var(--evr-interactive-primary-default)">' + gbp(r.charge) + '</td>' +
          '<td class="sr-src">' + escapeHtml(r.source) + '</td></tr>';
      }).join("");

      return '<div class="proto-card" style="padding:var(--evr-spacing-lg);margin-top:var(--evr-spacing-md)">' +
        '<div class="proto-sr-head">' +
          '<div>' +
            '<div class="sr-title">Stored rates \u2014 ' + state.storedRates.length + ' rate' + (state.storedRates.length === 1 ? "" : "s") + '</div>' +
            '<div class="sr-meta">Every applied rate, kept across sessions \u00b7 ' + nSrc + ' upload' + (nSrc === 1 ? "" : "s") + (lastWhen ? ' \u00b7 last applied ' + escapeHtml(fmtDate(lastWhen)) : "") + '</div>' +
          '</div>' +
          '<div class="proto-sr-actions">' +
            '<button class="proto-btn proto-btn--ghost" data-act="clear-stored">Clear</button>' +
          '</div>' +
        '</div>' +
        '<div class="proto-table-wrap"><table class="proto-table proto-table--stored"><thead><tr>' +
          lkHeads + '<th>Rate-card role</th><th>Job type</th><th class="num">Charge rate</th><th>Source</th>' +
        '</tr></thead><tbody>' + body + '</tbody></table></div>' +
      '</div>';
    }

    // ---------- Pricing: rate card versions (date-effective timeline) ----------

    function verStatusMeta(status) {
      if (status === "active")    return { label: "Active",     cls: "is-active" };
      if (status === "scheduled") return { label: "Scheduled",  cls: "is-scheduled" };
      return { label: "Superseded", cls: "is-superseded" };
    }
    function verWhenPhrase(v) {
      if (v.status === "scheduled") return "Takes effect " + fmtDay(v.startDate);
      if (v.status === "active") return "Active since " + fmtDay(v.startDate) + (v.endDate ? " \u00b7 until " + fmtDay(v.endDate) : "");
      return "In force " + fmtDay(v.startDate) + " \u2013 " + (v.endDate ? fmtDay(v.endDate) : "\u2014");
    }

    // ---------- Rate-card version DIFF (upload-vs-existing comparison) -------
    // When a new rate card is uploaded, the preview step can compare it against
    // an already-applied version and show only what changed — added, removed,
    // changed or unchanged rate lines — instead of the full price list.

    // Flatten any grid snapshot into one descriptor per rate line. A line is
    // either a position's base rate or one of its override (condition) lines.
    function rcLinesOf(grid) {
      var out = [];
      if (!grid) return out;
      RG_POSITIONS.forEach(function (p) {
        var base = grid.bases ? grid.bases[p.code] : null;
        var hasBase = base != null && base !== "";
        if (hasBase) out.push({ pos: p, isBase: true, cond: {}, rate: Number(base), up: grid.baseUp && grid.baseUp[p.code] });
        (grid.overrides || []).filter(function (o) { return o.pos === p.code; }).forEach(function (o) {
          out.push({ pos: p, isBase: false, cond: o.cond || {}, rate: o.rate, up: o.up });
        });
      });
      return out;
    }

    // Compare two grids. Lines are matched by identity = position + the value
    // of every condition active in either grid ([ALL]/unset normalised). For
    // matched pairs we flag whether the rate and/or season uplift moved.
    function rcComputeDiff(oldGrid, newGrid) {
      var keys = {};
      (oldGrid && oldGrid.active || []).forEach(function (k) { if (RG_CONDS[k]) keys[k] = 1; });
      (newGrid && newGrid.active || []).forEach(function (k) { if (RG_CONDS[k]) keys[k] = 1; });
      var condKeys = Object.keys(RG_CONDS).filter(function (k) { return keys[k]; });
      var isAll = function (v) { return v == null || v === RG_ALL || v === "[ALL]" || v === ""; };
      var sig = function (line) {
        return line.pos.code + "||" + condKeys.map(function (k) { var v = line.cond ? line.cond[k] : null; return isAll(v) ? "*" : String(v); }).join("|");
      };
      var posIndex = {}; RG_POSITIONS.forEach(function (p, i) { posIndex[p.code] = i; });
      var map = {}, order = [];
      var put = function (line, which) {
        var s = sig(line);
        if (!map[s]) { map[s] = { sig: s, pos: line.pos, cond: line.cond || {}, isBase: line.isBase }; order.push(s); }
        map[s][which] = line;
      };
      rcLinesOf(oldGrid).forEach(function (l) { put(l, "old"); });
      rcLinesOf(newGrid).forEach(function (l) { put(l, "new"); });

      var rateEq = function (a, b) {
        var na = a == null || a === "", nb = b == null || b === "";
        if (na && nb) return true; if (na !== nb) return false; return Number(a) === Number(b);
      };
      var upEq = function (a, b) {
        var na = !a || a.val == null || a.val === "", nb = !b || b.val == null || b.val === "";
        if (na && nb) return true; if (na !== nb) return false; return a.type === b.type && Number(a.val) === Number(b.val);
      };

      var counts = { added: 0, removed: 0, changed: 0, unchanged: 0 };
      var rows = order.map(function (s) {
        var e = map[s], o = e.old, n = e.new;
        if (o && n) {
          e.rateChanged = !rateEq(o.rate, n.rate);
          e.upChanged = !upEq(o.up, n.up);
          e.status = (e.rateChanged || e.upChanged) ? "changed" : "unchanged";
        } else if (n) { e.status = "added"; } else { e.status = "removed"; }
        counts[e.status]++;
        e.oldRate = o ? o.rate : null; e.newRate = n ? n.rate : null;
        e.oldUp = o ? o.up : null; e.newUp = n ? n.up : null;
        e.pos = (n || o).pos; e.cond = (n || o).cond || {}; e.isBase = (n || o).isBase;
        return e;
      });
      rows.sort(function (a, b) {
        var pa = posIndex[a.pos.code], pb = posIndex[b.pos.code];
        if (pa !== pb) return pa - pb;
        if (a.isBase !== b.isBase) return a.isBase ? -1 : 1;
        return a.sig < b.sig ? -1 : 1;
      });
      return { condKeys: condKeys, rows: rows, counts: counts,
               showUplift: ((oldGrid && oldGrid.seasonUplift !== false) || (newGrid && newGrid.seasonUplift !== false)) };
    }

    // Versions that carry a captured grid we can diff against (newest first).
    function comparableVersions() {
      return versionTimeline().filter(function (v) { return v.grid && v.grid.bases; }).slice().reverse();
    }
    function compareVerObj(no) { return comparableVersions().filter(function (v) { return v.version === no; })[0]; }
    function defaultCompareVer() {
      var vs = comparableVersions();
      if (!vs.length) return null;

      return (act || vs[0]).version;
    }
    function verShortLabel(v) {
      var st = v.status === "active" ? "Active" : v.status === "scheduled" ? "Scheduled" : "Superseded";
      return "v" + v.version + " \u00b7 " + st + " \u00b7 eff " + fmtDay(v.startDate || v.effectiveDate);
    }

    // The "All rates / Compare changes" switch shown atop the preview step.
    function rcWizCompareControl() {
      var w = state.rcWizard;
      var vers = comparableVersions();
      if (!vers.length) {
        return '<div class="rcd-control rcd-control--empty">' + ico("Information", "rcd-ctrl-ico") +
          '<span>No earlier version to compare against yet \u2014 this is the first rate card, so every line is new.</span></div>';
      }
      var on = w.compareVer != null;
      return '<div class="rcd-control">' +
        '<div class="rcd-ctrl-left">' + ico("ArrowsUpDownSmall", "rcd-ctrl-ico") +
          '<span class="rcd-ctrl-label">View</span>' +
          '<div class="rcd-seg" role="group" aria-label="Preview mode">' +
            '<button class="rcd-seg-btn' + (!on ? " is-on" : "") + '" data-act="wiz-cmp-all" type="button">All rates</button>' +
            '<button class="rcd-seg-btn' + (on ? " is-on" : "") + '" data-act="wiz-cmp-on" type="button">Compare changes</button>' +
          '</div>' +
        '</div>' +
        (on ?
          '<label class="rcd-ctrl-cmp"><span class="rcd-ctrl-cmp-lbl">Compare against</span>' +
            '<span class="proto-select"><select data-wiz-cmpver aria-label="Compare against version">' +
              vers.map(function (v) { return '<option value="' + v.version + '"' + (v.version === w.compareVer ? " selected" : "") + '>' + escapeHtml(verShortLabel(v)) + '</option>'; }).join("") +
            '</select></span>' +
          '</label>'

      '</div>';
    }

    // The read-only diff table: matched rate lines with old → new values.
    function rcWizDiffView(oldVer) {
      var w = state.rcWizard;
      var d = rcComputeDiff(oldVer.grid, state.grid);
      var c = d.counts, condKeys = d.condKeys, showUplift = d.showUplift;
      var onlyChanges = w.diffOnlyChanges !== false;   // default to changes only
      var cur = "\u00a3";
      var condLabel = function (k) { return (RG_CONDS[k] || { label: k }).label; };
      var fmt = function (v) { return v == null || v === "" ? "\u2014" : cur + Number(v).toFixed(2); };
      var upTxt = function (u) { if (!u || u.val == null || u.val === "") return "\u2014"; return u.type === "abs" ? "+" + cur + Number(u.val).toFixed(2) : "+" + u.val + "%"; };
      var isAll = function (v) { return v == null || v === RG_ALL || v === "[ALL]" || v === ""; };
      var colCount = 2 + condKeys.length + 1 + (showUplift ? 1 : 0);

      var TAG = { added: ["Added", "rcd-tag--add"], removed: ["Removed", "rcd-tag--del"], changed: ["Changed", "rcd-tag--chg"], unchanged: ["No change", "rcd-tag--same"] };
      var statusTag = function (s) { return '<span class="rcd-tag ' + TAG[s][1] + '">' + TAG[s][0] + '</span>'; };
      var posCell = function (p, isBase) {
        return '<td class="vsnap-poscell"><span class="vsnap-pos">' + escapeHtml(p.name) + '</span>' +
          (isBase ? '<span class="vsnap-basetag">Base</span>' : '') + '<span class="vsnap-code">' + p.code + '</span></td>';
      };
      var condCells = function (cond) {
        return condKeys.map(function (k) { var v = cond ? cond[k] : null; return '<td>' + (isAll(v) ? '<span class="vsnap-all">[ALL]</span>' : escapeHtml(v)) + '</td>'; }).join("");
      };
      var deltaChip = function (oldV, newV) {
        if (oldV == null || newV == null) return "";
        var diff = Number(newV) - Number(oldV); if (!diff) return "";
        var up = diff > 0;
        return ' <span class="rcd-delta ' + (up ? "is-up" : "is-down") + '">' + (up ? "+" : "\u2212") + cur + Math.abs(diff).toFixed(2) + '</span>';
      };
      var pair = function (oldTxt, newTxt) {
        return '<span class="rcd-pair"><span class="rcd-from">' + oldTxt + '</span>' +
          '<span class="rcd-arrow">\u2192</span><span class="rcd-to">' + newTxt + '</span></span>';
      };
      var rateCell = function (e) {
        if (e.status === "added") return '<span class="rcd-val rcd-val--add">' + fmt(e.newRate) + '</span>';
        if (e.status === "removed") return '<span class="rcd-val rcd-val--del">' + fmt(e.oldRate) + '</span>';
        if (e.status === "changed" && e.rateChanged) return pair(fmt(e.oldRate), fmt(e.newRate)) + deltaChip(e.oldRate, e.newRate);
        return '<span class="rcd-val rcd-val--same">' + fmt(e.newRate != null ? e.newRate : e.oldRate) + '</span>';
      };
      var upCellInner = function (e) {
        if (e.status === "added") return '<span class="rcd-val rcd-val--add">' + upTxt(e.newUp) + '</span>';
        if (e.status === "removed") return '<span class="rcd-val rcd-val--del">' + upTxt(e.oldUp) + '</span>';
        if (e.status === "changed" && e.upChanged) return pair(upTxt(e.oldUp), upTxt(e.newUp));
        return '<span class="rcd-val rcd-val--same">' + upTxt(e.newUp || e.oldUp) + '</span>';
      };
      var rowHtml = function (e) {
        return '<tr class="rcd-row rcd-row--' + e.status + '">' +
          '<td class="rcd-tagcell">' + statusTag(e.status) + '</td>' +
          posCell(e.pos, e.isBase) + condCells(e.cond) +
          '<td class="num">' + rateCell(e) + '</td>' +
          (showUplift ? '<td>' + upCellInner(e) + '</td>' : '') + '</tr>';
      };

      var head = '<tr><th class="rcd-th-tag">Change</th><th>Position</th>' +
        condKeys.map(function (k) { return '<th>' + escapeHtml(condLabel(k)) + '</th>'; }).join("") +
        '<th class="num">Rate</th>' + (showUplift ? '<th>Season uplift</th>' : '') + '</tr>';

      var visible = d.rows.filter(function (r) { return onlyChanges ? r.status !== "unchanged" : true; });
      var nChanges = c.added + c.removed + c.changed;
      var body = visible.length
        ? visible.map(rowHtml).join("")
        : '<tr><td colspan="' + colCount + '" class="vsnap-empty">' +
            (onlyChanges && nChanges === 0
              ? 'No differences \u2014 this upload is identical to ' + escapeHtml(verShortLabel(oldVer)) + '.'
              : 'No rate lines to show.') + '</td></tr>';

      var sumChip = function (n, label, cls) { return '<span class="rcd-sum ' + cls + '"><b>' + n + '</b> ' + label + '</span>'; };
      var summary = '<div class="rcd-summary">' +
        sumChip(c.changed, "changed", "rcd-sum--chg") +
        sumChip(c.added, "added", "rcd-sum--add") +
        sumChip(c.removed, "removed", "rcd-sum--del") +
        sumChip(c.unchanged, "unchanged", "rcd-sum--same") +
      '</div>';
      var seg = '<div class="rcd-seg" role="group" aria-label="Show">' +
        '<button class="rcd-seg-btn' + (onlyChanges ? " is-on" : "") + '" data-act="wiz-diff-changes" type="button">Changes only' +
          (nChanges ? '<span class="rcd-seg-ct">' + nChanges + '</span>' : '') + '</button>' +
        '<button class="rcd-seg-btn' + (!onlyChanges ? " is-on" : "") + '" data-act="wiz-diff-all" type="button">All rates</button>' +
      '</div>';

      return '<div class="rcd-statusbar">' + summary + seg + '</div>' +
        '<div class="proto-table-wrap"><table class="proto-table vsnap-table rcd-table"><thead>' + head + '</thead><tbody>' + body + '</tbody></table></div>';
    }

    // Read-only render of a captured rate-cards grid (the table above),
    // grouped by position with its base rate + override lines. Self-
    // contained — reads only the passed snapshot, never the live grid.
    // Flat captured-rates table that mirrors the uploaded file: Position is
    // simply the first field, followed by the condition columns configured in
    // Advanced settings (in their saved order), then Rate and — if the card
    // carries a season uplift — Season uplift. Every line is one row; the
    // base rate is the row whose conditions are all [ALL].
    function versionGridSnapshot(grid, onlyPos, groupBy, snapFilters) {
      var cur = "\u00a3";
      var active = (grid.active && grid.active.length) ? grid.active : ["parity", "location", "agency"];
      var showUplift = grid.seasonUplift !== false;
      var fmt = function (v) { return v == null || v === "" ? "\u2014" : cur + Number(v).toFixed(2); };
      var upTxt = function (u) { if (!u || u.val == null || u.val === "") return "\u2014"; return u.type === "abs" ? "+" + cur + Number(u.val).toFixed(2) : "+" + u.val + "%"; };
      var peak = function (rate, u) {
        if (rate == null || !u || u.val == null || u.val === "") return "";
        var e = u.type === "abs" ? Number(rate) + Number(u.val) : Number(rate) * (1 + Number(u.val) / 100);
        return ' <span class="vsnap-peak">\u2192 ' + fmt(e) + '</span>';
      };
      var condLabel = function (k) { return (RG_CONDS[k] || { label: k }).label; };
      var isAllVal = function (v) { return v == null || v === "[ALL]" || v === RG_ALL; };
      // Supplier is the leading column (the agency dimension, promoted). Empty =
      // a Global line: the fallback used for any agency with no supplier line.
      var otherActive = active.filter(function (k) { return k !== "agency"; });
      var supplierCell = function (cond) {
        var v = cond ? cond.agency : null;
        var cls = "vsnap-suppliercell" + (gb === "agency" ? " vsnap-cell-grouped" : "");
        return '<td class="' + cls + '">' + (isAllVal(v)
          ? '<span class="vsnap-all vsnap-global">Global</span>'
          : '<span class="vsnap-supplier-name">' + escapeHtml(v) + '</span>') + '</td>';
      };
      var colCount = 1 + active.length + 1 + (showUplift ? 1 : 0);

      // Validate the requested grouping against this version's structure.
      // "none" = flat (position order); "position" = a header per position;
      // a condition key = a header per distinct value of that condition.
      var gb = groupBy || "none";
      if (gb !== "none" && gb !== "position" && active.indexOf(gb) < 0) gb = "none";
      if (gb === "position" && onlyPos) gb = "none";

      var head = '<tr><th class="vsnap-th-supplier">Supplier</th><th>Position</th>' +
        otherActive.map(function (k) { return '<th>' + escapeHtml(condLabel(k)) + '</th>'; }).join("") +
        '<th class="num">Rate</th>' + (showUplift ? '<th>Season uplift</th>' : '') + '</tr>';
      var posCell = function (p, isBase) {
        return '<td class="vsnap-poscell"><span class="vsnap-pos">' + escapeHtml(p.name) + '</span>' +
          (isBase ? '<span class="vsnap-basetag">Base</span>' : '') +
          '<span class="vsnap-code">' + p.code + '</span></td>';
      };
      var condCells = function (cond) {
        return otherActive.map(function (k) {
          var v = cond ? cond[k] : null;
          return '<td' + (gb === k ? ' class="vsnap-cell-grouped"' : '') + '>' +
            (isAllVal(v) ? '<span class="vsnap-all">[ALL]</span>' : escapeHtml(v)) + '</td>';
        }).join("");
      };
      var rowHtml = function (r) {
        return '<tr' + (r.isBase ? ' class="vsnap-baserow"' : '') + '>' +
          supplierCell(r.cond) + posCell(r.pos, r.isBase) + condCells(r.cond) +
          '<td class="num">' + fmt(r.rate) + '</td>' +
          (showUplift ? '<td>' + upTxt(r.up) + peak(r.rate, r.up) + '</td>' : '') + '</tr>';
      };

      // Flatten the grid into one descriptor per rate line, preserving the
      // canonical position order (base first, then its override lines).
      var rows = [];
      RG_POSITIONS.forEach(function (p) {
        if (onlyPos && p.code !== onlyPos) return;
        var base = grid.bases ? grid.bases[p.code] : null;
        var hasBase = base != null && base !== "";
        var ovs = (grid.overrides || []).filter(function (o) { return o.pos === p.code; });
        if (!hasBase && !ovs.length) return;
        if (hasBase) rows.push({ pos: p, isBase: true, cond: {}, rate: base, up: grid.baseUp && grid.baseUp[p.code] });
        ovs.forEach(function (o) { rows.push({ pos: p, isBase: false, cond: o.cond || {}, rate: o.rate, up: o.up }); });
      });

      // ----- Filtering: find lines by position or any condition value -----
      var filters = snapFilters || {};
      var posName = function (code) { var p = RG_POSITIONS.filter(function (q) { return q.code === code; })[0]; return p ? p.name : code; };
      var fieldKeys = ["__pos"].concat(active);
      var fieldLabel = function (fk) { return fk === "__pos" ? "Position" : condLabel(fk); };
      var rowVal = function (r, fk) {
        if (fk === "__pos") return r.pos.code;
        var v = r.cond ? r.cond[fk] : null;
        return isAllVal(v) ? "__all" : v;
      };
      var activeFilters = fieldKeys.filter(function (fk) { var f = filters[fk]; return f && f !== "__any"; });
      var passes = function (r) { return activeFilters.every(function (fk) { return rowVal(r, fk) === filters[fk]; }); };
      var filtered = activeFilters.length ? rows.filter(passes) : rows;
      // Distinct present values per field, used to build the dropdown options.
      var distinctFor = function (fk) {
        var seen = {}, out = [], hasAll = false;
        rows.forEach(function (r) {
          var rv = rowVal(r, fk);
          if (rv === "__all") { hasAll = true; return; }
          if (rv != null && rv !== "" && !seen[rv]) { seen[rv] = 1; out.push(rv); }
        });
        out.sort(function (a, b) { return String(fk === "__pos" ? posName(a) : a).localeCompare(String(fk === "__pos" ? posName(b) : b)); });
        return { values: out, hasAll: hasAll };
      };

      // ----- Body — grouping operates on the filtered set -----
      var renderBody = function (list) {
        if (gb === "none") return list.map(rowHtml).join("");
        var buckets = [], byKey = {};
        list.forEach(function (r) {
          var key, label, isAny = false;
          if (gb === "position") { key = r.pos.code; label = r.pos.name; }
          else {
            var v = r.cond ? r.cond[gb] : null;
            if (isAllVal(v)) { key = "__all"; label = "Any " + condLabel(gb).toLowerCase(); isAny = true; }
            else { key = String(v); label = v; }
          }
          if (!byKey[key]) { byKey[key] = { key: key, label: label, isAny: isAny, rows: [] }; buckets.push(byKey[key]); }
          byKey[key].rows.push(r);
        });
        if (gb !== "position") {
          buckets.sort(function (a, b) { if (a.isAny !== b.isAny) return a.isAny ? 1 : -1; return a.label.localeCompare(b.label); });
        }
        var dimName = gb === "position" ? "Position" : condLabel(gb);
        return buckets.map(function (bk) {
          var n = bk.rows.length;
          var hdr = '<tr class="vsnap-group"><td colspan="' + colCount + '">' +
            '<span class="vsnap-group-dim">' + escapeHtml(dimName) + '</span>' +
            '<span class="vsnap-group-label' + (bk.isAny ? " is-any" : "") + '">' + escapeHtml(bk.label) + '</span>' +
            '<span class="vsnap-group-count">' + n + ' line' + (n === 1 ? "" : "s") + '</span>' +
          '</td></tr>';
          return hdr + bk.rows.map(rowHtml).join("");
        }).join("");
      };

      var body;
      if (!rows.length) body = '<tr><td colspan="' + colCount + '" class="vsnap-empty">No rate lines captured in this version.</td></tr>';
      else if (!filtered.length) body = '<tr><td colspan="' + colCount + '" class="vsnap-empty">No rate lines match these filters. <button class="vsnap-inline-clear" data-act="snap-filter-clear" type="button">Clear filters</button></td></tr>';
      else body = renderBody(filtered);

      // ----- Toolbar: filter controls (left) + group-by (right) -----
      var filterControls = fieldKeys.map(function (fk) {
        var labelLc = fieldLabel(fk).toLowerCase();
        var curF = filters[fk] || "__any";
        var d = distinctFor(fk);
        if (!d.values.length) return "";   // nothing concrete to filter on
        var opts = '<option value="__any"' + (curF === "__any" ? " selected" : "") + '>Any ' + escapeHtml(labelLc) + '</option>';
        d.values.forEach(function (v) {
          var lbl = fk === "__pos" ? posName(v) : v;
          opts += '<option value="' + escapeHtml(String(v)) + '"' + (curF === String(v) ? " selected" : "") + '>' + escapeHtml(lbl) + '</option>';
        });
        if (fk !== "__pos" && d.hasAll) opts += '<option value="__all"' + (curF === "__all" ? " selected" : "") + '>[ALL] lines</option>';
        return '<span class="proto-select vsnap-filter-select' + (curF !== "__any" ? " is-active" : "") + '">' +
          '<select data-snap-filter="' + fk + '" aria-label="Filter by ' + escapeHtml(labelLc) + '">' + opts + '</select></span>';
      }).join("");

      var gbOpts = [{ v: "none", l: "No grouping" }];
      if (!onlyPos) gbOpts.push({ v: "position", l: "Position" });
      active.forEach(function (k) { gbOpts.push({ v: k, l: condLabel(k) }); });
      var gbControl = '<div class="vsnap-tb-group">' +
        '<span class="vsnap-toolbar-label">' + ico("Stack", "vsnap-tb-ico") + 'Group by</span>' +
        '<span class="proto-select vsnap-gb-select"><select data-snap-groupby aria-label="Group captured rates by">' +
          gbOpts.map(function (o) { return '<option value="' + o.v + '"' + (o.v === gb ? " selected" : "") + '>' + escapeHtml(o.l) + '</option>'; }).join("") +
        '</select></span>' +
        (gb !== "none" ? '<button class="vsnap-gb-clear" data-act="snap-groupby-clear" type="button">Clear grouping</button>' : '') +
      '</div>';

      var toolbar = '<div class="vsnap-toolbar">' +
        '<div class="vsnap-tb-filters"><span class="vsnap-toolbar-label">' + ico("Filter", "vsnap-tb-ico") + 'Filter</span>' + filterControls + '</div>' +
        gbControl +
      '</div>';

      // ----- Active-filter chips + result count -----
      var statusRow = "";
      if (activeFilters.length) {
        var chips = activeFilters.map(function (fk) {
          var val = filters[fk];
          var shown = fk === "__pos" ? posName(val) : (val === "__all" ? "[ALL]" : val);
          return '<button class="vsnap-chip" data-snap-filter-clear="' + fk + '" type="button" title="Remove this filter">' +
            '<span class="vsnap-chip-k">' + escapeHtml(fieldLabel(fk)) + '</span>' +
            '<span class="vsnap-chip-v">' + escapeHtml(shown) + '</span>' +
            ico("Cancel", "vsnap-chip-x") +
          '</button>';
        }).join("");
        statusRow = '<div class="vsnap-statusrow">' +
          '<div class="vsnap-chips">' + chips +
            '<button class="vsnap-gb-clear" data-act="snap-filter-clear" type="button">Clear all</button>' +
          '</div>' +
          '<span class="vsnap-count">Showing <b>' + filtered.length + '</b> of ' + rows.length + ' line' + (rows.length === 1 ? "" : "s") + '</span>' +
        '</div>';
      }

      return toolbar + statusRow + '<div class="proto-table-wrap"><table class="proto-table vsnap-table' + (gb !== "none" ? " is-grouped" : "") + '"><thead>' + head + '</thead><tbody>' + body + '</tbody></table></div>';
    }
    // Number of rate lines a version captured (grid lines, else engine rates).
    function verRateCount(v) {
      if (v.grid) {
        var n = (v.grid.overrides || []).length;
        RG_POSITIONS.forEach(function (p) { var b = v.grid.bases && v.grid.bases[p.code]; if (b != null && b !== "") n++; });
        return n;
      }
      return v.rates ? v.rates.length : (v.rows ? v.rows.length : 0);
    }

    // Captured-rates snapshot table for an expanded version.
    function versionSnapshot(v, onlyPos) {
      if (v.grid) return versionGridSnapshot(v.grid, onlyPos, state.gridUI.snapGroupBy, state.gridUI.snapFilters);
      if (v.kind === "flat") {
        var cols = (v.cols || []).map(function (c) { return '<th>' + escapeHtml(String(c)) + '</th>'; }).join("");
        var rws = (v.rows || []).slice(0, 12).map(function (r) {
          return '<tr>' + (v.cols || []).map(function (c, i) {
            var val = r[i] == null ? "" : r[i];
            return '<td class="' + (typeof val === "number" ? "num" : "") + '">' + escapeHtml(String(val)) + '</td>';
          }).join("") + '</tr>';
        }).join("");
        return '<div class="proto-table-wrap"><table class="proto-table"><thead><tr>' + cols + '</tr></thead><tbody>' + rws + '</tbody></table></div>';
      }
      var body = (v.rates || []).map(function (r) {
        return '<tr><td>' + escapeHtml(r.role) + '</td>' +
          '<td>' + escapeHtml(r.jobType) + '</td>' +
          '<td>' + escapeHtml(r.location) + '</td>' +
          '<td class="num">' + gbp(r.base) + '</td>' +
          '<td class="num">' + gbp(r.payCost) + '</td>' +
          '<td class="num">' + gbp(r.markup) + '</td>' +
          '<td class="num" style="font-weight:700;color:var(--evr-interactive-primary-default)">' + gbp(r.charge) + '</td></tr>';
      }).join("");
      return '<div class="proto-table-wrap"><table class="proto-table"><thead><tr>' +
        '<th>Rate-card role</th><th>Job type</th><th>Location</th><th>Base pay</th><th>Pay cost</th><th>Markup</th><th>Charge rate</th>' +
        '</tr></thead><tbody>' + body + '</tbody></table></div>';
    }

    function versionsCard() {
      if (!state.versions.length) return "";
      var tl = versionTimeline().reverse();   // newest first for display
      var activeV = tl.filter(function (v) { return v.status === "active"; })[0];
      var scheduledN = tl.filter(function (v) { return v.status === "scheduled"; }).length;

      var items = tl.map(function (v) {
        var m = verStatusMeta(v.status);
        var open = state.openVersion === v.version;
        var nRates = v.rates ? v.rates.length : (v.rows ? v.rows.length : 0);
        var actions = '<button class="proto-ver-link" data-verview="' + v.version + '">' + ico(open ? "ChevronUp" : "Row") + (open ? "Hide captured rates" : "View captured rates") + '</button>';
        if (v.status === "superseded") {
          actions += '<button class="proto-ver-link" data-verrollback="' + v.version + '">' + ico("TimeUndo") + 'Roll back to this version</button>';
