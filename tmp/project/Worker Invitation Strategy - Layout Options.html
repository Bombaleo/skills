<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Worker invitation strategy — layout options</title>
<link rel="stylesheet" href="tokens.css" />
<link rel="stylesheet" href="styles-agency-worker-invite.css" />
<style>
  html, body { margin: 0; background: var(--evr-surface-root-primary); }
  .vx-frame {
    background: var(--evr-surface-primary-default);
    border: 1px solid var(--evr-border-decorative-lowemp);
    border-radius: var(--evr-radius-sm);
    padding: 24px;
    width: 100%;
    box-sizing: border-box;
    font-family: var(--evr-font-text);
  }
  .vx-eyebrow {
    font-family: var(--evr-font-text); font-weight: 700; font-size: 11px;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--evr-content-primary-lowemp);
  }
  .vx-title {
    margin: 4px 0 2px; font-family: var(--evr-font-display); font-weight: 700;
    font-size: 20px; color: var(--evr-content-primary-highemp);
  }
  .vx-sub { margin: 0 0 18px; font: var(--evr-body2); color: var(--evr-content-primary-default); }

  /* ---- Variant B: stacked radio rows ---- */
  .vb-list { display: flex; flex-direction: column; gap: 10px; }
  .vb-row {
    display: grid; grid-template-columns: 22px 40px 1fr 96px; gap: 14px; align-items: center;
    border: 1px solid var(--evr-border-decorative-lowemp); border-radius: var(--evr-radius-sm);
    padding: 14px 16px; background: var(--evr-surface-primary-default); cursor: pointer;
  }
  .vb-row--active {
    border-color: var(--evr-interactive-primary-default);
    background: var(--evr-interactive-primary-decorative);
    box-shadow: 0 0 0 1px var(--evr-interactive-primary-default);
  }
  .vb-radio { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--evr-border-decorative-default); display: inline-flex; align-items: center; justify-content: center; }
  .vb-row--active .vb-radio { border-color: var(--evr-interactive-primary-default); }
  .vb-radio span { width: 10px; height: 10px; border-radius: 50%; background: var(--evr-interactive-primary-default); display: none; }
  .vb-row--active .vb-radio span { display: block; }
  .vb-ic { width: 40px; height: 40px; border-radius: var(--evr-radius-2xs); background: var(--evr-surface-secondary-default); color: var(--evr-content-primary-default); display: inline-flex; align-items: center; justify-content: center; }
  .vb-row--active .vb-ic { background: var(--evr-interactive-primary-default); color: #fff; }
  .vb-name { font-family: var(--evr-font-display); font-weight: 600; font-size: 15px; color: var(--evr-content-primary-highemp); }
  .vb-desc { font: var(--evr-body2); color: var(--evr-content-primary-default); margin-top: 2px; }
  .vb-mini { display: flex; align-items: flex-end; gap: 4px; height: 32px; justify-content: flex-end; }

  /* ---- Variant C: segmented + detail ---- */
  .vc-seg { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 5px; background: var(--evr-surface-secondary-default); border-radius: 9999px; }
  .vc-seg-opt {
    appearance: none; border: 0; cursor: pointer; border-radius: 9999px; padding: 9px 8px;
    font-family: var(--evr-font-text); font-weight: 700; font-size: 13px; color: var(--evr-content-primary-default);
    background: transparent; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  }
  .vc-seg-opt--active { background: var(--evr-surface-primary-default); color: var(--evr-interactive-primary-default); box-shadow: var(--evr-depth-02); }
  .vc-detail { margin-top: 16px; display: grid; grid-template-columns: 52px 1fr; gap: 14px; align-items: start; }
  .vc-detail-ic { width: 52px; height: 52px; border-radius: var(--evr-radius-2xs); background: var(--evr-surface-decorative-low-purple); color: var(--evr-content-decorative-purple); display: inline-flex; align-items: center; justify-content: center; }
  .vc-detail-name { font-family: var(--evr-font-display); font-weight: 700; font-size: 18px; color: var(--evr-content-primary-highemp); margin: 0; }
  .vc-detail-blurb { font: var(--evr-body2); color: var(--evr-content-primary-default); margin: 6px 0 0; line-height: 1.5; }
  .vc-params { margin-top: 14px; }
  .vc-pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 9999px; background: var(--evr-surface-secondary-default); font: var(--evr-body2); font-weight: 700; color: var(--evr-content-primary-default); margin: 6px 6px 0 0; }
  .vc-pill b { color: var(--evr-content-primary-highemp); font-variant-numeric: tabular-nums; }

  .vx-note { display: flex; gap: 8px; margin-top: 16px; font: var(--evr-utility2); color: var(--evr-content-primary-lowemp); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel" data-presets="react">
const DCanvas = window.DesignCanvas, DSection = window.DCSection, DArt = window.DCArtboard;

// --- tiny inline icons (Everest line style, 20x20, 1.5px stroke) ---
function I({ name, size = 20 }) {
  const s = { width: size, height: size, viewBox: "0 0 24 24", fill: "none",
    stroke: "currentColor", strokeWidth: 1.6, strokeLinecap: "square", strokeLinejoin: "miter" };
  if (name === "broadcast") return (
    <svg {...s}><circle cx="12" cy="12" r="2.2" fill="currentColor" stroke="none"/>
      <path d="M7 7a7 7 0 0 0 0 10M17 7a7 7 0 0 1 0 10M4.5 4.5a11 11 0 0 0 0 15M19.5 4.5a11 11 0 0 1 0 15"/></svg>);
  if (name === "clock") return (
    <svg {...s}><circle cx="12" cy="12" r="8"/><path d="M12 8v4l3 2"/></svg>);
  if (name === "perf") return (
    <svg {...s}><path d="M4 19V5M4 19h16M8 16v-4M12 16V8M16 16v-6"/></svg>);
  return null;
}

function Diag({ kind }) {
  if (kind === "simultaneous") return (
    <span className="awi-diag-bc">
      <span className="awi-diag-hub" />
      {[0,1,2,3,4,5].map(i => <span key={i} className="awi-diag-ray" style={{ transform:`rotate(${i*60}deg) translateX(8px)` }} />)}
    </span>);
  if (kind === "staggered") return (
    <span className="awi-diag-stag">
      {[0,1,2].map(i => (
        <span key={i} className="awi-diag-stag-lane">
          <span className="awi-diag-stag-dot" style={{ opacity: 1 - i*0.28 }} />
          <span className="awi-diag-stag-bar" style={{ width:`${64-i*16}%`, opacity: 0.5 - i*0.12 }} />
        </span>))}
    </span>);
  return (
    <span className="awi-diag-smart">
      {[30,24,19,14,10].map((h,i) => <span key={i} className="awi-diag-smart-bar" style={{ height:h }} />)}
    </span>);
}

const STRATS = [
  { key:"simultaneous", icon:"broadcast", name:"Send all at once",   blurb:"Every selected worker is invited the moment you confirm. Fastest possible fill — first to accept takes the slot." },
  { key:"staggered",    icon:"clock",     name:"Send one by one",    blurb:"Invite in small waves on a set interval. Stops automatically once the positions are filled, so you don't over-invite." },
  { key:"smart",        icon:"perf",      name:"Smart allocation",   blurb:"Rank your bench by worker score and invite the strongest first, cascading down until every position is filled." },
];
const ICON = { broadcast:"broadcast", clock:"clock", perf:"perf" };

// ---- Variant A: cards (shipped) ----
function VariantA() {
  const active = "smart";
  return (
    <div className="vx-frame">
      <div className="vx-eyebrow">Option A · Cards</div>
      <h2 className="vx-title">Visual card grid</h2>
      <p className="vx-sub">Three equal cards with a glanceable diagram each. Best for the full-width Settings card where there's room to teach the difference. This is the shipped layout.</p>
      <div className="awi-strat-grid">
        {STRATS.map(s => {
          const on = s.key === active;
          return (
            <div key={s.key} className={"awi-strat" + (on ? " awi-strat--active" : "")}>
              <span className="awi-strat-head">
                <span className="awi-strat-icon"><I name={ICON[s.icon]} size={20} /></span>
                <span className="awi-strat-title">{s.name}</span>
                <span className={"awi-strat-check" + (on ? " awi-strat-check--on" : "")}>
                  {on && <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4"><path d="M5 12l4 4 10-10"/></svg>}
                </span>
              </span>
              <span className="awi-strat-diagram"><Diag kind={s.key} /></span>
              <span className="awi-strat-blurb">{s.blurb}</span>
            </div>
          );
        })}
      </div>
      <div className="vx-note">Pros: most explanatory, diagrams aid recognition. Cons: tallest — needs full width.</div>
    </div>
  );
}

// ---- Variant B: stacked radio rows ----
function VariantB() {
  const active = "staggered";
  return (
    <div className="vx-frame">
      <div className="vx-eyebrow">Option B · Stacked rows</div>
      <h2 className="vx-title">Compact radio list</h2>
      <p className="vx-sub">One row per strategy with a right-aligned mini diagram. Fits the narrow per-requisition override bar inside the worker-invite panel without scrolling.</p>
      <div className="vb-list">
        {STRATS.map(s => {
          const on = s.key === active;
          return (
            <div key={s.key} className={"vb-row" + (on ? " vb-row--active" : "")}>
              <span className="vb-radio"><span /></span>
              <span className="vb-ic"><I name={ICON[s.icon]} size={20} /></span>
              <span style={{ minWidth: 0 }}>
                <span className="vb-name">{s.name}</span>
                <span className="vb-desc">{s.blurb}</span>
              </span>
              <span className="vb-mini"><Diag kind={s.key} /></span>
            </div>
          );
        })}
      </div>
      <div className="vx-note">Pros: compact, scannable, scales to more strategies. Cons: diagrams shrink.</div>
    </div>
  );
}

// ---- Variant C: segmented control + detail ----
function VariantC() {
  const active = "smart";
  return (
    <div className="vx-frame">
      <div className="vx-eyebrow">Option C · Segmented + detail</div>
      <h2 className="vx-title">Segmented control</h2>
      <p className="vx-sub">A single segmented control swaps a detail panel below. Densest option — keeps the strategy choice to one line and reveals only the selected strategy's parameters.</p>
      <div className="vc-seg">
        {STRATS.map(s => {
          const on = s.key === active;
          return (
            <button key={s.key} className={"vc-seg-opt" + (on ? " vc-seg-opt--active" : "")}>
              <I name={ICON[s.icon]} size={16} />{s.name.replace("Send ", "")}
            </button>
          );
        })}
      </div>
      <div className="vc-detail">
        <span className="vc-detail-ic"><I name="perf" size={24} /></span>
        <div>
          <h3 className="vc-detail-name">Smart allocation</h3>
          <p className="vc-detail-blurb">Rank your bench by worker score and invite the strongest first, cascading down until every position is filled.</p>
          <div className="vc-params">
            <span className="vc-pill">Minimum score <b>70</b></span>
            <span className="vc-pill">Top per wave <b>3</b></span>
            <span className="vc-pill">Interval <b>15 min</b></span>
          </div>
        </div>
      </div>
      <div className="vx-note">Pros: shortest, one-line choice. Cons: hides the other strategies' descriptions.</div>
    </div>
  );
}

function App() {
  return (
    <DCanvas>
      <DSection id="pickers" title="Worker invitation strategy picker" subtitle="Three layout options for the same three strategies — Send all at once · Send one by one · Smart allocation">
        <DArt id="a" label="A · Cards (shipped)" width={760} height={360}><VariantA /></DArt>
        <DArt id="b" label="B · Stacked rows" width={620} height={400}><VariantB /></DArt>
        <DArt id="c" label="C · Segmented + detail" width={620} height={340}><VariantC /></DArt>
      </DSection>
    </DCanvas>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
