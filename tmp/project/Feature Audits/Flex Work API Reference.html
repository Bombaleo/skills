<!doctype html>
<html lang="en">
<!--
  ─────────────────────────────────────────────────────────────────────
  Flex Work API Reference
  ─────────────────────────────────────────────────────────────────────
  Hash-routed reference doc. Layout shell only — every visible content
  region is rendered by api-docs-renderer.js from the OpenAPI spec.

  URL routes:
      <no hash>             → home (overview + tag grid)
      #/get-started/auth    → authentication overview
      #/get-started/errors  → errors & retries
      #/get-started/pagination → pagination
      #/{tag}               → tag landing
      #/{tag}/{endpoint}    → single endpoint detail
      #{endpoint}           → single endpoint (legacy alias)

  Spec source:
      api-docs-spec.js         — info, servers, schemas, foundational paths
      api-docs-spec-ext-1.js   — organization, users, org tree, config, notifications
      api-docs-spec-ext-2.js   — templates, candidates, SOW, contractors,
                                  credentials, distribution, pricing, policies,
                                  talent pools, time off, analytics, dashboards,
                                  events, system, AI / Labs, and many extensions
      api-docs-renderer.js     — hash router + page rendering

  Updating: every endpoint change must be reflected in this set AND in
  Flex Work v2 Changelog.html (see CLAUDE.md).
  ─────────────────────────────────────────────────────────────────────
-->
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Flex Work API · Reference</title>
  <link rel="stylesheet" href="../tokens.css" />
  <link rel="stylesheet" href="../fonts/fonts.css" />
  <link rel="stylesheet" href="../styles-api-docs.css" />
</head>
<body>

  <!-- ============ TOP BAR ============ -->
  <header class="api-topbar" role="banner">
    <a class="api-topbar-brand" href="#/" aria-label="Flex Work API home">
      <span class="api-brand-text">
        <span class="api-brand-product">Dayforce · Flex Work</span>
        <span class="api-brand-sub">API reference</span>
      </span>
    </a>
    <div class="api-topbar-center">
      <label class="api-search" aria-label="Search the API reference">
        <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.4"/>
          <path d="M10.5 10.5l3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        <input id="api-search-input" type="search" placeholder="Search endpoints, schemas, fields…" autocomplete="off" />
        <span class="api-search-kbd">⌘K</span>
      </label>
      <span class="api-version-pill">v1 · stable</span>
    </div>
    <div class="api-topbar-right">
      <a class="api-topbar-link" href="../Flex Work v2 Changelog.html">Changelog</a>
      <a class="api-topbar-link" href="../index.html">Back to app</a>
    </div>
  </header>

  <!-- ============ THREE-PANE BODY ============ -->
  <div class="api-page">

    <!-- LEFT: navigation (populated by renderer) -->
    <aside id="api-nav" class="api-nav" aria-label="API navigation"></aside>

    <!-- MIDDLE: documentation content (populated by renderer) -->
    <main class="api-main" role="main">
      <div id="api-main-host"></div>
    </main>

    <!-- RIGHT: code samples rail (populated by renderer) -->
    <aside id="api-code-rail" class="api-code-rail" aria-label="Code samples"></aside>

  </div>

  <!-- Spec sources — loaded in dependency order. -->
  <script src="../api-docs-spec.js"></script>
  <script src="../api-docs-spec-ext-1.js"></script>
  <script src="../api-docs-spec-ext-2.js"></script>
  <script src="../api-docs-spec-ext-3.js"></script>
  <script src="../api-docs-spec-ext-4.js"></script>
  <script src="../api-docs-spec-ext-5.js"></script>
  <script src="../api-docs-spec-ext-6.js"></script>
  <script src="../api-docs-spec-ext-7.js"></script>
  <script src="../api-docs-spec-ext-8.js"></script>
  <script src="../api-docs-spec-ext-9.js"></script>
  <script src="../api-docs-spec-ext-10.js"></script>
  <script src="../api-docs-spec-ext-11.js"></script>
  <script src="../api-docs-spec-ext-12.js"></script>
  <script src="../api-docs-spec-ext-13.js"></script>
  <script src="../api-docs-spec-ext-14.js"></script>
  <script src="../api-docs-spec-ext-15.js"></script>
  <script src="../api-docs-spec-ext-16.js"></script>
  <script src="../api-docs-spec-ext-17.js"></script>
  <script src="../api-docs-renderer.js"></script>
</body>
</html>
